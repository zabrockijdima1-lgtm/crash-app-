<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Pro Design</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #06090f;
            --bg-panel: #0d111b;
            --bg-card: #151a27;
            --accent-blue: #0088cc;
            --accent-blue-gradient: linear-gradient(90deg, #1d4ed8, #2563eb);
            --text-gray: #6b7280;
            --text-gold: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: #fff; overflow: hidden; height: 100vh; }

        .app { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 500px; margin: 0 auto; background: var(--bg-dark); }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: rgba(13, 17, 27, 0.8); backdrop-filter: blur(10px);
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 10px; background: #2d3748; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-meta p { font-size: 13px; font-weight: 700; }
        .user-meta span { font-size: 10px; color: var(--text-gray); }

        .balance-pill {
            background: #111827; padding: 6px 12px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px; border: 1px solid var(--border);
        }
        .balance-pill span { font-size: 14px; font-weight: 800; }
        .plus-btn { background: var(--accent-blue); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

        /* CHART AREA */
        .game-view {
            position: relative; height: 32vh; margin: 10px 16px; border-radius: 16px;
            background: #090e16; overflow: hidden; border: 1px solid var(--border);
        }
        .grid-bg {
            position: absolute; width: 200%; height: 100%;
            background-image: 
                linear-gradient(rgba(30, 41, 59, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 10s linear infinite;
            display: none; /* Показуємо тільки під час польоту */
        }
        @keyframes gridMove { from { transform: translateX(0); } to { transform: translateX(-40px); } }

        .chart-labels { position: absolute; left: 5px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 10px 0; color: var(--text-gray); font-size: 10px; z-index: 5; }

        .main-display {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        #multiplier { font-size: 56px; font-weight: 900; }
        #waiting-timer { font-size: 48px; font-weight: 900; color: var(--danger); display: none; }
        .waiting-text { font-size: 10px; color: var(--text-gray); letter-spacing: 3px; margin-top: 5px; text-transform: uppercase; display: none; }

        .rocket { position: absolute; width: 100px; bottom: 10%; left: 10%; z-index: 15; display: none; }

        /* HISTORY */
        .history-container {
            display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto;
        }
        .history-container::-webkit-scrollbar { display: none; }
        .h-item {
            padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
            white-space: nowrap; background: rgba(30, 41, 59, 0.5);
        }

        /* BET BUTTONS */
        .bet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 15px; }
        .bet-btn {
            padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700;
            color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-gray { background: #1e293b; color: #60a5fa; border: 1px solid #334155; }
        .btn-blue { background: var(--accent-blue-gradient); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-orange { background: linear-gradient(90deg, #f59e0b, #d97706); }

        /* PLAYERS LIST */
        .players-section {
            flex: 1; background: var(--bg-panel); border-radius: 24px 24px 0 0;
            padding: 15px 0; overflow-y: auto; border-top: 1px solid var(--border);
        }
        .player-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .p-left { display: flex; align-items: center; gap: 10px; }
        .p-avatar { width: 32px; height: 32px; border-radius: 8px; background: #334155; position: relative; }
        .p-avatar img { width: 100%; height: 100%; border-radius: 8px; }
        .p-crown { position: absolute; top: -8px; left: -4px; color: #fbbf24; font-size: 12px; transform: rotate(-15deg); }
        .p-info p { font-size: 13px; font-weight: 600; }
        .p-info span { font-size: 11px; color: var(--text-gray); }
        
        .p-right { text-align: right; }
        .p-right p { font-size: 13px; font-weight: 700; }
        .p-item-icon { width: 20px; vertical-align: middle; margin-left: 5px; }

        /* BOTTOM NAV */
        .nav {
            display: flex; justify-content: space-around; background: var(--bg-panel);
            padding: 10px 0 20px; border-top: 1px solid var(--border);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-gray); font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-icon-box { font-size: 18px; }
        .active-dot { width: 4px; height: 4px; background: var(--accent-blue); border-radius: 50%; margin-top: 2px; }

        /* ANIMATIONS */
        .pulse-timer { animation: timerPulse 1s infinite; }
        @keyframes timerPulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="user-info">
            <div class="user-avatar" id="myAv">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dima" alt="avatar">
            </div>
            <div class="user-meta">
                <p id="myName">Діма | BIO</p>
                <span>Level 1</span>
            </div>
        </div>
        <div class="balance-pill">
            <span id="myBalance">0.02</span> <small style="color:var(--text-gray)">TON</small>
            <div class="plus-btn"><i class="fa-solid fa-plus"></i></div>
        </div>
    </div>

    <div class="game-view">
        <div class="grid-bg" id="grid"></div>
        <div class="chart-labels">
            <span>1.8x</span><span>1.6x</span><span>1.4x</span><span>1.2x</span>
        </div>
        
        <div class="main-display">
            <div id="multiplier">1.00x</div>
            <div id="waiting-timer" class="pulse-timer">05.00</div>
            <div class="waiting-text" id="waiting-text">Ігра через</div>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/1066/1066371.png" class="rocket" id="rocket">
    </div>

    <div class="history-container" id="history">
        </div>

    <p style="text-align: center; font-size: 9px; color: var(--text-gray); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">
        Ви можете поставити ставку на наступний раунд
    </p>

    <div class="bet-actions">
        <button class="bet-btn btn-gray">
            <i class="fa-solid fa-gift"></i> Ставка
        </button>
        <button class="bet-btn btn-blue" id="actionBtn">
            <i class="fa-solid fa-gem"></i> Ставка
        </button>
    </div>

    <div class="players-section" id="playersList">
        </div>

    <div class="nav">
        <div class="nav-item">
            <i class="fa-solid fa-box-open nav-icon-box"></i>
            <span>Інвентар</span>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-hammer nav-icon-box"></i>
            <span>Крафт</span>
        </div>
        <div class="nav-item active">
            <i class="fa-solid fa-chart-line nav-icon-box"></i>
            <span>Краш</span>
            <div class="active-dot"></div>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-layer-group nav-icon-box"></i>
            <span>Кейси</span>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-user-gear nav-icon-box"></i>
            <span>Профіль</span>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // DOM Elements
    const elMult = document.getElementById('multiplier');
    const elTimer = document.getElementById('waiting-timer');
    const elWaitText = document.getElementById('waiting-text');
    const elRocket = document.getElementById('rocket');
    const elGrid = document.getElementById('grid');
    const elHistory = document.getElementById('history');
    const elPlayers = document.getElementById('playersList');
    const btnAction = document.getElementById('actionBtn');

    let isFlying = false;
    let currentX = 1.00;
    let crashPoint = 0;
    let balance = 0.02;

    const botNames = [
        {name: "Виталя Бутерин", val: "1.00", img: "https://api.dicebear.com/7.x/pixel-art/svg?seed=1"},
        {name: "Ronni fav arm", val: "0.15", img: "https://api.dicebear.com/7.x/pixel-art/svg?seed=2"},
        {name: "Чертоновский младший", val: "0.20", img: "https://api.dicebear.com/7.x/pixel-art/svg?seed=3"},
        {name: "milli @samuraipro", val: "0.10", img: "https://api.dicebear.com/7.x/pixel-art/svg?seed=4"}
    ];

    function initHistory() {
        const past = [1.33, 1.20, 1.84, 1.05, 1.95, 1.07, 1.20, 4.57, 1.21, 2.15, 1.00];
        past.forEach(val => addHistoryItem(val));
    }

    function addHistoryItem(val) {
        const span = document.createElement('span');
        span.className = 'h-item';
        let color = "#60a5fa"; // blue
        if(val >= 2) color = "#10b981"; // green
        if(val < 1.2) color = "#ef4444"; // red
        span.style.color = color;
        span.innerText = `x${val.toFixed(2)}`;
        elHistory.prepend(span);
    }

    function renderBots(isGameActive) {
        elPlayers.innerHTML = '';
        botNames.forEach((bot, index) => {
            const winX = isGameActive ? currentX.toFixed(2) : "1.00";
            const winAmount = (parseFloat(bot.val) * (isGameActive ? currentX : 1)).toFixed(2);
            
            const row = document.createElement('div');
            row.className = 'player-card';
            row.innerHTML = `
                <div class="p-left">
                    <div class="p-avatar">
                        ${index === 0 ? '<i class="fa-solid fa-crown p-crown"></i>' : ''}
                        <img src="${bot.img}">
                    </div>
                    <div class="p-info">
                        <p>${bot.name}</p>
                        <span>${bot.val} TON • x${winX}</span>
                    </div>
                </div>
                <div class="p-right">
                    <p>${winAmount} <small>TON</small> 
                    ${index === 1 ? '<img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" class="p-item-icon">' : ''}
                    ${index === 2 ? '<img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" class="p-item-icon">' : ''}
                    </p>
                </div>
            `;
            elPlayers.appendChild(row);
        });
    }

    function startWaiting() {
        isFlying = false;
        elMult.style.display = 'none';
        elRocket.style.display = 'none';
        elGrid.style.display = 'none';
        elTimer.style.display = 'block';
        elWaitText.style.display = 'block';
        btnAction.className = "bet-btn btn-blue";
        btnAction.innerHTML = '<i class="fa-solid fa-gem"></i> Ставка';
        
        let timeLeft = 5.00;
        const t = setInterval(() => {
            timeLeft -= 0.1;
            elTimer.innerText = "0" + timeLeft.toFixed(2);
            if(timeLeft <= 0) {
                clearInterval(t);
                startFlight();
            }
        }, 100);
        renderBots(false);
    }

    function startFlight() {
        isFlying = true;
        currentX = 1.00;
        crashPoint = generateCrash();
        
        elTimer.style.display = 'none';
        elWaitText.style.display = 'none';
        elMult.style.display = 'block';
        elMult.style.color = '#fff';
        elRocket.style.display = 'block';
        elGrid.style.display = 'block';
        
        btnAction.className = "bet-btn btn-orange";
        btnAction.innerHTML = "ЗАБРАТИ";

        const f = setInterval(() => {
            if(!isFlying) { clearInterval(f); return; }
            currentX += 0.01 + (currentX * 0.005);
            elMult.innerText = currentX.toFixed(2) + "x";
            
            // Rocket animation
            let progress = (currentX - 1) * 40;
            elRocket.style.transform = `translate(${progress}px, -${progress}px)`;
            
            renderBots(true);

            if(currentX >= crashPoint) {
                clearInterval(f);
                explode();
            }
        }, 100);
    }

    function explode() {
        isFlying = false;
        tg.HapticFeedback.notificationOccurred('error');
        elMult.style.color = 'var(--danger)';
        elMult.innerText = currentX.toFixed(2);
        addHistoryItem(currentX);
        
        setTimeout(startWaiting, 3000);
    }

    function generateCrash() {
        const r = Math.random();
        if(r < 0.05) return 1.00;
        return (0.98 / (1 - r)).toFixed(2);
    }

    // Init
    initHistory();
    startWaiting();

    // Button Logic
    btnAction.onclick = () => {
        if(isFlying) {
            tg.HapticFeedback.notificationOccurred('success');
            const win = (0.01 * currentX).toFixed(2);
            tg.showAlert(`Ви забрали ${win} TON!`);
            btnAction.disabled = true;
            btnAction.style.opacity = "0.5";
        } else {
            tg.HapticFeedback.impactOccurred('light');
            btnAction.innerHTML = "ГОТОВО";
        }
    };
</script>

</body>
</html>
