<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Гра Краш</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Базові стилі */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #0e1219;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0e1219;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background-color: #0e1219;
            border-bottom: 1px solid #1e2630;
            z-index: 100;
        }
        
        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .balance-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #0e1219;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #31465c;
            cursor: pointer;
        }
        
        .balance-value {
            font-weight: 600;
            font-size: 13px;
            color: #f0b90b;
        }

        /* Game Screens */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 70px;
        }
        
        .screen.active {
            display: flex;
        }

        /* Crash Game Area */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #0d1117;
            background-image: 
                linear-gradient(#1a202c 1px, transparent 1px),
                linear-gradient(90deg, #1a202c 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
        }

        .multiplier-container {
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 1px solid rgba(240, 185, 11, 0.3);
        }
        
        .multiplier-display {
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 30px rgba(240, 185, 11, 0.4);
        }

        .rocket-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            transition: transform 0.1s linear;
        }
        
        .rocket-svg {
            width: 60px;
            height: 60px;
            transform: rotate(45deg);
        }

        .rocket-crashed {
            filter: drop-shadow(0 0 20px #fc8181) grayscale(1);
            opacity: 0.5;
        }

        /* UI Elements */
        .history-stats {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid #1e2630;
        }

        .bet-area {
            padding: 16px;
            background: #0e1219;
            border-top: 1px solid #1e2630;
        }

        .bet-action-btn {
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-main { background: linear-gradient(135deg, #f0b90b, #d4a50a); color: #000; }
        .btn-secondary { background: #1e2630; color: #fff; }
        .btn-withdraw { background: #2ecc71; color: #fff; }

        .hidden { display: none !important; }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bet-panel {
            background: #1a232f;
            width: 100%;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #31465c;
        }

        /* Navbar */
        .navbar {
            position: absolute;
            bottom: 0; width: 100%;
            display: flex;
            background: #0e1219;
            border-top: 1px solid #1e2630;
            padding: 5px 0;
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            color: #6b7f98;
            font-size: 10px;
            padding: 5px;
        }
        
        .nav-item.active { color: #f0b90b; }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-info">
                <div class="user-name" id="userName">Гравець</div>
                <div class="user-level">Level 1</div>
            </div>
        </div>
        <div class="balance-block" id="openDeposit">
            <span class="balance-value" id="balanceValue">100.00</span>
            <span style="font-size: 12px;">⭐</span>
        </div>
    </div>

    <div id="crashScreen" class="screen active">
        <div class="history-stats">
            <span style="color: #6b7f98; font-size: 12px;">ІСТОРІЯ</span>
            <div id="historyList" style="display: flex; gap: 5px;">
                <span style="color: #68d391;">x1.50</span>
                <span style="color: #fc8181;">x1.05</span>
            </div>
        </div>

        <div class="game-area">
            <div class="multiplier-container">
                <div class="multiplier-display" id="multiplier">1.00x</div>
            </div>
            <div class="rocket-container" id="rocketContainer">
                <div class="rocket-svg">🚀</div>
            </div>
        </div>

        <div class="bet-area">
            <div id="statusText" style="text-align: center; font-size: 11px; color: #6b7f98; margin-bottom: 10px;">ОЧІКУВАННЯ РАУНДУ</div>
            <button class="bet-action-btn btn-main" id="btnPlaceBet">ЗРОБИТИ СТАВКУ</button>
            <button class="bet-action-btn btn-withdraw hidden" id="btnWithdraw">ЗАБРАТИ</button>
        </div>
    </div>

    <div id="inventoryScreen" class="screen">
        <div style="padding: 40px; text-align: center;">🎒 Інвентар порожній</div>
    </div>
    <div id="profileScreen" class="screen">
        <div style="padding: 40px; text-align: center;">👤 Профіль користувача</div>
    </div>

    <div id="betOverlay" class="overlay hidden">
        <div class="bet-panel">
            <h3 style="margin-bottom: 15px; color: #f0b90b;">Сума ставки</h3>
            <input type="number" id="inputBet" value="10" style="width: 100%; padding: 15px; border-radius: 10px; background: #0e1219; border: 1px solid #31465c; color: #fff; font-size: 20px; margin-bottom: 15px;">
            <button class="bet-action-btn btn-main" id="btnConfirmBet">ПІДТВЕРДИТИ</button>
            <button class="bet-action-btn btn-secondary" id="btnCloseBet">СКАСУВАТИ</button>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item" onclick="showScreen('inventory', this)">
            <i class="fa-solid fa-box"></i><span>Склад</span>
        </div>
        <div class="nav-item active" onclick="showScreen('crash', this)">
            <i class="fa-solid fa-rocket"></i><span>Краш</span>
        </div>
        <div class="nav-item" onclick="showScreen('profile', this)">
            <i class="fa-solid fa-user"></i><span>Профіль</span>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Стан гри
    let balance = 100.00;
    let currentMultiplier = 1.00;
    let isPlaying = false;
    let betAmount = 0;
    let gameInterval;
    let isCrashed = false;

    // Елементи
    const multText = document.getElementById('multiplier');
    const rocket = document.getElementById('rocketContainer');
    const btnPlaceBet = document.getElementById('btnPlaceBet');
    const btnWithdraw = document.getElementById('btnWithdraw');
    const statusText = document.getElementById('statusText');

    function showScreen(screen, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screen + 'Screen').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function startRound() {
        isCrashed = false;
        currentMultiplier = 1.00;
        rocket.style.transform = `translate(0, 0)`;
        rocket.classList.remove('rocket-crashed');
        multText.style.color = "#fff";
        
        let startTime = Date.now();
        let crashPoint = (Math.random() * 5 + 1).toFixed(2); // Рандомний момент крашу

        gameInterval = setInterval(() => {
            let elapsed = (Date.now() - startTime) / 1000;
            currentMultiplier = Math.pow(1.08, elapsed * 5); // Формула росту
            
            multText.innerText = currentMultiplier.toFixed(2) + "x";
            
            // Рух ракети
            let x = elapsed * 25;
            let y = Math.pow(elapsed, 1.2) * 15;
            rocket.style.transform = `translate(${x}px, -${y}px)`;

            if (currentMultiplier >= crashPoint) {
                doCrash();
            }
        }, 100);
    }

    function doCrash() {
        clearInterval(gameInterval);
        isCrashed = true;
        multText.innerText = "CRASHED!";
        multText.style.color = "#fc8181";
        rocket.classList.add('rocket-crashed');
        
        if (isPlaying) {
            statusText.innerText = "ВИ ПРОГРАЛИ!";
            isPlaying = false;
        }

        btnWithdraw.classList.add('hidden');
        btnPlaceBet.classList.remove('hidden');

        setTimeout(startRound, 4000); // Перезапуск через 4 сек
    }

    btnPlaceBet.onclick = () => {
        document.getElementById('betOverlay').classList.remove('hidden');
    };

    document.getElementById('btnConfirmBet').onclick = () => {
        let val = parseFloat(document.getElementById('inputBet').value);
        if (val > 0 && val <= balance) {
            betAmount = val;
            balance -= betAmount;
            document.getElementById('balanceValue').innerText = balance.toFixed(2);
            isPlaying = true;
            document.getElementById('betOverlay').classList.add('hidden');
            btnPlaceBet.classList.add('hidden');
            btnWithdraw.classList.remove('hidden');
            statusText.innerText = "СТАВКА ПРИЙНЯТА";
        }
    };

    btnWithdraw.onclick = () => {
        if (isPlaying && !isCrashed) {
            let win = betAmount * currentMultiplier;
            balance += win;
            document.getElementById('balanceValue').innerText = balance.toFixed(2);
            statusText.innerText = "ВИГРАШ: " + win.toFixed(2);
            isPlaying = false;
            btnWithdraw.classList.add('hidden');
            btnPlaceBet.classList.remove('hidden');
        }
    };

    document.getElementById('btnCloseBet').onclick = () => {
        document.getElementById('betOverlay').classList.add('hidden');
    };

    // Запуск
    startRound();
</script>

</body>
</html>
