<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crash</title>

<style>

body{
background:#020c1b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
margin-top:30px;
}

#mult{
font-size:70px;
margin-top:40px;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:10px;
margin-top:30px;
cursor:pointer;
}

.bet{
background:#3aa1ff;
color:white;
}

.cash{
background:#28c76f;
color:white;
}

canvas{
margin-top:30px;
background:#030e22;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🚀 Crash</h1>

<canvas id="chart" width="600" height="250"></canvas>

<div id="mult">1.00x</div>

<button class="bet" onclick="bet()">BET</button>
<button class="cash" onclick="cashout()">CASHOUT</button>

<script>

let mult=1
let playing=false
let crashed=false
let crashPoint=Math.random()*4+1.5

let ctx=document.getElementById("chart").getContext("2d")
let x=0
let y=250

function draw(){
ctx.lineTo(x,y)
ctx.strokeStyle="white"
ctx.stroke()
}

function round(){

mult=1
x=0
y=250
crashed=false
crashPoint=Math.random()*4+1.5

ctx.clearRect(0,0,600,250)
ctx.beginPath()
ctx.moveTo(0,250)

loop()

}

function loop(){

if(crashed)return

mult+=0.02

document.getElementById("mult").innerText=mult.toFixed(2)+"x"

x+=3
y-=mult*0.4

draw()

if(mult>=crashPoint){

crashed=true
document.getElementById("mult").innerText="💥 CRASH "+mult.toFixed(2)

setTimeout(round,2000)

return
}

requestAnimationFrame(loop)

}

function bet(){

if(playing)return

playing=true
alert("Ставка прийнята")

}

function cashout(){

if(!playing)return
if(crashed)return

playing=false

alert("Ви забрали "+mult.toFixed(2)+"x")

}

round()

</script>

</body>
</html>
