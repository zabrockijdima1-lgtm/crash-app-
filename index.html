<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift Ultimate - 400+ Lines Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-deep: #080a0f;
            --bg-card: #121620;
            --bg-nav: #1a1f2e;
            --accent: #4299e1;
            --green: #48bb78;
            --red: #f56565;
            --gold: #ecc94b;
            --text-main: #ffffff;
            --text-dim: #718096;
            --border: #2d3748;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-deep); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* --- LAYOUT --- */
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        /* --- HEADER --- */
        header {
            padding: 15px; background: var(--bg-nav); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .profile-section { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid #ffffff33; }
        .wallet { 
            background: #000; padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s;
        }
        .wallet:active { transform: scale(0.95); }

        /* --- NAVIGATION TABS --- */
        .screen { flex: 1; display: none; overflow-y: auto; padding-bottom: 90px; position: relative; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        /* --- CRASH GAME SCREEN --- */
        .history-strip { display: flex; gap: 8px; padding: 12px; overflow-x: auto; background: var(--bg-deep); border-bottom: 1px solid var(--border); }
        .history-strip::-webkit-scrollbar { display: none; }
        .h-badge { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; background: var(--bg-nav); border: 1px solid var(--border); }

        .game-viewport {
            height: 35vh; background: radial-gradient(circle at center, #1a202c 0%, #080a0f 100%);
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        .rocket-box { position: absolute; bottom: 20%; left: 15%; z-index: 10; transition: transform 0.1s linear; }
        .rocket-img { width: 80px; filter: drop-shadow(0 0 20px var(--accent)); }
        .multiplier-text { font-size: 64px; font-weight: 900; z-index: 20; text-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* Particle Trail */
        .particle { position: absolute; background: var(--accent); border-radius: 50%; pointer-events: none; opacity: 0.6; z-index: 5; }

        .live-bets { flex: 1; background: var(--bg-card); padding: 15px; border-radius: 25px 25px 0 0; border-top: 1px solid var(--border); }
        .bet-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ffffff0a; font-size: 13px; }

        .bet-controls {
            position: fixed; bottom: 70px; width: 100%; max-width: 500px;
            padding: 15px; background: var(--bg-nav); border-top: 1px solid var(--border);
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group input { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 12px; font-weight: 700; }
        .btn-action { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.1s; }
        .btn-bet { background: var(--accent); color: white; }
        .btn-out { background: var(--gold); color: #000; }

        /* --- CASES SCREEN --- */
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .case-card { background: var(--bg-nav); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .case-card img { width: 80px; margin-bottom: 10px; }
        
        /* --- NAV BAR --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 70px;
            background: var(--bg-nav); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
        }
        .nav-tab { color: var(--text-dim); text-align: center; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab i { font-size: 22px; margin-bottom: 4px; display: block; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes crashShake { 
            0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0); } 
            40% { transform: translate(3px, 2px); } 100% { transform: translate(0, 0); } 
        }
        .shake { animation: crashShake 0.1s linear 3; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="profile-section">
            <div class="avatar" id="userInitial">?</div>
            <div>
                <p id="userName" style="font-size: 14px; font-weight: 700;">Loading...</p>
                <p style="font-size: 11px; color: var(--text-dim);">Newbie Rank</p>
            </div>
        </div>
        <div class="wallet" onclick="showDeposit()">
            <span id="balanceText">100.00</span>
            <i class="fa-solid fa-star" style="color: var(--gold);"></i>
        </div>
    </header>

    <div id="tab-crash" class="screen active">
        <div class="history-strip" id="history">
            </div>
        <div class="game-viewport" id="viewport">
            <div class="rocket-box" id="rocket">
                <img src="https://cdn-icons-png.flaticon.com/512/1066/1066371.png" class="rocket-img">
            </div>
            <div class="multiplier-text" id="mult">1.00x</div>
        </div>

        <div class="live-bets">
            <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase;">Live Bets</p>
            <div id="liveBetsContainer">
                </div>
        </div>

        <div class="bet-controls">
            <div class="input-group">
                <input type="number" id="betInput" value="10" placeholder="Bet amount">
                <button onclick="adjustBet(2)" style="background:var(--border); color:#fff; border:none; padding:10px; border-radius:8px;">x2</button>
            </div>
            <button class="btn-action btn-bet" id="mainAction">PLACE BET</button>
        </div>
    </div>

    <div id="tab-cases" class="screen">
        <div style="padding: 20px;">
            <h2>Premium Cases</h2>
            <div class="case-grid">
                <div class="case-card" onclick="openCase('Bronze')">
                    <img src="https://cdn-icons-png.flaticon.com/512/5021/5021575.png">
                    <p>Bronze Case</p>
                    <p style="color:var(--gold)">10 ⭐️</p>
                </div>
                <div class="case-card" onclick="openCase('Diamond')">
                    <img src="https://cdn-icons-png.flaticon.com/512/2312/2312503.png">
                    <p>Diamond Case</p>
                    <p style="color:var(--gold)">100 ⭐️</p>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-inv" class="screen">
        <div style="padding: 20px; text-align: center;">
            <i class="fa-solid fa-box-open" style="font-size: 50px; color: var(--border); margin-bottom: 20px;"></i>
            <h3>Your Inventory</h3>
            <p style="color: var(--text-dim);">Empty... Open cases to win items!</p>
            <div id="invItems" style="margin-top: 20px;"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-tab active" onclick="switchTab('crash', this)">
            <i class="fa-solid fa-rocket"></i>Crash
        </div>
        <div class="nav-tab" onclick="switchTab('cases', this)">
            <i class="fa-solid fa-gift"></i>Cases
        </div>
        <div class="nav-tab" onclick="switchTab('inv', this)">
            <i class="fa-solid fa-gem"></i>Inventory
        </div>
        <div class="nav-tab" onclick="tg.showAlert('Profile stats coming soon!')">
            <i class="fa-solid fa-user"></i>Profile
        </div>
    </nav>
</div>

<script>
/* --- CORE JAVASCRIPT --- */
const tg = window.Telegram.WebApp;
tg.expand();

// State
let state = {
    balance: 1000.00,
    isPlaying: false,
    currentX: 1.00,
    crashPoint: 0,
    bet: 0,
    history: [1.2, 5.4, 1.05, 2.1, 14.2],
    inventory: []
};

// UI Elements
const elMult = document.getElementById('mult');
const elBtn = document.getElementById('mainAction');
const elBal = document.getElementById('balanceText');
const elRocket = document.getElementById('rocket');
const elHistory = document.getElementById('history');

/* --- INITIALIZATION --- */
function init() {
    if(tg.initDataUnsafe.user) {
        document.getElementById('userName').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('userInitial').innerText = tg.initDataUnsafe.user.first_name[0];
    }
    renderHistory();
    updateBalance();
    startLiveBetSimulator();
}

/* --- TAB NAVIGATION --- */
function switchTab(tabId, el) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    el.classList.add('active');
    tg.HapticFeedback.selectionChanged();
}

/* --- GAME LOGIC --- */
function adjustBet(mult) {
    const input = document.getElementById('betInput');
    input.value = (parseFloat(input.value) * mult).toFixed(0);
}

function updateBalance() {
    elBal.innerText = state.balance.toFixed(2);
}

function renderHistory() {
    elHistory.innerHTML = state.history.slice(-8).map(x => `
        <div class="h-badge" style="color: ${x > 2 ? 'var(--green)' : 'var(--red)'}">${x.toFixed(2)}x</div>
    `).join('');
}

function startRound() {
    const amount = parseFloat(document.getElementById('betInput').value);
    if(amount > state.balance) return tg.showAlert("Insufficient balance!");

    state.balance -= amount;
    state.bet = amount;
    state.isPlaying = true;
    state.currentX = 1.00;
    state.crashPoint = generateCrashPoint();
    
    updateBalance();
    elBtn.innerText = "CASH OUT";
    elBtn.classList.replace('btn-bet', 'btn-out');
    tg.HapticFeedback.impactOccurred('medium');

    gameLoop();
}

function generateCrashPoint() {
    const r = Math.random();
    if (r < 0.05) return 1.00; // House edge
    return (0.98 / (1 - r)).toFixed(2);
}

let loopRef;
function gameLoop() {
    if(!state.isPlaying) return;

    state.currentX += 0.01 * (1 + state.currentX / 20);
    elMult.innerText = state.currentX.toFixed(2) + "x";

    // Rocket Movement
    const offset = (state.currentX - 1) * 30;
    elRocket.style.transform = `translate(${offset}px, -${offset}px)`;
    createParticle(offset);

    if(state.currentX >= state.crashPoint) {
        doCrash();
    } else {
        loopRef = requestAnimationFrame(gameLoop);
    }
}

function createParticle(offset) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.width = '4px';
    p.style.height = '4px';
    p.style.left = (15 + (offset/5)) + '%';
    p.style.bottom = (20 + (offset/5)) + '%';
    document.getElementById('viewport').appendChild(p);
    setTimeout(() => p.remove(), 500);
}

function doCrash() {
    state.isPlaying = false;
    cancelAnimationFrame(loopRef);
    tg.HapticFeedback.notificationOccurred('error');
    
    elMult.style.color = 'var(--red)';
    elMult.classList.add('shake');
    elMult.innerText = "CRASHED @ " + state.currentX.toFixed(2) + "x";
    
    state.history.push(state.currentX);
    renderHistory();

    setTimeout(() => {
        elMult.style.color = 'white';
        elMult.classList.remove('shake');
        elMult.innerText = "1.00x";
        elRocket.style.transform = `translate(0, 0)`;
        elBtn.innerText = "PLACE BET";
        elBtn.classList.replace('btn-out', 'btn-bet');
        elBtn.disabled = false;
    }, 2500);
}

elBtn.onclick = () => {
    if(!state.isPlaying) {
        startRound();
    } else {
        const win = state.bet * state.currentX;
        state.balance += win;
        state.isPlaying = false;
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert(`You cashed out at ${state.currentX.toFixed(2)}x!\nWon: ${win.toFixed(2)} Stars`);
        elBtn.disabled = true;
        updateBalance();
    }
};

/* --- CASE OPENING SYSTEM --- */
function openCase(type) {
    const cost = type === 'Bronze' ? 10 : 100;
    if(state.balance < cost) return tg.showAlert("Not enough stars!");

    state.balance -= cost;
    updateBalance();

    tg.showConfirm(`Open ${type} Case for ${cost} Stars?`, (ok) => {
        if(ok) {
            // Simulated roll
            const items = ["Common Skin", "Rare Knife", "Epic Rocket", "Legendary Aura"];
            const won = items[Math.floor(Math.random() * items.length)];
            tg.showAlert(`🎊 You won: ${won}! Check inventory.`);
            state.inventory.push(won);
        }
    });
}

/* --- LIVE BETS SIMULATOR --- */
function startLiveBetSimulator() {
    const names = ["@cryptoking", "@ton_lover", "@whale99", "@shark", "@degenguy"];
    const container = document.getElementById('liveBetsContainer');

    setInterval(() => {
        if(container.children.length > 5) container.removeChild(container.lastChild);
        const row = document.createElement('div');
        row.className = 'bet-row';
        row.innerHTML = `
            <span>${names[Math.floor(Math.random()*names.length)]}</span>
            <span>${(Math.random()*100).toFixed(0)} ⭐️</span>
            <span style="color:var(--text-dim)">waiting...</span>
        `;
        container.prepend(row);
    }, 4000);
}

// Initial Call
init();

</script>
</body>
</html>
