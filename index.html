
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Краш Гра</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0e1219;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0e1219;
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #1e2630;
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
            color: #fff;
        }

        .user-level {
            font-size: 11px;
            color: #6b7f98;
        }

        .balance-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #0e1219;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #31465c;
            cursor: pointer;
        }

        .balance-value {
            font-weight: 600;
            font-size: 14px;
            color: #f0b90b;
        }

        .balance-icon {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #0e1219;
        }

        .close-btn {
            color: #8e9fb1;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }

        /* Історія ставок */
        .history-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #1e2630;
        }

        .history-title {
            color: #6b7f98;
            font-size: 12px;
            font-weight: 500;
        }

        .history-multipliers {
            display: flex;
            gap: 6px;
        }

        .history-multiplier-item {
            color: #b3c6e2;
            font-size: 12px;
            font-weight: 600;
            background: #1e2630;
            padding: 2px 6px;
            border-radius: 12px;
        }

        /* Горизонтальна історія */
        .horizontal-history {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            overflow-x: auto;
            border-bottom: 1px solid #1e2630;
        }

        .horizontal-history::-webkit-scrollbar {
            display: none;
        }

        .history-chip {
            background-color: #1e2630;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #b3c6e2;
            white-space: nowrap;
        }

        /* Ігрова зона - ВЕЛИКА */
        .game-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #0d1117;
            background-image: 
                linear-gradient(#1a202c 1px, transparent 1px),
                linear-gradient(90deg, #1a202c 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
            min-height: 300px;
        }

        /* Ракета - ВЕЛИКА */
        .rocket-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            filter: drop-shadow(0 0 20px #4299e1);
            transition: transform 0.05s linear;
            will-change: transform;
        }

        .rocket-svg {
            width: 90px;
            height: 90px;
        }

        .rocket-svg svg {
            width: 100%;
            height: 100%;
        }

        .rocket-body {
            fill: #63b3ed;
            filter: drop-shadow(0 0 10px #63b3ed);
        }

        .rocket-window {
            fill: #fff;
        }

        .rocket-crashed .rocket-body {
            fill: #fc8181;
            filter: drop-shadow(0 0 10px #fc8181);
        }

        .flame {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 40px;
            background: linear-gradient(to bottom, #ffaa00, #ff5500, #ff0000);
            border-radius: 50% 50% 30% 30%;
            animation: flameFlicker 0.1s infinite alternate;
            z-index: -1;
            filter: blur(3px);
        }

        @keyframes flameFlicker {
            0% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
            100% { opacity: 1; transform: translateX(-50%) scaleY(1.4); }
        }

        /* Множник - ВЕЛИКИЙ */
        .multiplier-container {
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 2px solid rgba(240, 185, 11, 0.5);
        }

        .multiplier-display {
            font-size: 80px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 40px rgba(240, 185, 11, 0.8);
            transition: color 0.2s, text-shadow 0.2s;
        }

        /* Потенційний виграш */
        .potential-win {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #68d391;
            border: 1px solid #68d391;
            z-index: 30;
        }

        /* Зона ставок */
        .bet-area {
            padding: 16px;
            background-color: #0e1219;
            border-top: 1px solid #1e2630;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-text {
            text-align: center;
            color: #6b7f98;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bet-buttons {
            display: flex;
            gap: 12px;
        }

        .bet-action-btn {
            flex: 1;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border: none;
            color: #0e1219;
            font-weight: 700;
            font-size: 16px;
            padding: 14px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
        }

        .bet-action-btn:active {
            transform: scale(0.95);
        }

        .bet-action-btn.secondary {
            background: #1e2630;
            color: #b3c6e2;
        }

        .bet-action-btn.withdraw {
            background: linear-gradient(135deg, #f687b3, #ed64a6);
            color: #fff;
        }

        /* Список гравців */
        .players-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a232f;
            border-radius: 10px;
            padding: 8px 12px;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-avatar-small {
            width: 24px;
            height: 24px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }

        .player-name {
            font-weight: 600;
            font-size: 13px;
            color: #fff;
        }

        .player-bet {
            color: #f0b90b;
            font-size: 12px;
            margin-right: 8px;
        }

        .player-multiplier {
            background-color: #253040;
            padding: 3px 8px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            color: #b3c6e2;
        }

        /* Панель ставки */
        .bet-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bet-panel {
            background: #1a232f;
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #31465c;
        }

        .bet-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .bet-panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #f0b90b;
        }

        .bet-panel-close {
            color: #8e9fb1;
            font-size: 20px;
            cursor: pointer;
        }

        .bet-input-container {
            background: #0e1219;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #31465c;
        }

        .bet-input-label {
            color: #8e9fb1;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .bet-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bet-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            outline: none;
        }

        .bet-max-btn {
            background: #1e2630;
            border: 1px solid #f0b90b;
            color: #f0b90b;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .bet-quick-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .quick-bet-btn {
            background: #0e1219;
            border: 1px solid #31465c;
            color: #b3c6e2;
            padding: 12px 0;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .place-bet-btn {
            width: 100%;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border: none;
            color: #0e1219;
            font-weight: 700;
            font-size: 16px;
            padding: 16px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* Навігація */
        .navbar {
            display: flex;
            background-color: #0e1219;
            border-top: 1px solid #1e2630;
            padding: 6px 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #6b7f98;
            font-size: 11px;
            padding: 6px 0;
            cursor: pointer;
        }

        .nav-item.active {
            color: #f0b90b;
        }

        .nav-icon {
            font-size: 20px;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Хедер -->
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="userAvatar">Д</div>
            <div class="user-info">
                <div class="user-name" id="userName">Діма | BIO</div>
                <div class="user-level">Level 1</div>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <div class="balance-block" id="balanceBlock">
                <span class="balance-value" id="balanceValue">100</span>
                <div class="balance-icon">⭐</div>
            </div>
            <div class="close-btn" id="closeBtn">✕</div>
        </div>
    </div>

    <!-- Головний екран -->
    <div id="crashScreen" class="screen active">
        <!-- Історія ставок -->
        <div class="history-stats">
            <span class="history-title">Історія ставок</span>
            <div class="history-multipliers" id="historyMultipliers">
                <span class="history-multiplier-item">1.8x</span>
                <span class="history-multiplier-item">1.6x</span>
                <span class="history-multiplier-item">1.4x</span>
                <span class="history-multiplier-item">1.2x</span>
            </div>
        </div>

        <!-- Горизонтальна історія -->
        <div class="horizontal-history" id="historyBar">
            <span class="history-chip">x1.65</span>
            <span class="history-chip">x28.29</span>
            <span class="history-chip">x10.19</span>
            <span class="history-chip">x4.25</span>
            <span class="history-chip">x2.04</span>
            <span class="history-chip">x1.29</span>
        </div>

        <!-- Ігрова зона з ракетою -->
        <div class="game-area" id="gameArea">
            <div class="rocket-container" id="rocketContainer">
                <div class="rocket-svg">
                    <svg viewBox="0 0 100 100">
                        <!-- Корпус ракети -->
                        <path class="rocket-body" d="M50 10 L70 40 L70 70 L30 70 L30 40 L50 10 Z" fill="#63b3ed"/>
                        <!-- Ніс ракети -->
                        <polygon points="50,10 60,25 40,25" fill="#4a86b8"/>
                        <!-- Крила -->
                        <polygon points="30,40 15,50 30,60" fill="#4a86b8"/>
                        <polygon points="70,40 85,50 70,60" fill="#4a86b8"/>
                        <!-- Ілюмінатор -->
                        <circle cx="50" cy="40" r="8" fill="#fff"/>
                        <circle cx="50" cy="40" r="5" fill="#2d3748"/>
                    </svg>
                </div>
                <div class="flame"></div>
            </div>

            <div class="multiplier-container">
                <div class="multiplier-display" id="multiplier">1.00x</div>
            </div>

            <div class="potential-win hidden" id="potentialWin">💰 0.00 ⭐</div>
        </div>

        <!-- Зона ставок -->
        <div class="bet-area">
            <div class="info-text" id="roundStatus">ВИ МОЖЕТЕ ПОСТАВИТИ СТАВКУ НА НАСТУПНИЙ РАУНД</div>

            <div class="bet-buttons">
                <button class="bet-action-btn secondary" id="showBetPanelBtn">
                    <i class="fa-solid fa-star"></i> Ставка
                </button>
                <button class="bet-action-btn withdraw hidden" id="withdrawBtn">
                    <i class="fa-solid fa-money-bill-wave"></i> ЗАБРАТИ
                </button>
            </div>

            <!-- Список гравців -->
            <div class="players-list" id="playersList"></div>
        </div>
    </div>

    <!-- Інші екрани (заглушки) -->
    <div id="inventoryScreen" class="screen">
        <div style="padding: 20px; text-align: center;">Інвентар</div>
    </div>
    <div id="craftScreen" class="screen">
        <div style="padding: 20px; text-align: center;">Крафт</div>
    </div>
    <div id="casesScreen" class="screen">
        <div style="padding: 20px; text-align: center;">Кейси</div>
    </div>
    <div id="profileScreen" class="screen">
        <div style="padding: 20px; text-align: center;">Профіль</div>
    </div>

    <!-- Панель ставки -->
    <div class="bet-panel-overlay hidden" id="betPanelOverlay">
        <div class="bet-panel">
            <div class="bet-panel-header">
                <span class="bet-panel-title">Сума ставки</span>
                <span class="bet-panel-close" id="closeBetPanel">✕</span>
            </div>

            <div class="bet-input-container">
                <div class="bet-input-label">⭐ Зірки</div>
                <div class="bet-input-row">
                    <input type="number" id="betAmount" min="1" value="1" step="1">
                    <span class="bet-max-btn" id="maxBetBtn">MAX</span>
                </div>
            </div>

            <div class="bet-quick-btns">
                <button class="quick-bet-btn" data-add="1">+1</button>
                <button class="quick-bet-btn" data-add="5">+5</button>
                <button class="quick-bet-btn" data-add="10">+10</button>
                <button class="quick-bet-btn" data-add="50">+50</button>
            </div>

            <button class="place-bet-btn" id="confirmBetBtn">Поставити ставку</button>
        </div>
    </div>

    <!-- Навігація -->
    <div class="navbar">
        <div class="nav-item" data-screen="inventory">
            <i class="fa-solid fa-box-archive nav-icon"></i>
            <span>Інвентар</span>
        </div>
        <div class="nav-item" data-screen="craft">
            <i class="fa-solid fa-hammer nav-icon"></i>
            <span>Крафт</span>
        </div>
        <div class="nav-item active" data-screen="crash">
            <i class="fa-solid fa-rocket nav-icon"></i>
            <span>Краш</span>
        </div>
        <div class="nav-item" data-screen="cases">
            <i class="fa-solid fa-gift nav-icon"></i>
            <span>Кейси</span>
        </div>
        <div class="nav-item" data-screen="profile">
            <i class="fa-solid fa-user nav-icon"></i>
            <span>Профіль</span>
        </div>
    </div>
</div>

<script>
    // Дані користувача
    let balance = 100;
    let currentMultiplier = 1.00;
    let gameActive = true;
    let isCrashed = false;
    let gameLoop = null;
    let rocketPos = 0;
    let currentBet = 0;
    let isPlaying = false;
    let autoWithdrawMultiplier = null;
    let canBet = true; // Завжди можна ставити

    // Список гравців (реальних)
    let players = [
        { name: 'МАТРОС', bet: 0.11, multiplier: 1.65, avatar: 'М' },
        { name: 'MANIAC', bet: 0.10, multiplier: 1.65, avatar: 'M' },
        { name: 'Pudgik', bet: 0.10, multiplier: 1.65, avatar: 'P' }
    ];

    // Елементи
    const balanceSpan = document.getElementById('balanceValue');
    const multiplierEl = document.getElementById('multiplier');
    const playersList = document.getElementById('playersList');
    const rocketContainer = document.getElementById('rocketContainer');
    const potentialWin = document.getElementById('potentialWin');
    const roundStatus = document.getElementById('roundStatus');
    const showBetPanelBtn = document.getElementById('showBetPanelBtn');
    const withdrawBtn = document.getElementById('withdrawBtn');
    const balanceBlock = document.getElementById('balanceBlock');
    const closeBtn = document.getElementById('closeBtn');
    const navItems = document.querySelectorAll('.nav-item');
    const screens = {
        crash: document.getElementById('crashScreen'),
        inventory: document.getElementById('inventoryScreen'),
        craft: document.getElementById('craftScreen'),
        cases: document.getElementById('casesScreen'),
        profile: document.getElementById('profileScreen')
    };

    // Bet panel
    const betPanelOverlay = document.getElementById('betPanelOverlay');
    const closeBetPanel = document.getElementById('closeBetPanel');
    const betAmountInput = document.getElementById('betAmount');
    const maxBetBtn = document.getElementById('maxBetBtn');
    const quickBetBtns = document.querySelectorAll('.quick-bet-btn');
    const confirmBetBtn = document.getElementById('confirmBetBtn');

    function updateBalanceDisplay() {
        balanceSpan.textContent = balance;
    }

    function renderPlayers() {
        playersList.innerHTML = players.map(player => `
            <div class="player-row">
                <div class="player-left">
                    <div class="player-avatar-small">${player.avatar}</div>
                    <span class="player-name">${player.name}</span>
                </div>
                <div>
                    <span class="player-bet">${player.bet.toFixed(2)} ⭐</span>
                    <span class="player-multiplier">x${player.multiplier.toFixed(2)}</span>
                </div>
            </div>
        `).join('');
    }

    function addPlayerBet(name, bet) {
        // Додаємо гравця в список
        players.unshift({
            name: name,
            bet: bet,
            multiplier: currentMultiplier,
            avatar: name.charAt(0)
        });
        
        // Обмежуємо список до 10 гравців
        if (players.length > 10) {
            players.pop();
        }
        renderPlayers();
    }

    function crash() {
        isCrashed = true;
        gameActive = false;
        
        // Додаємо в історію
        const historyBar = document.getElementById('historyBar');
        const chip = document.createElement('span');
        chip.className = 'history-chip';
        chip.textContent = `x${currentMultiplier.toFixed(2)}`;
        historyBar.prepend(chip);
        if (historyBar.children.length > 6) {
            historyBar.removeChild(historyBar.lastChild);
        }

        // Оновлюємо множники
        const historyMultipliers = document.getElementById('historyMultipliers');
        const multChip = document.createElement('span');
        multChip.className = 'history-multiplier-item';
        multChip.textContent = `${currentMultiplier.toFixed(1)}x`;
        historyMultipliers.prepend(multChip);
        if (historyMultipliers.children.length > 4) {
            historyMultipliers.removeChild(historyMultipliers.lastChild);
        }

        multiplierEl.style.color = '#fc8181';
        multiplierEl.style.textShadow = '0 0 40px rgba(245, 101, 101, 0.8)';
        multiplierEl.textContent = '💥 ' + currentMultiplier.toFixed(2) + 'x';
        
        rocketContainer.classList.add('rocket-crashed');
        potentialWin.classList.add('hidden');
        
        if (isPlaying) {
            isPlaying = false;
            showBetPanelBtn.classList.remove('hidden');
            withdrawBtn.classList.add('hidden');
        }
        
        // Новий раунд через 3 секунди (без таймера на екрані)
        setTimeout(() => {
            startNewRound();
        }, 3000);
    }

    function startNewRound() {
        isCrashed = false;
        gameActive = true;
        currentMultiplier = 1.00;
        rocketPos = 0;
        
        multiplierEl.style.color = '#fff';
        multiplierEl.style.textShadow = '0 0 40px rgba(240, 185, 11, 0.6)';
        multiplierEl.textContent = '1.00x';
        
        rocketContainer.classList.remove('rocket-crashed');
        rocketContainer.style.transform = 'translate(0, 0) rotate(0deg)';
        
        roundStatus.textContent = 'ВИ МОЖЕТЕ ПОСТАВИТИ СТАВКУ НА НАСТУПНИЙ РАУНД';
        
        showBetPanelBtn.classList.remove('hidden');
        
        // Оновлюємо множники гравців
        players.forEach(p => p.multiplier = currentMultiplier);
        renderPlayers();
    }

    function switchScreen(screenId) {
        Object.values(screens).forEach(s => s?.classList.remove('active'));
        if (screens[screenId]) screens[screenId].classList.add('active');
        navItems.forEach(item => {
            item.classList.toggle('active', item.dataset.screen === screenId);
        });
    }

    // Ініціалізація Telegram
    let tg = window.Telegram?.WebApp;
    if (!tg) {
        tg = {
            showAlert: alert,
            HapticFeedback: { impactOccurred: () => {}, notificationOccurred: () => {} },
            close: () => {}
        };
    }
    
    tg.expand();
    tg.ready();

    if (tg.initDataUnsafe?.user) {
        const user = tg.initDataUnsafe.user;
        document.getElementById('userName').textContent = 
            user.first_name + (user.last_name ? ' ' + user.last_name : '');
        document.getElementById('userAvatar').textContent = user.first_name.charAt(0);
    }

    // Кнопка ставки
    showBetPanelBtn.addEventListener('click', () => {
        if (!canBet) {
            tg.showAlert('❌ Зачекайте нового раунду');
            return;
        }
        betPanelOverlay.classList.remove('hidden');
        tg.HapticFeedback?.impactOccurred('light');
    });

    closeBetPanel.addEventListener('click', () => {
        betPanelOverlay.classList.add('hidden');
    });

    maxBetBtn.addEventListener('click', () => {
        betAmountInput.value = balance;
    });

    quickBetBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const add = parseInt(btn.dataset.add);
            const current = parseInt(betAmountInput.value) || 1;
            betAmountInput.value = current + add;
        });
    });

    // Підтвердження ставки
    confirmBetBtn.addEventListener('click', () => {
        if (!gameActive || isCrashed) {
            tg.showAlert('❌ Зачекайте нового раунду');
            return;
        }
        
        const betAmount = parseInt(betAmountInput.value) || 1;
        
        if (balance < betAmount) {
            tg.showAlert('❌ Недостатньо зірок');
            return;
        }
        
        currentBet = betAmount;
        balance -= betAmount;
        isPlaying = true;
        
        // Додаємо гравця в список
        addPlayerBet('Гравець', betAmount);
        
        updateBalanceDisplay();
        
        potentialWin.classList.remove('hidden');
        betPanelOverlay.classList.add('hidden');
        showBetPanelBtn.classList.add('hidden');
        withdrawBtn.classList.remove('hidden');
        
        tg.HapticFeedback?.impactOccurred('medium');
    });

    // Забрати виграш
    withdrawBtn.addEventListener('click', () => {
        if (!isPlaying || !gameActive || isCrashed) return;
        
        const winAmount = Math.floor(currentBet * currentMultiplier);
        balance += winAmount;
        isPlaying = false;
        
        updateBalanceDisplay();
        
        potentialWin.classList.add('hidden');
        withdrawBtn.classList.add('hidden');
        showBetPanelBtn.classList.remove('hidden');
        
        tg.HapticFeedback?.notificationOccurred('success');
        tg.showAlert(`✅ Виграш: ${winAmount} ⭐`);
    });

    // Навігація
    navItems.forEach(item => {
        item.addEventListener('click', () => switchScreen(item.dataset.screen));
    });

    balanceBlock.addEventListener('click', () => {
        tg.showAlert('💰 Поповнення скоро буде доступне');
    });

    closeBtn.addEventListener('click', () => tg.close());

    // Ігровий цикл
    function gameTick() {
        if (!gameActive || isCrashed) return;

        // Випадковий краш
        if (Math.random() < 0.015 && currentMultiplier > 1.3) {
            crash();
            return;
        }

        // Збільшуємо множник
        currentMultiplier += 0.008 + (currentMultiplier * 0.0015);
        multiplierEl.textContent = currentMultiplier.toFixed(2) + 'x';
        
        // Рух ракети
        rocketPos += 0.5;
        const gameArea = document.getElementById('gameArea');
        const maxWidth = gameArea.clientWidth - 100;
        const maxHeight = gameArea.clientHeight - 100;
        
        const x = Math.min(rocketPos * 2, maxWidth);
        const y = Math.max(30, maxHeight - rocketPos * 1.5);
        const rotation = 10 + rocketPos * 0.2;
        
        rocketContainer.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
        
        // Оновлюємо потенційний виграш
        if (isPlaying) {
            const win = Math.floor(currentBet * currentMultiplier);
            potentialWin.textContent = `💰 ${win} ⭐`;
        }
        
        // Оновлюємо множники гравців
        players.forEach(p => p.multiplier = currentMultiplier);
        renderPlayers();
    }

    // Запуск
    startNewRound();
    gameLoop = setInterval(gameTick, 50);
    renderPlayers();
    updateBalanceDisplay();

    window.addEventListener('beforeunload', () => {
        if (gameLoop) clearInterval(gameLoop);
    });
</script>
</body>
</html>
