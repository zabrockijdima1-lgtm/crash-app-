<<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0e14; color: #fff; overflow: hidden; height: 100vh; }
        
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #11151c;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #1a202c;
            border-bottom: 1px solid #2d3748;
        }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; background-color: #718096; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: 700; font-size: 14px; }
        .user-level { font-size: 11px; color: #a0aec0; }
        
        .balance-block { display: flex; align-items: center; gap: 6px; background-color: #0b0e14; padding: 6px 12px; border-radius: 8px; border: 1px solid #2d3748; cursor: pointer; transition: 0.2s; }
        .balance-block:active { background-color: #1f2a3a; }
        .balance-value { font-weight: 700; font-size: 14px; color: #fff; }
        .balance-icon { width: 14px; height: 14px; background-color: #0088cc; border-radius: 50%; }

        .history-bar {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            background-color: #11151c;
            overflow-x: auto;
            border-bottom: 1px solid #1a202c;
        }
        .history-bar::-webkit-scrollbar { display: none; }
        .history-item { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
        .x-blue { background-color: rgba(66, 153, 225, 0.15); color: #63b3ed; }
        .x-green { background-color: rgba(72, 187, 120, 0.15); color: #68d391; }
        .x-yellow { background-color: rgba(236, 201, 75, 0.15); color: #faf089; }
        .x-red { background-color: rgba(245, 101, 101, 0.15); color: #fc8181; }

        .game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #0d1117;
            background-image: linear-gradient(#1a202c 1px, transparent 1px), linear-gradient(90deg, #1a202c 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .multiplier-display {
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 40px rgba(66, 153, 225, 0.6);
            position: relative;
            z-index: 10;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .rocket-svg {
            position: absolute;
            width: 150px;
            opacity: 0.6;
            filter: drop-shadow(0 0 20px #4299e1);
            transition: opacity 0.3s, filter 0.3s;
        }
        .rocket-crashed {
            filter: drop-shadow(0 0 20px #fc8181);
            opacity: 0.9;
        }

        .bet-area {
            padding: 16px;
            background-color: #1a202c;
            border-top: 1px solid #2d3748;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .next-round-text { text-align: center; color: #a0aec0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        
        .bet-buttons-row { display: flex; gap: 10px; }
        .bet-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s, background 0.2s; }
        .bet-btn:active { transform: scale(0.97); }
        .bet-btn:disabled { opacity: 0.5; pointer-events: none; }
        
        .btn-left { background-color: #11151c; color: #63b3ed; border: 1px solid #2d3748; }
        .btn-main { background: linear-gradient(135deg, #4299e1, #3182ce); color: #fff; flex: 1.5; }
        .btn-withdraw { background: linear-gradient(135deg, #f6ad55, #ed8936); color: #fff; }

        /* Міні-меню ставок */
        .bet-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bet-presets {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .preset-btn {
            flex: 1;
            background-color: #0b0e14;
            border: 1px solid #2d3748;
            color: #a0aec0;
            padding: 8px 0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .preset-btn.active-preset {
            background-color: #3182ce;
            color: white;
            border-color: #63b3ed;
        }
        .bet-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #0b0e14;
            border-radius: 10px;
            padding: 4px 12px;
            border: 1px solid #2d3748;
        }
        .bet-input-row span { color: #a0aec0; font-size: 14px; }
        .bet-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }
        .bet-input-row input[type="number"]::-webkit-inner-spin-button { opacity: 0.5; }

        .navbar {
            display: flex;
            background-color: #1a202c;
            border-top: 1px solid #2d3748;
            padding: 6px 0;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #a0aec0; text-decoration: none; font-size: 11px; padding: 10px 0; position: relative; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: #fff; }
        .nav-item.active::after { content: ''; position: absolute; top: -7px; left: 25%; width: 50%; height: 2px; background-color: #4299e1; }
        .nav-icon { font-size: 20px; }

        .hidden { display: none; }
        .toast-message {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #68d391;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid #2d3748;
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="userAvatar">Д</div>
            <div class="user-info">
                <span class="user-name" id="userName">Діма | BIO</span>
                <span class="user-level">🔰 Level 1</span>
            </div>
        </div>
        <div class="balance-block" id="balanceBlock">
            <span class="balance-value" id="balanceValue">10.00</span> <span style="font-size: 11px; opacity: 0.7;">TON</span>
            <div class="balance-icon"></div>
        </div>
    </div>

    <div class="history-bar" id="historyBar">
        <!-- Динамічно додаються -->
        <span class="history-item x-blue">1.33x</span>
        <span class="history-item x-green">2.15x</span>
        <span class="history-item x-red">1.00x</span>
        <span class="history-item x-blue">1.94x</span>
    </div>

    <div class="game-area" id="gameArea">
        <svg class="rocket-svg" id="rocketSvg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L9.5 7L4.5 9.5L9.5 12L12 17L14.5 12L19.5 9.5L14.5 7L12 2Z" fill="#63B3ED" fill-opacity="0.3"/>
            <path d="M11.9998 2V12M11.9998 12L14.1208 14.121M11.9998 12V22M11.9998 12L9.8787 14.121M14.1208 14.121C14.7318 14.732 15.0378 15.54 15.0378 16.348C15.0378 17.156 14.7318 17.964 14.1208 18.575M9.8787 14.121C9.2677 14.732 8.9617 15.54 8.9617 16.348C8.9617 17.156 9.2677 17.964 9.8787 18.575" stroke="#63B3ED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18.575 9.8787C17.964 9.2677 17.156 8.9617 16.348 8.9617C15.54 8.9617 14.732 9.2677 14.121 9.8787M18.575 14.121C19.186 14.732 19.492 15.54 19.492 16.348C19.492 17.156 19.186 17.964 18.575 18.575" stroke="#63B3ED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5.425 9.8787C6.036 9.2677 6.844 8.9617 7.652 8.9617C8.46 8.9617 9.268 9.2677 9.879 9.8787M5.425 14.121C4.814 14.732 4.508 15.54 4.508 16.348C4.508 17.156 4.814 17.964 5.425 18.575" stroke="#63B3ED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="multiplier-display" id="multiplier">1.00x</div>
    </div>

    <div class="bet-area">
        <div class="next-round-text" id="roundStatus">⚡ Зробіть ставку на наступний раунд</div>
        
        <!-- Панель керування ставкою (спочатку прихована, з'являється за кнопкою "Ставка") -->
        <div class="bet-panel hidden" id="betPanel">
            <div class="bet-presets">
                <button class="preset-btn" data-bet="0.5">0.5 TON</button>
                <button class="preset-btn" data-bet="1">1 TON</button>
                <button class="preset-btn" data-bet="2.5">2.5 TON</button>
                <button class="preset-btn" data-bet="5">5 TON</button>
            </div>
            <div class="bet-input-row">
                <span>💰</span>
                <input type="number" id="betAmount" min="0.1" step="0.1" value="1.0" placeholder="Сума">
                <span>TON</span>
            </div>
        </div>

        <div class="bet-buttons-row">
            <button class="bet-btn btn-left" id="showBetPanelBtn">
                <i class="fa-solid fa-gift"></i>
                Ставка
            </button>
            <button class="bet-btn btn-main" id="actionBtn">
                <i class="fa-solid fa-gem"></i>
                Поставити
            </button>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item"><i class="fa-solid fa-box-archive nav-icon"></i>Інвентар</div>
        <div class="nav-item"><i class="fa-solid fa-hammer nav-icon"></i>Крафт</div>
        <div class="nav-item active"><i class="fa-solid fa-rocket nav-icon"></i>Краш</div>
        <div class="nav-item"><i class="fa-solid fa-gift nav-icon"></i>Кейси</div>
        <div class="nav-item"><i class="fa-solid fa-user nav-icon"></i>Профіль</div>
    </div>
</div>

<script>
    (function() {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#1a202c');
        tg.setBackgroundColor('#11151c');

        // --- Ініціалізація користувача та балансу (зберігання в localStorage) ---
        let balance = parseFloat(localStorage.getItem('stonks_balance')) || 10.0; // Стартовий баланс

        // Елементи DOM
        const multDisplay = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const historyBar = document.getElementById('historyBar');
        const showBetPanelBtn = document.getElementById('showBetPanelBtn');
        const betPanel = document.getElementById('betPanel');
        const betAmountInput = document.getElementById('betAmount');
        const presetBtns = document.querySelectorAll('.preset-btn');
        const balanceValueSpan = document.getElementById('balanceValue');
        const roundStatus = document.getElementById('roundStatus');
        const rocketSvg = document.getElementById('rocketSvg');
        const userNameSpan = document.getElementById('userName');
        const userAvatarSpan = document.getElementById('userAvatar');

        // Дані Telegram
        if (tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            userNameSpan.textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            userAvatarSpan.textContent = user.first_name.charAt(0).toUpperCase();
        } else {
            // Тестові дані
            userNameSpan.textContent = 'Діма | BIO';
        }

        // Стан гри
        let isPlaying = false;          // Чи зробив гравець ставку (гравець в раунді)
        let isGameActive = false;       // Чи йде раунд (ракета летить)
        let isCrashed = false;          
        let currentMultiplier = 1.00;
        let crashPoint = 1.00;           // Точка крашу для поточного раунду
        let gameLoopInterval = null;
        let roundTimeout = null;
        let currentBet = 0;              // Сума поточної ставки
        let hasCashedOut = false;        // Чи забрав гравець гроші в цьому раунді

        // Оновлення відображення балансу
        function updateBalanceDisplay() {
            balanceValueSpan.textContent = balance.toFixed(2);
            localStorage.setItem('stonks_balance', balance.toString());
        }
        updateBalanceDisplay();

        // Генерація точки крашу (чесна, з 5% edge)
        function generateCrashPoint() {
            const seed = Math.random();
            // 5% шанс крашу одразу на 1.00 (повернення ставки, але по суprogram)
            if (seed < 0.05) return 1.00;
            // Крива: 0.98/(1-seed) - дає середнє значення ~1.05x (але з довгим хвостом)
            return parseFloat((0.98 / (1 - seed)).toFixed(2));
        }

        // Додати запис в історію
        function addToHistory(val) {
            const item = document.createElement('span');
            let colorClass = 'x-blue';
            const num = parseFloat(val);
            if (num >= 3) colorClass = 'x-yellow';
            else if (num >= 2) colorClass = 'x-green';
            else if (num < 1.2) colorClass = 'x-red';
            
            item.className = `history-item ${colorClass}`;
            item.textContent = (typeof val === 'number' ? val.toFixed(2) : val) + 'x';
            
            historyBar.prepend(item);
            if (historyBar.children.length > 12) {
                historyBar.removeChild(historyBar.lastChild);
            }
        }

        // Функція крашу
        function doCrash() {
            if (isCrashed) return;
            isCrashed = true;
            isGameActive = false;
            if (gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }

            // Вібрація
            tg.HapticFeedback.notificationOccurred('error');
            
            // Червоний мультиплікатор
            multDisplay.style.color = '#fc8181';
            multDisplay.style.textShadow = '0 0 40px rgba(245, 101, 101, 0.8)';
            multDisplay.textContent = '💥 ' + currentMultiplier.toFixed(2) + 'x';
            
            // Ракета червоніє
            rocketSvg.classList.add('rocket-crashed');

            // Додаємо в історію
            addToHistory(currentMultiplier);

            // Якщо гравець був у грі і не забрав - ставка згорає
            if (isPlaying && !hasCashedOut) {
                // Ставка програна (вже списана, тому просто повідомлення)
                roundStatus.textContent = '💥 Раунд крашнувся. Ви програли ' + currentBet.toFixed(2) + ' TON';
                tg.showAlert(`💥 Краш! Ви програли ${currentBet.toFixed(2)} TON.`);
                // Баланс не змінюємо, бо він уже зменшений при ставці
            } else if (isPlaying && hasCashedOut) {
                roundStatus.textContent = '✅ Ви встигли забрати!';
            } else {
                roundStatus.textContent = '💥 Краш! Нова ставка скоро...';
            }

            // Скидаємо стан гравця
            isPlaying = false;
            hasCashedOut = false;
            
            // Підготовка до нового раунду
            resetRound();
        }

        // Скидання раунду після паузи
        function resetRound() {
            if (roundTimeout) clearTimeout(roundTimeout);
            
            // Вимикаємо кнопку дії на час паузи
            actionBtn.disabled = true;
            
            roundTimeout = setTimeout(() => {
                // Повернення до початкового стану
                currentMultiplier = 1.00;
                multDisplay.textContent = '1.00x';
                multDisplay.style.color = '#fff';
                multDisplay.style.textShadow = '0 0 40px rgba(66, 153, 225, 0.6)';
                rocketSvg.classList.remove('rocket-crashed');
                isCrashed = false;
                isGameActive = false; // Раунд не активний, очікуємо ставки
                actionBtn.disabled = false;
                actionBtn.innerHTML = '<i class="fa-solid fa-gem"></i> Поставити';
                actionBtn.className = 'bet-btn btn-main';
                roundStatus.textContent = '⚡ Зробіть ставку на наступний раунд';
                
                // Якщо була відкрита панель ставок, залишаємо як є
            }, 4000); // Пауза 4 секунди
        }

        // Старт нового раунду (після ставки)
        function startRound() {
            if (isGameActive) return; // Запобіжник

            // Генеруємо точку крашу
            crashPoint = generateCrashPoint();
            console.log('Crash point:', crashPoint);
            
            isGameActive = true;
            isCrashed = false;
            hasCashedOut = false;
            currentMultiplier = 1.00;
            
            // Запускаємо інтервал оновлення (кожні 80 мс для плавності)
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(() => {
                if (!isGameActive || isCrashed) return;

                // Збільшення множника (нелінійне прискорення)
                currentMultiplier = currentMultiplier + (0.01 + currentMultiplier * 0.0025);
                
                // Обмежимо для продуктивності, але краш спрацює раніше
                multDisplay.textContent = currentMultiplier.toFixed(2) + 'x';

                // Перевірка крашу
                if (currentMultiplier >= crashPoint) {
                    doCrash();
                }
            }, 80);
        }

        // --- Обробка натискання кнопки дії (Поставити / Забрати) ---
        actionBtn.addEventListener('click', () => {
            // Випадок 1: Кнопка "Поставити" (гра не активна, гравець не в грі)
            if (!isGameActive && !isPlaying && !isCrashed) {
                // Зчитуємо суму ставки
                let betAmount = parseFloat(betAmountInput.value);
                if (isNaN(betAmount) || betAmount < 0.1) betAmount = 0.1;
                if (betAmount > balance) {
                    tg.showAlert('❌ Недостатньо коштів!');
                    return;
                }

                // Активуємо гру
                currentBet = betAmount;
                balance -= betAmount; // Списати ставку
                updateBalanceDisplay();

                isPlaying = true;
                // Запускаємо раунд, якщо він ще не активний
                if (!isGameActive) {
                    startRound();
                }

                // Змінюємо кнопку на "Забрати"
                actionBtn.innerHTML = '<i class="fa-solid fa-money-bill-wave"></i> ЗАБРАТИ';
                actionBtn.className = 'bet-btn btn-main btn-withdraw';
                roundStatus.textContent = `🎲 Гра йде... Ваша ставка ${betAmount.toFixed(2)} TON`;
                
                // Приховуємо панель ставок, якщо відкрита
                betPanel.classList.add('hidden');
                tg.HapticFeedback.impactOccurred('medium');
            }
            // Випадок 2: Кнопка "Забрати" (гравець в грі, раунд активний, не крашнуто)
            else if (isPlaying && isGameActive && !isCrashed && !hasCashedOut) {
                // Кешаут
                hasCashedOut = true;
                isPlaying = false; // Гравець більше не бере участі
                
                // Розрахунок виграшу
                const winAmount = currentBet * currentMultiplier;
                balance += winAmount;
                updateBalanceDisplay();

                // Вібрація успіху
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert(`✅ Ви забрали ${currentMultiplier.toFixed(2)}x та виграли ${winAmount.toFixed(2)} TON!`);

                // Робимо кнопку неактивною (забирати вже не можна)
                actionBtn.disabled = true;
                actionBtn.style.opacity = '0.5';
                roundStatus.textContent = `💰 Ви забрали ${winAmount.toFixed(2)} TON`;

                // Не зупиняємо гру, вона триває для інших (візуально)
                // Але гравець вже не в грі
            }
        });

        // Кнопка "Ставка" - показує панель налаштування ставки
        showBetPanelBtn.addEventListener('click', () => {
            betPanel.classList.toggle('hidden');
            tg.HapticFeedback.selectionChanged();
        });

        // Пресети ставок
        presetBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const bet = parseFloat(e.target.getAttribute('data-bet'));
                betAmountInput.value = bet.toFixed(1);
                // Підсвітити активний пресет
                presetBtns.forEach(b => b.classList.remove('active-preset'));
                e.target.classList.add('active-preset');
                tg.HapticFeedback.impactOccurred('light');
            });
        });

        // Клік на баланс (додати грошей для тесту)
        document.getElementById('balanceBlock').addEventListener('click', () => {
            // Тестова функція: поповнення на 10 TON
            balance += 10;
            updateBalanceDisplay();
            tg.showAlert('💰 +10 TON (тест)');
        });

        // Навігація (демо)
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                document.querySelector('.nav-item.active').classList.remove('active');
                this.classList.add('active');
                tg.HapticFeedback.selectionChanged();
                tg.showAlert('Навігація: ' + this.innerText.trim());
            });
        });

        // Якщо гравець намагається поставити повторно, кнопка блокується. 
        // Додамо захист від повторної ставки під час раунду
        // (кнопка "Поставити" не активна, якщо гравець вже в грі)

        // Ініціалізація історії (зберегти кілька елементів)
        // Вже є в HTML, можна залишити

        // Додатково: обмеження вводу
        betAmountInput.addEventListener('change', function() {
            let val = parseFloat(this.value);
            if (isNaN(val) || val < 0.1) this.value = 0.1;
            if (val > 1000) this.value = 1000; // ліміт
        });

        // Обробка закриття/згортання
        window.addEventListener('beforeunload', () => {
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            if (roundTimeout) clearTimeout(roundTimeout);
        });

        // Якщо користувач вийшов з гри, але ставка була, при перезавантаженні баланс зберігається.
        // Все добре.
    })();
</script>
</body>
</html>
