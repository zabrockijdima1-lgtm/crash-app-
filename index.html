<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #0e1219;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0e1219;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background-color: #0e1219;
            border-bottom: 1px solid #1e2630;
        }
        
        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
        }
        
        .user-level {
            font-size: 10px;
            color: #6b7f98;
        }
        
        .balance-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #0e1219;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #31465c;
        }
        
        .balance-value {
            font-weight: 600;
            font-size: 13px;
            color: #f0b90b;
        }
        
        .balance-icon {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #0e1219;
        }

        .close-btn {
            color: #8e9fb1;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        /* Історія ставок */
        .history-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #1e2630;
        }
        
        .history-title {
            color: #6b7f98;
            font-size: 13px;
            font-weight: 500;
        }
        
        .history-multipliers {
            display: flex;
            gap: 12px;
        }
        
        .history-multiplier-item {
            color: #b3c6e2;
            font-size: 13px;
            font-weight: 600;
        }

        .horizontal-history {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            border-bottom: 1px solid #1e2630;
        }
        
        .horizontal-history::-webkit-scrollbar {
            display: none;
        }
        
        .history-chip {
            background-color: #1e2630;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            color: #b3c6e2;
            white-space: nowrap;
        }

        /* Game Area */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: linear-gradient(180deg, #0e1219 0%, #1a232f 100%);
            overflow: hidden;
        }

        /* Canvas для графіка */
        #chartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .multiplier-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 1px solid rgba(240, 185, 11, 0.3);
        }
        
        .multiplier-display {
            font-size: 72px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 40px rgba(240, 185, 11, 0.6);
            line-height: 1;
        }
        
        .multiplier-label {
            font-size: 12px;
            color: #f0b90b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        /* Ракета */
        .rocket {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            z-index: 20;
            transition: transform 0.1s linear;
            filter: drop-shadow(0 0 20px #f0b90b);
        }
        
        .rocket svg {
            width: 100%;
            height: 100%;
            fill: #f0b90b;
        }

        .potential-win {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #68d391;
            border: 1px solid #68d391;
            z-index: 30;
        }

        /* Bet Area */
        .bet-area {
            padding: 16px;
            background-color: #0e1219;
            border-top: 1px solid #1e2630;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-text {
            text-align: center;
            color: #6b7f98;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bet-buttons {
            display: flex;
            gap: 12px;
        }
        
        .bet-action-btn {
            flex: 1;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border: none;
            color: #0e1219;
            font-weight: 700;
            font-size: 16px;
            padding: 16px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
        }
        
        .bet-action-btn.secondary {
            background: #1e2630;
            color: #b3c6e2;
        }

        /* Players List */
        .players-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a232f;
            border-radius: 12px;
            padding: 12px 16px;
        }
        
        .player-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-avatar-small {
            width: 32px;
            height: 32px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .player-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .player-bet {
            color: #f0b90b;
            font-size: 13px;
            margin-right: 12px;
        }
        
        .player-multiplier {
            background-color: #253040;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #b3c6e2;
        }

        /* Navbar */
        .navbar {
            display: flex;
            background-color: #0e1219;
            border-top: 1px solid #1e2630;
            padding: 4px 0;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: #6b7f98;
            font-size: 10px;
            padding: 8px 0;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #f0b90b;
        }
        
        .nav-icon {
            font-size: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="userAvatar">Д</div>
            <div class="user-info">
                <div class="user-name" id="userName">Діма | BIO</div>
                <div class="user-level">Level 1</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="balance-block">
                <span class="balance-value" id="balanceValue">0.02</span>
                <div class="balance-icon">⭐</div>
            </div>
            <div class="close-btn">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
    </div>

    <!-- History Section -->
    <div class="history-stats">
        <span class="history-title">История ставок</span>
        <div class="history-multipliers">
            <span class="history-multiplier-item">1.8x</span>
            <span class="history-multiplier-item">1.6x</span>
            <span class="history-multiplier-item">1.4x</span>
            <span class="history-multiplier-item">1.2x</span>
        </div>
    </div>

    <div class="horizontal-history" id="historyBar">
        <span class="history-chip">x1.65</span>
        <span class="history-chip">x28.29</span>
        <span class="history-chip">x10.19</span>
        <span class="history-chip">x4.25</span>
        <span class="history-chip">x2.04</span>
        <span class="history-chip">x1.29</span>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <canvas id="chartCanvas"></canvas>
        
        <!-- Ракета -->
        <div class="rocket" id="rocket">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L9.5 7L4.5 9.5L9.5 12L12 17L14.5 12L19.5 9.5L14.5 7L12 2Z" fill="#f0b90b" fill-opacity="0.8"/>
                <path d="M11.9998 2V12M11.9998 12L14.1208 14.121M11.9998 12V22M11.9998 12L9.8787 14.121" stroke="#f0b90b" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>

        <div class="multiplier-container">
            <div class="multiplier-display" id="multiplier">1.00x</div>
            <div class="multiplier-label">поточний множник</div>
        </div>

        <div class="potential-win hidden" id="potentialWin">💰 0.00 TON</div>
    </div>

    <!-- Bet Area -->
    <div class="bet-area">
        <div class="info-text" id="roundStatus">ВИ МОЖЕТЕ ПОСТАВИТИ СТАВКУ НА НАСТУПНИЙ РАУНД</div>

        <div class="bet-buttons">
            <button class="bet-action-btn secondary" id="showBetPanelBtn">Ставка</button>
            <button class="bet-action-btn" id="placeBetBtn">Ставка</button>
        </div>

        <!-- Players List -->
        <div class="players-list" id="playersList">
            <!-- Динамічно додаються гравці -->
        </div>
    </div>

    <!-- Navbar -->
    <div class="navbar">
        <div class="nav-item"><i class="fa-regular fa-rectangle-list nav-icon"></i>Інвентар</div>
        <div class="nav-item"><i class="fa-solid fa-hammer nav-icon"></i>Крафт</div>
        <div class="nav-item active"><i class="fa-solid fa-rocket nav-icon"></i>Краш</div>
        <div class="nav-item"><i class="fa-regular fa-gem nav-icon"></i>Кейси</div>
        <div class="nav-item"><i class="fa-regular fa-user nav-icon"></i>Профіль</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Дані користувача
    let balance = 0.02;
    let currentMultiplier = 1.00;
    let gameActive = true;
    let isCrashed = false;
    let gameLoop = null;
    let rocketPos = { x: 20, y: 20 };
    let chartPoints = [];

    // Елементи
    const balanceSpan = document.getElementById('balanceValue');
    const multiplierEl = document.getElementById('multiplier');
    const playersList = document.getElementById('playersList');
    const rocket = document.getElementById('rocket');
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const potentialWin = document.getElementById('potentialWin');
    const roundStatus = document.getElementById('roundStatus');

    // Дані гравців
    const players = [
        { name: 'МАТРОС', bet: 0.11, multiplier: 1.65, avatar: 'М' },
        { name: 'MANIAC | БЫКОВ', bet: 0.10, multiplier: 1.65, avatar: 'M' },
        { name: 'Pudgik', bet: 0.10, multiplier: 1.65, avatar: 'P' },
        { name: 'Alex', bet: 0.25, multiplier: 1.65, avatar: 'A' },
        { name: 'CryptoKing', bet: 0.50, multiplier: 1.65, avatar: 'C' },
        { name: 'MoonBoy', bet: 0.15, multiplier: 1.65, avatar: 'M' },
        { name: 'StarDust', bet: 0.30, multiplier: 1.65, avatar: 'S' },
        { name: 'RocketMan', bet: 0.45, multiplier: 1.65, avatar: 'R' }
    ];

    // Налаштування canvas
    function resizeCanvas() {
        const gameArea = document.getElementById('gameArea');
        canvas.width = gameArea.clientWidth;
        canvas.height = gameArea.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Малювання графіка
    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Малюємо сітку
        ctx.strokeStyle = '#1e2630';
        ctx.lineWidth = 1;
        
        // Вертикальні лінії
        for (let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath();
            ctx.strokeStyle = '#1e2630';
            ctx.lineWidth = 0.5;
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
        }
        
        // Горизонтальні лінії
        for (let i = 0; i < canvas.height; i += 40) {
            ctx.beginPath();
            ctx.strokeStyle = '#1e2630';
            ctx.lineWidth = 0.5;
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }

        // Малюємо лінію графіка
        if (chartPoints.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = '#f0b90b';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#f0b90b';
            ctx.shadowBlur = 10;
            
            chartPoints.forEach((point, index) => {
                const x = (index / 100) * canvas.width;
                const y = canvas.height - (point / 5) * canvas.height;
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    // Оновлення списку гравців
    function renderPlayers() {
        playersList.innerHTML = players.map(player => `
            <div class="player-row">
                <div class="player-left">
                    <div class="player-avatar-small">${player.avatar}</div>
                    <span class="player-name">${player.name}</span>
                </div>
                <div style="display: flex; align-items: center;">
                    <span class="player-bet">${player.bet.toFixed(2)} TON</span>
                    <span class="player-multiplier">x${player.multiplier.toFixed(2)}</span>
                </div>
            </div>
        `).join('');
    }

    // Функція крашу
    function crash() {
        isCrashed = true;
        gameActive = false;
        
        tg.HapticFeedback.notificationOccurred('error');
        
        // Додаємо краш в історію
        const historyBar = document.getElementById('historyBar');
        const chip = document.createElement('span');
        chip.className = 'history-chip';
        chip.textContent = `x${currentMultiplier.toFixed(2)}`;
        historyBar.prepend(chip);
        if (historyBar.children.length > 6) {
            historyBar.removeChild(historyBar.lastChild);
        }

        // Показуємо краш
        multiplierEl.style.color = '#fc8181';
        multiplierEl.textContent = '💥 ' + currentMultiplier.toFixed(2) + 'x';
        
        // Ховаємо потенційний виграш
        potentialWin.classList.add('hidden');
        
        // Оновлюємо статус
        roundStatus.textContent = 'РАКЕТА ВПАЛА. НОВИЙ РАУНД ЗА 5 СЕК...';
        
        // Запускаємо новий раунд через 5 секунд
        setTimeout(() => {
            startNewRound();
        }, 5000);
    }

    // Новий раунд
    function startNewRound() {
        isCrashed = false;
        gameActive = true;
        currentMultiplier = 1.00;
        chartPoints = [1.00];
        rocketPos = { x: 20, y: 20 };
        
        multiplierEl.style.color = '#fff';
        multiplierEl.textContent = '1.00x';
        roundStatus.textContent = 'ВИ МОЖЕТЕ ПОСТАВИТИ СТАВКУ НА НАСТУПНИЙ РАУНД';
        
        // Оновлюємо множники гравців
        players.forEach(p => {
            p.multiplier = 1.00;
        });
        renderPlayers();
    }

    // Telegram дані
    if (tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
        document.getElementById('userAvatar').textContent = user.first_name.charAt(0).toUpperCase();
    }

    // Кнопки ставок
    document.getElementById('placeBetBtn').addEventListener('click', () => {
        tg.HapticFeedback.impactOccurred('medium');
        tg.showAlert('⚡ Ставка прийнята!');
    });

    document.getElementById('showBetPanelBtn').addEventListener('click', () => {
        tg.HapticFeedback.selectionChanged();
        tg.showAlert('⚡ Виберіть суму ставки');
    });

    // Навігація
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelector('.nav-item.active').classList.remove('active');
            this.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        });
    });

    // Клік на баланс
    document.querySelector('.balance-block').addEventListener('click', () => {
        balance += 10;
        balanceSpan.textContent = balance.toFixed(2);
        tg.showAlert('💰 +10 TON (тест)');
    });

    // Ігровий цикл
    function gameTick() {
        if (!gameActive || isCrashed) return;

        // Випадковий краш (2% шанс)
        if (Math.random() < 0.02 && currentMultiplier > 1.5) {
            crash();
            return;
        }

        // Збільшуємо множник
        currentMultiplier += 0.01 + (currentMultiplier * 0.001);
        multiplierEl.textContent = currentMultiplier.toFixed(2) + 'x';
        
        // Додаємо точку для графіка
        chartPoints.push(currentMultiplier);
        if (chartPoints.length > 100) {
            chartPoints.shift();
        }
        
        // Рухаємо ракету
        const gameArea = document.getElementById('gameArea');
        rocketPos.x += 2;
        rocketPos.y -= 1;
        
        // Обмежуємо рух ракети
        if (rocketPos.x > gameArea.clientWidth - 80) rocketPos.x = gameArea.clientWidth - 80;
        if (rocketPos.y < 20) rocketPos.y = 20;
        
        rocket.style.transform = `translate(${rocketPos.x}px, ${rocketPos.y}px) rotate(${Math.min(rocketPos.y * 0.5, 30)}deg)`;
        
        // Оновлюємо множники гравців
        players.forEach(p => {
            p.multiplier = currentMultiplier;
        });
        
        // Оновлюємо потенційний виграш (якщо є ставка)
        if (!potentialWin.classList.contains('hidden')) {
            const betAmount = 0.11; // Тестова ставка
            const win = betAmount * currentMultiplier;
            potentialWin.textContent = `💰 ${win.toFixed(2)} TON`;
        }
        
        // Малюємо графік
        drawChart();
        
        // Оновлюємо список гравців кожні 200мс
        if (Math.random() < 0.1) {
            renderPlayers();
        }
    }

    // Запускаємо гру
    startNewRound();
    gameLoop = setInterval(gameTick, 100);
    renderPlayers();

    // Очищення при закритті
    window.addEventListener('beforeunload', () => {
        if (gameLoop) clearInterval(gameLoop);
    });
</script>
</body>
</html>
