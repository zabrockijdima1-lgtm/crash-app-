<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🚀 Rocket</title>
<script src="https://telegram.org/js/telegram-web-app.js" defer></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2236;--acc:#6c4fff;--acc2:#4a2fcc;--green:#00e676;--red:#ff1744;--gold:#ffd600;--ton:#0098ea}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Inter',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-height:100vh}
#sky{position:relative;flex:0 0 240px;overflow:hidden;background:radial-gradient(ellipse at 50% 0%,#0d1f3c 0%,#060b14 70%)}
#sky::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 8% 14%,#fff9,transparent),radial-gradient(1px 1px at 22% 67%,#fff5,transparent),radial-gradient(1px 1px at 37% 11%,#fff8,transparent),radial-gradient(1px 1px at 54% 79%,#fff4,transparent),radial-gradient(1px 1px at 70% 28%,#fff7,transparent),radial-gradient(1.5px 1.5px at 75% 71%,#fffc,transparent),radial-gradient(1px 1px at 92% 7%,#fffa,transparent),radial-gradient(1px 1px at 14% 89%,#fff7,transparent)}
#gc{position:absolute;inset:0;width:100%;height:100%}
#mult{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:52px;font-weight:900;color:#fff;letter-spacing:2px;pointer-events:none;z-index:5;text-align:center;text-shadow:0 2px 20px rgba(255,255,255,.15)}
#mult.crashed{color:var(--red);animation:shake .3s}
#mult.waiting{font-size:16px;color:#556;text-shadow:none;letter-spacing:1px}
@keyframes shake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(-52%,-50%)}75%{transform:translate(-48%,-50%)}}
#particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:2}
.part{position:absolute;background:rgba(255,255,255,.1);border-radius:50%;animation:pfly linear infinite}
@keyframes pfly{0%{opacity:.4;transform:translateY(0)}100%{opacity:0;transform:translateY(-100px)}}
#topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
#rlbl{font-size:9px;color:#334;background:#00000066;padding:4px 8px;border-radius:10px}
#deposit-btn{display:flex;align-items:center;gap:6px;background:#00000099;border:0.5px solid #0098ea44;border-radius:20px;padding:5px 10px 5px 8px;cursor:pointer;backdrop-filter:blur(8px)}
#deposit-btn .dep-bal{font-family:'Orbitron',monospace;font-size:11px;color:var(--gold)}
#deposit-btn .dep-plus{width:20px;height:20px;background:var(--ton);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
#hist{display:flex;gap:5px;padding:5px 10px;overflow-x:auto;background:#080c16;border-bottom:0.5px solid #ffffff06;scrollbar-width:none;flex-shrink:0}
#hist::-webkit-scrollbar{display:none}
.hc{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.hl{background:#1a2a1a;color:#3ddc84}
.hm{background:#1a2a3a;color:#44aaff}
.hh{background:#2a2a1a;color:#f5c500}
.hmoon{background:#2a1a3a;color:#aa77ff}
.hbet{background:#1a47cc;color:#fff}
#ctrls{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0}
.card{background:var(--bg2);border:0.5px solid #ffffff08;border-radius:12px;padding:10px 12px}
.cl{font-size:9px;color:#334;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.inp{width:100%;background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;padding:7px 10px;outline:none}
.qbtns{display:flex;gap:3px;margin-top:6px}
.qb{background:#0d1428;border:0.5px solid #ffffff08;border-radius:6px;color:#445;font-size:10px;padding:3px 0;cursor:pointer;flex:1;text-align:center}
.ar{display:flex;align-items:center;gap:6px}
.tl{font-size:12px;color:#334;flex:1}
.tog{width:36px;height:20px;background:#0d1428;border-radius:10px;border:0.5px solid #ffffff0c;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:19px}
.ai{background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:12px;padding:5px 8px;width:70px;outline:none;margin-top:8px}
#bb{grid-column:1/-1;background:linear-gradient(135deg,#1a47cc,#0d2e99);border:none;border-radius:14px;color:#fff;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;padding:15px;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px #1a47cc44}
#bb.co{background:linear-gradient(135deg,#1a6228,#0d4018);box-shadow:0 4px 20px #1a622844}
#bb:disabled{opacity:.2;cursor:not-allowed}
#nft-hint{font-size:10px;color:#334;text-align:center;padding:3px 0 2px;flex-shrink:0}
#nft-hint span{color:#7766ff}
#pw{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 12px;min-height:0}
.st{font-size:9px;color:#223;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.pc{background:var(--bg3);border-radius:8px;padding:1px 6px;font-size:9px;color:#334}
#pl{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;scrollbar-width:none;padding-bottom:4px}
#pl::-webkit-scrollbar{display:none}
.pr{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid #ffffff06;border-radius:10px;padding:8px 12px;flex-shrink:0}
.pr.me{border-color:#6c4fff44;background:#0d1028}
.pr.won{background:#0a1f0a;border-color:#00e67630}
.pr.lost{background:#1f0a0a;border-color:#ff174430}
.pr-nft{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid #ffffff15}
.pr-bet{display:inline-flex;align-items:center;gap:3px;background:#0d2233;border-radius:20px;padding:2px 8px;font-size:10px;color:#aac;margin-top:2px}
.pr-win{display:inline-flex;align-items:center;gap:3px;background:#0d2233;border-radius:20px;padding:3px 10px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff}
.pav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.pav img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.pi{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}
.pn{font-size:12px;color:#778;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pn.m{color:#fff;font-weight:600}
#bottomnav{display:flex;flex-shrink:0;background:var(--bg2);border-top:0.5px solid #ffffff08;padding:4px 0 8px;align-items:flex-end}
.tabn{flex:1;background:none;border:none;color:#445;font-size:10px;padding:4px 4px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.tabn.active{color:#fff}
.tabn svg{opacity:0.5}
.tabn.active svg{opacity:1}
#tab-game svg{opacity:1}
#modal-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;backdrop-filter:blur(6px)}
#modal-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;border-top:0.5px solid #ffffff10;max-height:85vh;overflow-y:auto;padding:0 0 20px}
.inv-card{background:var(--bg3);border:0.5px solid #ffffff08;border-radius:14px;overflow:hidden}
.inv-body{padding:8px}
.inv-name{font-size:11px;font-weight:700;color:#ccc;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-r{font-size:8px;padding:2px 6px;border-radius:5px;display:inline-block;margin-bottom:4px}
.inv-price{font-size:9px;color:#445;margin-bottom:4px}
.inv-mult{font-family:'Orbitron',monospace;font-size:10px;color:var(--acc);margin-bottom:6px}
.inv-btn{width:100%;background:linear-gradient(135deg,var(--ton),#006db3);border:none;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;padding:7px;cursor:pointer}
.rare-Common{background:#0d2e1a;color:#3ddc84}
.rare-Rare{background:#0d1e3a;color:#44aaff}
.rare-Epic{background:#1e0d3a;color:#aa77ff}
.rare-Legendary{background:#2e1e00;color:#ffd700}
#mbg{display:none;position:fixed;inset:0;background:#000000cc;z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
#mbg.open{display:flex}
#mod{background:var(--bg2);border-radius:20px 20px 0 0;border:0.5px solid #ffffff10;padding:20px;width:100%;max-width:480px}
#mod h3{font-family:'Orbitron',monospace;font-size:15px;margin-bottom:4px}
.sos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.so{background:var(--bg3);border:0.5px solid #ffffff0c;border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer}
.so.sel{border-color:var(--ton)}
.so .sa{font-size:20px}
.so .sl{font-family:'Orbitron',monospace;font-size:10px;margin-top:4px;color:#aaa}
.wallet-row{background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
#ws-dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0}
#ws-text{flex:1;font-size:12px;color:#556}
#ws-btn{background:var(--ton);border:none;border-radius:8px;color:#fff;font-size:11px;padding:5px 10px;cursor:pointer}
#cton{width:100%;background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:14px;padding:9px 12px;outline:none;margin-bottom:8px}
#pbtn{width:100%;background:var(--ton);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:13px;cursor:pointer;margin-bottom:6px}
#paid-btn{width:100%;background:#0d2a0d;border:0.5px solid var(--green);border-radius:10px;color:var(--green);font-family:'Orbitron',monospace;font-size:12px;padding:11px;cursor:pointer;margin-bottom:6px}
#mcl{width:100%;background:transparent;border:none;color:#334;font-size:12px;padding:10px;cursor:pointer}
#wp{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#0d0a22,#070512);border:1px solid #6c4fff66;border-radius:20px;padding:24px;text-align:center;z-index:250;box-shadow:0 0 50px #6c4fff22;min-width:260px;max-width:320px}
#wp.show{display:block;animation:popin .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popin{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
#wp-lottie{width:120px;height:120px;margin:0 auto 10px;border-radius:16px;overflow:hidden;background:#0d0a22;border:1px solid #6c4fff33}
#wp-nft-name{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:#fff;margin-bottom:4px}
#wp-nft-rarity{font-size:10px;padding:2px 10px;border-radius:8px;display:inline-block;margin-bottom:10px}
#wp-mult{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#aa77ff}
#wp-val{font-family:'Orbitron',monospace;font-size:15px;color:#ffd700;margin-top:5px}
#wp-sub{font-size:10px;color:#445;margin-top:5px}
#wp-close{width:100%;background:transparent;border:none;color:#334;font-size:12px;padding:10px;cursor:pointer;margin-top:6px}
#wp-ton-mult{font-family:'Orbitron',monospace;font-size:44px;font-weight:900;color:var(--green);margin-bottom:6px}
#wp-ton-val{font-family:'Orbitron',monospace;font-size:22px;color:#ffd700}
#toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-family:'Orbitron',monospace;font-size:11px;padding:8px 18px;border-radius:12px;z-index:300;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;max-width:90vw;text-align:center}
#toast.win{background:var(--green);color:#000}
#toast.info{background:var(--ton)}
#toast.show{opacity:1}
.sp{position:fixed;pointer-events:none;z-index:200;font-size:18px;animation:spf 1s ease-out forwards}
@keyframes spf{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px) scale(.3)}}
/* ── CASES ── */
#cases-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:150;flex-direction:column;overflow:hidden}
#cases-screen.open{display:flex}
#cases-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border-bottom:0.5px solid #ffffff08;flex-shrink:0}
#cases-header h2{font-family:Orbitron,monospace;font-size:15px;font-weight:700;flex:1}
.cases-list{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.case-card{background:var(--bg2);border:0.5px solid #ffffff10;border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s}
.case-card:active{border-color:var(--acc)}
.case-card .case-img{font-size:48px;margin-bottom:8px}
.case-card .case-name{font-size:12px;font-weight:700;color:#ddd;margin-bottom:4px}
.case-card .case-price{font-family:Orbitron,monospace;font-size:11px;color:var(--ton)}

/* spin screen */
#spin-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:160;flex-direction:column}
#spin-screen.open{display:flex}
#spin-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border-bottom:0.5px solid #ffffff08;flex-shrink:0}
#spin-header h2{font-family:Orbitron,monospace;font-size:14px;font-weight:700;flex:1}
#spin-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
#spin-arrow-top{font-size:22px;color:var(--acc);animation:bob .8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
#spin-track-wrap{width:100%;overflow:hidden;position:relative;border-radius:12px;border:1.5px solid var(--acc);background:var(--bg2)}
#spin-track-wrap::before,#spin-track-wrap::after{content:'';position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none}
#spin-track-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent)}
#spin-track-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent)}
#spin-track{display:flex;gap:8px;padding:10px 8px;transition:transform .05s linear;will-change:transform}
.spin-item{flex-shrink:0;width:80px;height:90px;background:var(--bg3);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:1.5px solid transparent;transition:border-color .2s}
.spin-item.winner{border-color:var(--gold);box-shadow:0 0 16px #ffd60066}
.spin-item .si-emoji{font-size:30px}
.spin-item .si-name{font-size:8px;color:#aaa;text-align:center;padding:0 4px;line-height:1.2;overflow:hidden;max-height:24px}
.spin-item .si-price{font-size:9px;color:var(--ton);font-family:Orbitron,monospace}
#spin-arrow-bot{font-size:22px;color:var(--acc);animation:bob2 .8s ease-in-out infinite}
@keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#spin-prize-info{font-family:Orbitron,monospace;font-size:13px;color:#556;min-height:20px}
#spin-btn-row{display:flex;gap:8px;width:100%;padding:0 14px 20px}
#spin-btn{flex:1;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:12px;color:#fff;font-family:Orbitron,monospace;font-size:14px;font-weight:700;padding:14px;cursor:pointer}
#spin-btn:disabled{opacity:.4;cursor:not-allowed}
#spin-prizes-btn{background:var(--bg2);border:0.5px solid #ffffff15;border-radius:12px;color:#aaa;font-size:12px;padding:14px 16px;cursor:pointer}
/* win popup */
#case-win-popup{display:none;position:fixed;inset:0;background:#000000cc;z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
#case-win-popup.show{display:flex}
#case-win-box{background:linear-gradient(135deg,#0d0a22,#070512);border:1.5px solid var(--gold);border-radius:22px;padding:28px 24px;text-align:center;max-width:300px;width:90%;box-shadow:0 0 60px #ffd60033}
#case-win-emoji{font-size:64px;margin-bottom:10px}
#case-win-name{font-family:Orbitron,monospace;font-size:16px;font-weight:900;color:#fff;margin-bottom:6px}
#case-win-val{font-family:Orbitron,monospace;font-size:22px;color:var(--gold);margin-bottom:4px}
#case-win-sub{font-size:11px;color:#445;margin-bottom:18px}
.case-win-actions{display:flex;gap:8px}
.case-win-actions button{flex:1;border:none;border-radius:10px;font-family:Orbitron,monospace;font-size:11px;font-weight:700;padding:11px 6px;cursor:pointer}
#cwb-keep{background:linear-gradient(135deg,#1a6228,#0d4018);color:#fff}
#cwb-sell{background:var(--bg3);border:0.5px solid #ffffff15!important;color:#aaa}
/* prizes modal */
#prizes-modal{display:none;position:fixed;inset:0;background:#000000cc;z-index:250;align-items:flex-end;justify-content:center}
#prizes-modal.show{display:flex}
#prizes-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:20px 16px 30px}

</head>
<body>
<div id="app">
  <div id="sky">
    <canvas id="gc"></canvas>
    <div id="particles"></div>
    <div id="mult" class="waiting">...</div>
    <div id="topbar">
      <div id="rlbl">Round #<span id="rid">1</span></div>
      <button id="deposit-btn" onclick="openTopup()">
        <svg width="14" height="14" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="28" fill="#0098EA"/><path d="M37.56 15.63H18.44c-3.52 0-5.74 3.79-3.97 6.86l11.8 20.45c.77 1.34 2.7 1.34 3.47 0l11.8-20.45c1.77-3.07-.45-6.86-3.98-6.86zm-11.3 20.63l-3.06-5.53-6.28-10.99c-.37-.64.08-1.45.82-1.45h8.52v17.97zm12.81-17.97l-6.27 10.99-3.06 5.53V18.28h8.52c.74 0 1.19.81.81 1.45z" fill="#fff"/></svg>
        <span class="dep-bal"><span id="bal">1.00</span> TON</span>
        <span class="dep-plus">+</span>
      </button>
    </div>
  </div>

  <div id="hist"></div>

  <div id="ctrls">
    <div class="card">
      <div class="cl">СТАВКА TON</div>
      <input class="inp" id="bi" type="number" value="0.1" min="0.1" step="0.1">
      <div class="qbtns">
        <button class="qb" onclick="sB(.1)">0.1</button>
        <button class="qb" onclick="sB(.5)">0.5</button>
        <button class="qb" onclick="sB(2.8)">2.8</button>
        <button class="qb" onclick="hB()">½</button>
        <button class="qb" onclick="x2B()">×2</button>
      </div>
    </div>
    <div class="card">
      <div class="cl">АВТО-ВИВІД</div>
      <div class="ar"><span class="tl">Авто</span><div class="tog" id="atog" onclick="toggleAuto()"></div></div>
      <input class="ai" id="av" type="number" value="2.0" min="1.1" step="0.1">
    </div>
    <button id="bb" onclick="handleBet()">🚀 ПОСТАВИТИ</button>
  </div>

  <div id="nft-hint">Виграш ≥2.8 TON → отримаєш <span>Telegram Gift NFT</span></div>

  <div id="pw">
    <div class="st">ГРАВЦІ <span class="pc" id="pcnt">0</span></div>
    <div id="pl"></div>
  </div>

  <div id="bottomnav">
    <button class="tabn" id="tab-inv" onclick="openModal('inv')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="inv-tab-lbl">Backpack</span>

function getPhotoById(nft){
  if(!nft)return'';
  if(nft.photo&&nft.photo.startsWith('data:'))return nft.photo;
  // Шукаємо в окремому файлі NFT_PHOTOS
  const photos=window.NFT_PHOTOS||{};
  if(photos[nft.id])return photos[nft.id];
  // Шукаємо по імені
  const l=NFT_CATALOG.find(n=>n.id===nft.id||n.name===nft.name);
  if(l&&photos[l.id])return photos[l.id];
  return '';
}
function getNFT(win){
  if(!win||win<2.72)return null;
  const ok=NFT_CATALOG.filter(n=>n.price<=win);
  return ok.length?ok.reduce((a,b)=>a.floor>b.floor?a:b):null;
}

function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}

function calcMult(el){return Math.round(Math.pow(Math.E,el*0.07)*100)/100;}

function drawGraph(crashed){
  resize();if(points.length<2)return;
  const W=canvas.width,H=canvas.height,maxM=Math.max(mult,1.3);
  const dur=points[points.length-1].t-points[0].t;if(dur<=0)return;
  const sx=(W-30)/Math.max(dur,5),sy=(H-50)/(maxM-1);
  const px=p=>({x:15+(p.t-points[0].t)*sx,y:H-25-(p.m-1)*sy});
  const col=crashed?'#ff1744':'#f5c500';
  ctx.clearRect(0,0,W,H);
  const p0=px(points[0]),last=px(points[points.length-1]);
  const g=ctx.createLinearGradient(0,H,0,0);
  g.addColorStop(0,crashed?'rgba(255,23,68,0)':'rgba(245,197,0,0)');
  g.addColorStop(1,crashed?'rgba(255,23,68,0.1)':'rgba(245,197,0,0.08)');
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<points.length;i++){const p=px(points[i]);ctx.lineTo(p.x,p.y)}
  ctx.lineTo(last.x,H-25);ctx.lineTo(p0.x,H-25);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  ctx.shadowColor=col;ctx.shadowBlur=crashed?8:20;
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<points.length;i++){const p=px(points[i]);ctx.lineTo(p.x,p.y)}
  ctx.strokeStyle=col;ctx.lineWidth=crashed?3:5;ctx.lineCap='round';ctx.stroke();
  ctx.shadowBlur=0;
  if(!crashed){
    ctx.beginPath();ctx.arc(last.x,last.y,9,0,Math.PI*2);ctx.fillStyle='rgba(245,197,0,.2)';ctx.fill();
    ctx.beginPath();ctx.arc(last.x,last.y,5,0,Math.PI*2);ctx.fillStyle='#f5c500';ctx.fill();
    ctx.beginPath();ctx.arc(last.x,last.y,2.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  }
}

async function doWithdrawWithStars(id,name,floor){
  if(!tg?.openInvoice){
    // Fallback: якщо не в Telegram — надсилаємо WS напряму (для тесту в браузері)
    if(wsReady) ws.send(JSON.stringify({a:'withdraw_nft',nft_id:id,price:0,type:'withdraw'}));
    else showToast(t('error'));
    return;
  }
  try{
    showToast('⭐ ...','info');
    const resp = await fetch(`${SERVER}/stars/withdraw-invoice/${userId}/${encodeURIComponent(id)}/${encodeURIComponent(name)}`);
    const data = await resp.json();
    if(!data.ok || !data.invoice_link){
      showToast(data.error || t('error'));
      return;
    }
    tg.openInvoice(data.invoice_link, status=>{
      if(status==='paid'){
        // Зірки сплачено — тепер відправляємо вивід через WS
        if(wsReady) ws.send(JSON.stringify({a:'withdraw_nft',nft_id:id,price:0,type:'withdraw'}));
        showToast('⭐ Paid! Withdrawing...','info');
      } else if(status==='cancelled'){
        showToast(t('cancelled'));
      } else if(status==='failed'){
        showToast(t('error'));
      }
    });
  } catch(e){
    console.error('withdraw stars error:', e);
    showToast(t('error'));
  }
}

function connect(){
  const url=SERVER.replace(/^http/,'ws')+`/ws/${userId}`;
  ws=new WebSocket(url);
  ws.onopen=()=>{
    wsReady=true;document.getElementById('conn').textContent='⚡';
    ws.send(JSON.stringify({a:'auth',name:userName,nick:userNick,photo:userPhoto,ref_by:refBy}));
  };
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.t==='init'){
      balance=d.bal||balance;updBal();saveBal();
      if(d.h)d.h.slice().reverse().forEach(v=>addH(v));
      renderPlayers(d.pl);
      if(d.phase==='flying'){phase='flying';startTs=d.ts;ME().className='';ME().textContent=(d.mult||1).toFixed(2)+'×';startClientAnim();}
      else{phase='waiting';ME().className='waiting';ME().textContent=t('waiting');}
    }
    else if(d.t==='cd'){
      cancelAnimationFrame(loopId);loopId=null;
      const newRound=d.rid!==parseInt(document.getElementById('rid').textContent||'0');
      if(newRound){hasBet=false;}
      phase='waiting';document.getElementById('rid').textContent=d.rid;
      ME().className='waiting';ME().textContent=`${t('start_in')} ${d.sec}...`;
      document.getElementById('particles').innerHTML='';
      resize();ctx.clearRect(0,0,canvas.width,canvas.height);
      if(!hasBet){BB().disabled=false;BB().className='';BB().innerHTML=t('place_bet');}
      else{BB().disabled=true;BB().innerHTML=t('bet_accepted');}
    }
    else if(d.t==='st'){
      phase='flying';startTs=d.ts;document.getElementById('rid').textContent=d.rid;
      ME().className='';ME().textContent='1.00×';points=[];startClientAnim();
      if(hasBet){BB().disabled=false;BB().className='co';BB().innerHTML=`${t('cashout')} ${betAmt.toFixed(2)} TON`;}
      else{BB().disabled=true;BB().innerHTML=t('place_bet');}
    }
    else if(d.t==='tick'){renderPlayers(d.pl);}
    else if(d.t==='cr'){
      cancelAnimationFrame(loopId);loopId=null;
      phase='crashed';mult=d.ca;
      ME().textContent=d.ca.toFixed(2)+'×';ME().className='crashed';
      document.getElementById('particles').innerHTML='';
      if(points.length>1)drawGraph(true);
      addH(d.ca);
      if(hasBet){showToast(`💥 ${t('crash')} ${d.ca.toFixed(2)}×`);hasBet=false;}
      BB().disabled=true;BB().className='';BB().innerHTML=t('place_bet');
      renderPlayers(d.pl);
    }
    else if(d.t==='newbet'||d.t==='co'){renderPlayers(d.pl);}
    else if(d.t==='bet_ok'){hasBet=true;betAmt=d.amt;balance=d.bal;updBal();saveBal();BB().disabled=true;BB().innerHTML=t('bet_accepted');addBetIndicator();}
    else if(d.t==='your_co'){
      hasBet=false;balance=d.bal;updBal();saveBal();
      if(d.nft)addNFTToInventory(d.nft,d.win,d.mx);
      showWinPopup(d.mx,d.win,d.nft);
      BB().className='';BB().innerHTML='🚀 ПОСТАВИТИ';
    }
    else if(d.t==='topup'||d.t==='topup_ok'){balance=d.bal||d.balance;updBal();saveBal();showToast(`◈ +${d.credited} ${t('credited')}`,'win');spawnGems(5);}
    else if(d.t==='nft_sold'){
      let removed=false;
      myNFTs=myNFTs.filter(n=>{if(!removed&&n.id===d.nft_id){removed=true;return false;}return true;});
      saveNFTs();balance=d.bal;updBal();saveBal();
      const cnt=myNFTs.length;
      document.getElementById('inv-tab-lbl').textContent=cnt?`${t('inv')} (${cnt})`:t('inv');
      showToast(d.msg||`✅ ${t('sell_btn')} ${d.amount} TON`,'win');spawnGems(3,'💰');closeModal();
    }
    else if(d.t==='nft_withdrawn'){
      let removed=false;
      myNFTs=myNFTs.filter(n=>{if(!removed&&n.id===d.nft_id){removed=true;return false;}return true;});
      saveNFTs();
      const cnt=myNFTs.length;
      document.getElementById('inv-tab-lbl').textContent=cnt?`${t('inv')} (${cnt})`:t('inv');
      showToast(d.msg||`✅ NFT ${t('withdraw_btn')}`,'win');
      closeModal();
    }
    else if(d.t==='ref_bonus'){balance=d.bal;updBal();saveBal();showToast(`👥 +${d.bonus} TON bonus!`,'win');}
    else if(d.t==='err'){showToast(d.msg);}
  };
  ws.onclose=()=>{wsReady=false;document.getElementById('conn').textContent='🔴';setTimeout(connect,2000);};
  ws.onerror=()=>ws.close();
}

function wRand(arr){let t=arr.reduce((s,i)=>s+i.weight,0),r=Math.random()*t;for(const i of arr){r-=i.weight;if(r<=0)return i;}return arr[arr.length-1];}
function mkItems(arr){return Array.from({length:60},()=>wRand(arr));}
function renderTrack(items){return items.map(i=>`<div class="spin-item"><div class="si-emoji">${i.emoji}</div><div class="si-name">${i.name}</div><div class="si-price" style="color:${rc(i.rarity)}">◈${i.price}</div></div>`).join('');}

function openCases(){
  document.getElementById('cases-screen').classList.add('open');
  document.getElementById('cases-list').innerHTML=CASES.map(c=>`
    <div class="case-card" onclick="openSpin('${c.id}')">
      <div class="case-img">${c.emoji}</div>
      <div class="case-name">${c.name}</div>
      <div class="case-price">◈ ${c.price} TON</div>
    </div>`).join('');
}
function closeCases(){document.getElementById('cases-screen').classList.remove('open');}

function openSpin(id){
  curCase=CASES.find(c=>c.id===id);if(!curCase)return;
  document.getElementById('spin-case-title').textContent=curCase.name;
  document.getElementById('spin-price-lbl').textContent=curCase.price+' TON';
  document.getElementById('spin-bal-display').textContent=balance.toFixed(2)+' TON';
  document.getElementById('spin-prize-info').textContent='';
  document.getElementById('spin-btn').disabled=false;
  const tr=document.getElementById('spin-track');
  tr.innerHTML=renderTrack(mkItems(curCase.items));
  tr.style.transform='translateX(0)';
  document.getElementById('spin-screen').classList.add('open');
}
function closeSpin(){
  document.getElementById('spin-screen').classList.remove('open');
  if(spinAnim){cancelAnimationFrame(spinAnim);spinAnim=null;}
}

function spinCase(){
  if(!curCase)return;
  if(balance<curCase.price){showToast(t('not_enough'));return;}
  balance=+(balance-curCase.price).toFixed(4);updBal();saveBal();
  document.getElementById('spin-bal-display').textContent=balance.toFixed(2)+' TON';
  document.getElementById('spin-btn').disabled=true;
  const winner=wRand(curCase.items);lastWin=winner;
  const items=mkItems(curCase.items);items[45]=winner;
  const tr=document.getElementById('spin-track');
  tr.innerHTML=renderTrack(items);tr.style.transform='translateX(0)';
  const ww=tr.parentElement.offsetWidth||300;
  const tx=-(45*ITW-(ww/2-ITW/2))+(Math.random()-.5)*20;
  const dur=4200,st=performance.now();
  function ease(p){return 1-Math.pow(1-p,4);}
  function anim(now){
    const p=Math.min((now-st)/dur,1);
    tr.style.transform='translateX('+tx*ease(p)+'px)';
    if(p<1){spinAnim=requestAnimationFrame(anim);}
    else{spinAnim=null;const el=tr.children[45];if(el)el.classList.add('winner');setTimeout(()=>showCaseWin(winner),500);}
  }
  spinAnim=requestAnimationFrame(anim);
}

function showCaseWin(item){
  document.getElementById('case-win-emoji').textContent=item.emoji;
  document.getElementById('case-win-name').textContent=item.name;
  document.getElementById('case-win-val').textContent='◈ '+item.price+' TON';
  document.getElementById('case-win-sub').textContent=item.rarity;
  document.getElementById('case-win-sub').style.color=rc(item.rarity);
  document.getElementById('cwb-sell').textContent='💰 Sell '+item.price+' TON';
  document.getElementById('case-win-popup').classList.add('show');
  spawnGems(5,'🎁');
}
function closeCaseWin(){document.getElementById('case-win-popup').classList.remove('show');document.getElementById('spin-btn').disabled=false;}
function caseWinKeep(){
  if(!lastWin)return;
  myNFTs.push({...lastWin,floor:lastWin.price,winTon:lastWin.price,mult:1,ts:Date.now()});
  saveNFTs();const cnt=myNFTs.length;
  document.getElementById('inv-tab-lbl').textContent=cnt?t('inv')+' ('+cnt+')':t('inv');
  if(wsReady)ws.send(JSON.stringify({a:'case_win_keep',nft_id:lastWin.id,price:lastWin.price}));
  showToast('Added to backpack!','win');closeCaseWin();
}
function caseWinSell(){
  if(!lastWin)return;
  balance=+(balance+lastWin.price).toFixed(4);updBal();saveBal();
  document.getElementById('spin-bal-display').textContent=balance.toFixed(2)+' TON';
  if(wsReady)ws.send(JSON.stringify({a:'case_win_sell',nft_id:lastWin.id,price:lastWin.price}));
  showToast('Sold for '+lastWin.price+' TON!','win');spawnGems(3,'💰');closeCaseWin();
}
function showPrizesModal(){
  if(!curCase)return;
  const sorted=[...curCase.items].sort((a,b)=>b.price-a.price);
  document.getElementById('prizes-grid').innerHTML=sorted.map(i=>`<div style="background:var(--bg3);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid ${rc(i.rarity)}33"><div style="font-size:26px">${i.emoji}</div><div style="font-size:9px;color:#ccc">${i.name}</div><div style="font-size:9px;font-family:Orbitron,monospace;color:${rc(i.rarity)}">◈${i.price}</div></div>`).join('');
  document.getElementById('prizes-modal').classList.add('show');
}
function closePrizesModal(){document.getElementById('prizes-modal').classList.remove('show');}

connect();
</script>
<script src="nft_photos.js"></script>
