<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash Game - Синхронізована</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Всі стилі з попередньої версії */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0b0e14 0%, #1a1f2e 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(18, 22, 33, 0.95);
            backdrop-filter: blur(10px);
        }

        /* Додайте всі стилі з попереднього коду */
        /* ... (CSS з попередньої версії) ... */
    </style>
</head>
<body>
    <!-- HTML з попередньої версії -->
    <!-- ... -->

    <script>
        // Telegram
        const tg = window.Telegram?.WebApp || {
            initDataUnsafe: { user: { id: 123456, first_name: 'Гравець' } },
            expand: () => {},
            ready: () => {},
            HapticFeedback: {
                impactOccurred: () => {},
                notificationOccurred: () => {},
                selectionChanged: () => {}
            }
        };
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user || { id: 123456, first_name: 'Гравець' };
        const SERVER_URL = "http://localhost:8001"; // Змініть на IP для інших пристроїв

        // Підключення до сервера
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling']
        });

        // Стан гри
        const gameState = {
            balance: 100,
            currentMultiplier: 1.00,
            isRunning: false,
            isCrashed: false,
            betAmount: 0,
            hasBet: false,
            autoCashout: false,
            autoCashoutMultiplier: 2,
            countdown: 5,
            players: [],
            graphPoints: [],
            stats: {
                totalGames: 0,
                totalWon: 0,
                maxWin: 0,
                wins: 0,
                losses: 0
            }
        };

        // Елементи DOM
        const elements = {
            loading: document.getElementById('loadingScreen'),
            balance: document.getElementById('balanceAmount'),
            multiplier: document.getElementById('multiplierValue'),
            gameStatus: document.getElementById('gameStatus'),
            timer: document.getElementById('timerContainer'),
            timerDisplay: document.getElementById('timerDisplay'),
            potentialWin: document.getElementById('potentialWin'),
            rocket: document.getElementById('rocketContainer'),
            placeBet: document.getElementById('placeBetBtn'),
            cashout: document.getElementById('cashoutBtn'),
            cancelBet: document.getElementById('cancelBetBtn'),
            betInput: document.getElementById('betAmountInput'),
            playersList: document.getElementById('playersList'),
            playersCount: document.getElementById('playersCount'),
            historyChips: document.getElementById('historyChips')
        };

        // Оновлення UI
        document.getElementById('userName').textContent = user.first_name;
        document.getElementById('userAvatar').textContent = user.first_name.charAt(0).toUpperCase();

        // Socket.io події
        socket.on('connect', () => {
            console.log('Підключено до сервера');
            elements.loading.style.display = 'none';
            
            socket.emit('register_player', {
                user_id: user.id,
                name: user.first_name
            });
        });

        socket.on('game_state', (data) => {
            gameState.currentMultiplier = data.multiplier;
            gameState.isRunning = data.is_running;
            gameState.isCrashed = data.is_crashed;
            gameState.countdown = data.countdown;
            gameState.players = data.players;
            updateUI();
        });

        socket.on('game_update', (data) => {
            gameState.currentMultiplier = data.multiplier;
            gameState.players = data.players;
            updateUI();
            moveRocket();
        });

        socket.on('countdown', (data) => {
            gameState.countdown = data.time;
            gameState.players = data.players;
            updateUI();
            
            elements.timer.classList.remove('hidden');
            elements.timerDisplay.textContent = data.time;
        });

        socket.on('game_started', (data) => {
            gameState.isRunning = true;
            gameState.isCrashed = false;
            gameState.players = data.players;
            updateUI();
            elements.timer.classList.add('hidden');
        });

        socket.on('game_crashed', (data) => {
            gameState.isRunning = false;
            gameState.isCrashed = true;
            gameState.currentMultiplier = data.crash_point;
            gameState.players = data.players;
            updateUI();
            
            elements.multiplier.classList.add('crashed');
            elements.multiplier.innerHTML = '💥 ' + data.crash_point.toFixed(2) + 'x';
            elements.rocket.classList.add('rocket-crashed');
            elements.gameStatus.textContent = 'CRASHED!';
            elements.potentialWin.classList.add('hidden');
            
            if (gameState.hasBet) {
                gameState.hasBet = false;
                gameState.betAmount = 0;
                elements.cashout.classList.add('hidden');
                elements.placeBet.classList.remove('hidden');
                elements.cancelBet.classList.add('hidden');
            }
        });

        socket.on('players_update', (data) => {
            gameState.players = data.players;
            updatePlayersList();
        });

        socket.on('cashout_result', (data) => {
            const win = data.win;
            gameState.balance += win;
            gameState.betAmount = 0;
            gameState.hasBet = false;
            updateBalance();
            
            gameState.stats.totalGames++;
            gameState.stats.wins++;
            gameState.stats.totalWon += win;
            if (win > gameState.stats.maxWin) {
                gameState.stats.maxWin = win;
            }
            
            elements.cashout.classList.add('hidden');
            elements.placeBet.classList.remove('hidden');
            elements.cancelBet.classList.add('hidden');
            elements.potentialWin.classList.add('hidden');
            
            showToast(`Виграш ${win} ⭐ (x${data.multiplier})`, 'success');
            updateStats();
        });

        socket.on('bet_result', (data) => {
            if (data.result === 'lost') {
                gameState.betAmount = 0;
                gameState.hasBet = false;
                
                gameState.stats.totalGames++;
                gameState.stats.losses++;
                
                elements.cashout.classList.add('hidden');
                elements.placeBet.classList.remove('hidden');
                elements.cancelBet.classList.add('hidden');
                elements.potentialWin.classList.add('hidden');
                
                showToast(`Програно ${data.amount} ⭐`, 'error');
                updateStats();
            }
        });

        socket.on('error', (data) => {
            showToast(data.message, 'error');
        });

        // Функції інтерфейсу
        function updateUI() {
            updateMultiplier();
            updatePlayersList();
            updateGameStatus();
            updatePotentialWin();
        }

        function updateMultiplier() {
            if (gameState.isCrashed) {
                elements.multiplier.innerHTML = '💥 ' + gameState.currentMultiplier.toFixed(2) + 'x';
                elements.multiplier.classList.add('crashed');
            } else {
                elements.multiplier.innerHTML = gameState.currentMultiplier.toFixed(2) + 'x';
                elements.multiplier.classList.remove('crashed');
            }
        }

        function updatePlayersList() {
            const activePlayers = gameState.players.filter(p => p.bet > 0);
            elements.playersCount.textContent = activePlayers.length + ' гравців';
            
            if (activePlayers.length === 0) {
                elements.playersList.innerHTML = '<div class="player-item" style="justify-content: center; color: #a0aec0;">Немає активних ставок</div>';
                return;
            }
            
            elements.playersList.innerHTML = activePlayers.map(p => `
                <div class="player-item">
                    <div class="player-info">
                        <div class="player-avatar-small">${p.name.charAt(0)}</div>
                        <span class="player-name">${p.name}</span>
                    </div>
                    <div class="player-bet-info">
                        <span class="player-bet">${p.bet} ⭐</span>
                        <span class="player-status ${p.status}">
                            ${p.status === 'waiting' ? 'Очікує' : 
                              p.status === 'won' ? `x${p.cashed_out_at?.toFixed(2)}` : 'Програв'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function updateGameStatus() {
            if (gameState.isCrashed) {
                elements.gameStatus.textContent = 'CRASHED!';
            } else if (gameState.isRunning) {
                elements.gameStatus.textContent = 'ГРА ТРИВАЄ';
            } else {
                elements.gameStatus.textContent = `СТАВКИ НА ${gameState.countdown} СЕКУНД`;
            }
        }

        function updatePotentialWin() {
            if (gameState.hasBet && gameState.isRunning && !gameState.isCrashed) {
                const win = Math.floor(gameState.betAmount * gameState.currentMultiplier);
                elements.potentialWin.classList.remove('hidden');
                elements.potentialWin.innerHTML = `💰 ${win} ⭐`;
            } else {
                elements.potentialWin.classList.add('hidden');
            }
        }

        function moveRocket() {
            const gameArea = document.getElementById('gameArea');
            const maxWidth = gameArea.clientWidth - 120;
            const maxHeight = gameArea.clientHeight - 120;
            
            const progress = (gameState.currentMultiplier - 1) * 50;
            const x = Math.min(progress * 2, Math.max(0, maxWidth));
            const y = Math.max(30, maxHeight - progress * 1.5);
            const rotation = 10 + progress * 0.2;
            
            elements.rocket.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
        }

        function updateBalance() {
            elements.balance.textContent = gameState.balance.toFixed(2);
        }

        function updateStats() {
            // Оновлення статистики в профілі
        }

        function showToast(message, type) {
            // Ваш код для тостів
        }

        // Функції ставок
        function placeBet() {
            const amount = parseInt(elements.betInput.value) || 10;
            
            if (amount > gameState.balance) {
                showToast('Недостатньо коштів', 'error');
                return;
            }
            
            if (gameState.isRunning || gameState.isCrashed) {
                showToast('Ставки тільки під час таймера!', 'error');
                return;
            }
            
            gameState.balance -= amount;
            gameState.betAmount = amount;
            gameState.hasBet = true;
            updateBalance();
            
            socket.emit('place_bet', { amount: amount });
            
            elements.placeBet.classList.add('hidden');
            elements.cancelBet.classList.remove('hidden');
            
            tg.HapticFeedback?.impactOccurred('medium');
        }

        function cashOut() {
            if (!gameState.hasBet || !gameState.isRunning || gameState.isCrashed) return;
            
            socket.emit('cash_out');
            elements.cashout.classList.add('hidden');
            
            tg.HapticFeedback?.notificationOccurred('success');
        }

        function cancelBet() {
            if (gameState.isRunning) {
                showToast('Не можна скасувати під час гри', 'error');
                return;
            }
            
            gameState.balance += gameState.betAmount;
            gameState.betAmount = 0;
            gameState.hasBet = false;
            updateBalance();
            
            socket.emit('cancel_bet');
            
            elements.placeBet.classList.remove('hidden');
            elements.cancelBet.classList.add('hidden');
            
            tg.HapticFeedback?.impactOccurred('light');
        }

        // Обробники кнопок
        elements.placeBet.addEventListener('click', placeBet);
        elements.cashout.addEventListener('click', cashOut);
        elements.cancelBet.addEventListener('click', cancelBet);

        document.getElementById('maxBtn').addEventListener('click', () => {
            elements.betInput.value = gameState.balance;
        });

        document.querySelectorAll('.quick-amount-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const amount = parseInt(btn.dataset.amount);
                const current = parseInt(elements.betInput.value) || 0;
                elements.betInput.value = current + amount;
            });
        });

        // Ініціалізація
        updateBalance();
    </script>
</body>
</html>
