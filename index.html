<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Game - Синхронізована</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #0e1219;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0e1219;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #1e2630;
            background-color: #0e1219;
        }
        
        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 15px;
            color: #fff;
        }
        
        .user-level {
            font-size: 11px;
            color: #6b7f98;
        }
        
        .balance-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #0e1219;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #31465c;
            cursor: pointer;
        }
        
        .balance-value {
            font-weight: 600;
            font-size: 14px;
            color: #f0b90b;
        }
        
        .balance-icon {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #0e1219;
        }

        /* History */
        .history-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #1e2630;
        }
        
        .history-title {
            color: #6b7f98;
            font-size: 12px;
            font-weight: 500;
        }
        
        .history-multipliers {
            display: flex;
            gap: 6px;
            overflow-x: auto;
        }
        
        .history-multiplier-item {
            color: #b3c6e2;
            font-size: 12px;
            font-weight: 600;
            background: #1e2630;
            padding: 2px 6px;
            border-radius: 12px;
        }

        .horizontal-history {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            overflow-x: auto;
            border-bottom: 1px solid #1e2630;
        }
        
        .history-chip {
            background-color: #1e2630;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #b3c6e2;
            white-space: nowrap;
        }

        /* Game Area */
        .game-area {
            flex: 2;
            position: relative;
            background-color: #0d1117;
            background-image: 
                linear-gradient(#1a202c 1px, transparent 1px),
                linear-gradient(90deg, #1a202c 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
            min-height: 280px;
        }

        /* Rocket */
        .rocket-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            filter: drop-shadow(0 0 15px #4299e1);
            transition: transform 0.05s linear;
            will-change: transform;
        }

        .rocket-svg {
            width: 80px;
            height: 80px;
        }

        .rocket-svg svg {
            width: 100%;
            height: 100%;
        }

        .rocket-body {
            fill: #63b3ed;
        }

        .rocket-window {
            fill: #fff;
        }

        .rocket-crashed .rocket-body {
            fill: #fc8181;
        }

        .flame {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 35px;
            background: linear-gradient(to bottom, #ffaa00, #ff5500);
            border-radius: 50% 50% 30% 30%;
            animation: flameFlicker 0.1s infinite alternate;
            filter: blur(2px);
        }

        @keyframes flameFlicker {
            0% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
            100% { opacity: 1; transform: translateX(-50%) scaleY(1.3); }
        }

        /* Multiplier */
        .multiplier-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid rgba(240, 185, 11, 0.5);
        }

        .multiplier-display {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 30px rgba(240, 185, 11, 0.6);
        }

        .multiplier-display.crashed {
            color: #fc8181;
        }

        .game-status {
            font-size: 12px;
            color: #6b7f98;
            margin-top: 5px;
        }

        /* Potential win */
        .potential-win {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #68d391;
            border: 1px solid #68d391;
            z-index: 30;
        }

        /* Timer */
        .timer-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            padding: 20px 30px;
            border-radius: 60px;
            border: 3px solid #f0b90b;
            z-index: 40;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 800;
            color: #f0b90b;
        }

        /* Players list */
        .players-section {
            background: #0e1219;
            border-top: 1px solid #1e2630;
            border-bottom: 1px solid #1e2630;
            max-height: 130px;
            overflow-y: auto;
        }

        .players-header {
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #1e2630;
            background: #0e1219;
            position: sticky;
            top: 0;
        }

        .players-title {
            color: #6b7f98;
            font-size: 12px;
        }

        .players-count {
            color: #f0b90b;
            font-size: 12px;
        }

        .players-list {
            padding: 8px 12px;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(30, 38, 48, 0.5);
            font-size: 13px;
        }

        .player-item:last-child {
            border-bottom: none;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-avatar-small {
            width: 24px;
            height: 24px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 1px solid #31465c;
        }

        .player-name {
            font-size: 13px;
            color: #fff;
        }

        .player-bet {
            color: #f0b90b;
            font-size: 12px;
            margin-right: 8px;
        }

        .player-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        .player-status.waiting {
            background: rgba(240, 185, 11, 0.1);
            color: #f0b90b;
        }

        .player-status.won {
            background: rgba(16, 185, 129, 0.1);
            color: #68d391;
        }

        .player-status.lost {
            background: rgba(239, 68, 68, 0.1);
            color: #fc8181;
        }

        /* Bet area */
        .betting-area {
            background: #0e1219;
            padding: 12px;
        }

        .bet-input-container {
            background: #1a232f;
            border: 1px solid #31465c;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .bet-label {
            color: #6b7f98;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .bet-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bet-amount-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            outline: none;
        }

        .bet-currency {
            font-size: 22px;
            color: #f0b90b;
        }

        .bet-max-btn {
            background: #f0b90b;
            color: #0e1219;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .quick-amounts {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .quick-amount-btn {
            flex: 1;
            background: #1a232f;
            border: 1px solid #31465c;
            color: #b3c6e2;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .auto-cashout-container {
            background: #1a232f;
            border: 1px solid #31465c;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .auto-cashout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .auto-cashout-title {
            color: #6b7f98;
            font-size: 12px;
        }

        .auto-cashout-toggle {
            width: 44px;
            height: 22px;
            background: #2a3440;
            border-radius: 11px;
            position: relative;
            cursor: pointer;
        }

        .auto-cashout-toggle.active {
            background: #f0b90b;
        }

        .auto-cashout-toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }

        .auto-cashout-toggle.active::after {
            left: 24px;
        }

        .auto-multipliers {
            display: flex;
            gap: 6px;
        }

        .auto-multiplier-btn {
            flex: 1;
            background: #2a3440;
            border: 1px solid #31465c;
            color: #b3c6e2;
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .auto-multiplier-btn.active {
            background: #f0b90b;
            color: #0e1219;
            border-color: #f0b90b;
        }

        .bet-controls {
            display: flex;
            gap: 10px;
        }

        .bet-btn {
            flex: 1;
            padding: 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .bet-btn.primary {
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            color: #0e1219;
        }

        .bet-btn.cashout {
            background: linear-gradient(135deg, #f687b3, #ed64a6);
            color: #fff;
        }

        .bet-btn.cancel {
            background: #2a3440;
            color: #b3c6e2;
        }

        .bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Navigation */
        .navbar {
            display: flex;
            background: #0e1219;
            border-top: 1px solid #1e2630;
            padding: 4px 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 0;
            color: #6b7f98;
            font-size: 11px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #f0b90b;
        }

        .nav-icon {
            font-size: 20px;
        }

        /* Screens */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        .hidden {
            display: none !important;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a232f;
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: 0.3s;
            z-index: 2000;
            border: 1px solid #31465c;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 3px solid #68d391;
        }

        .toast.error {
            border-left: 3px solid #fc8181;
        }

        /* Loading */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0e1219;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid #1e2630;
            border-top-color: #f0b90b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div>Підключення до сервера...</div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="user-block">
                <div class="user-avatar" id="userAvatar">G</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Гравець</div>
                    <div class="user-level">Level 1</div>
                </div>
            </div>
            <div class="balance-block" id="balanceBtn">
                <span class="balance-value" id="balance">100.00</span>
                <span class="balance-icon">⭐</span>
            </div>
        </div>

        <!-- Crash Screen -->
        <div id="crashScreen" class="screen active">
            <!-- History -->
            <div class="history-stats">
                <span class="history-title">ІСТОРІЯ СТАВОК</span>
                <div class="history-multipliers" id="historyMultipliers">
                    <span class="history-multiplier-item">2.19x</span>
                    <span class="history-multiplier-item">2.11x</span>
                    <span class="history-multiplier-item">1.47x</span>
                    <span class="history-multiplier-item">1.77x</span>
                </div>
            </div>
            <div class="horizontal-history" id="historyBar">
                <span class="history-chip">6.98x</span>
                <span class="history-chip">2.38x</span>
                <span class="history-chip">1.20x</span>
                <span class="history-chip">3.03x</span>
                <span class="history-chip">4.54x</span>
            </div>

            <!-- Game Area -->
            <div class="game-area" id="gameArea">
                <!-- Rocket -->
                <div class="rocket-container" id="rocketContainer">
                    <svg class="rocket-svg" viewBox="0 0 100 100">
                        <path class="rocket-body" d="M50 10 L75 40 L75 75 L25 75 L25 40 L50 10 Z" fill="#63b3ed"/>
                        <polygon points="50,10 60,30 40,30" fill="#4a86b8"/>
                        <polygon points="25,45 10,55 25,65" fill="#4a86b8"/>
                        <polygon points="75,45 90,55 75,65" fill="#4a86b8"/>
                        <circle cx="50" cy="45" r="8" fill="#fff"/>
                        <circle cx="50" cy="45" r="5" fill="#2d3748"/>
                    </svg>
                    <div class="flame"></div>
                </div>

                <!-- Multiplier -->
                <div class="multiplier-container">
                    <div class="multiplier-display" id="multiplier">1.00x</div>
                    <div class="game-status" id="gameStatus">СТАВКИ НА 5 СЕКУНД</div>
                </div>

                <!-- Timer -->
                <div class="timer-container hidden" id="timerContainer">
                    <div class="timer-display" id="timerDisplay">5</div>
                </div>

                <!-- Potential win -->
                <div class="potential-win hidden" id="potentialWin">💰 0 ⭐</div>
            </div>

            <!-- Players Section -->
            <div class="players-section">
                <div class="players-header">
                    <span class="players-title">СТАВКИ ГРАВЦІВ</span>
                    <span class="players-count" id="playersCount">0 гравців</span>
                </div>
                <div class="players-list" id="playersList"></div>
            </div>

            <!-- Betting Area -->
            <div class="betting-area">
                <div class="bet-input-container">
                    <div class="bet-label">СТАВКА</div>
                    <div class="bet-input-row">
                        <input type="number" class="bet-amount-input" id="betAmount" value="10" min="1">
                        <span class="bet-currency">⭐</span>
                        <button class="bet-max-btn" id="maxBtn">MAX</button>
                    </div>
                </div>

                <div class="quick-amounts">
                    <button class="quick-amount-btn" data-amount="5">+5</button>
                    <button class="quick-amount-btn" data-amount="10">+10</button>
                    <button class="quick-amount-btn" data-amount="50">+50</button>
                    <button class="quick-amount-btn" data-amount="100">+100</button>
                </div>

                <div class="auto-cashout-container">
                    <div class="auto-cashout-header">
                        <span class="auto-cashout-title">АВТОВИВІД</span>
                        <div class="auto-cashout-toggle" id="autoCashoutToggle"></div>
                    </div>
                    <div class="auto-multipliers" id="autoMultipliers" style="display: none;">
                        <button class="auto-multiplier-btn" data-multi="1.5">x1.5</button>
                        <button class="auto-multiplier-btn" data-multi="2">x2</button>
                        <button class="auto-multiplier-btn" data-multi="3">x3</button>
                        <button class="auto-multiplier-btn" data-multi="5">x5</button>
                    </div>
                </div>

                <div class="bet-controls">
                    <button class="bet-btn cancel" id="cancelBetBtn" style="display: none;">
                        Скасувати
                    </button>
                    <button class="bet-btn primary" id="placeBetBtn">
                        ПОСТАВИТИ СТАВКУ
                    </button>
                    <button class="bet-btn cashout" id="cashoutBtn" style="display: none;">
                        ЗАБРАТИ
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast">
            <i class="fas" id="toastIcon"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script>
        // Telegram
        const tg = window.Telegram?.WebApp || {
            initDataUnsafe: { user: { id: 123456, first_name: 'Гравець' } },
            expand: () => {},
            ready: () => {},
            HapticFeedback: {
                impactOccurred: () => {},
                notificationOccurred: () => {},
                selectionChanged: () => {}
            }
        };
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user || { id: 123456, first_name: 'Гравець' };
        const SERVER_URL = "http://localhost:8001";

        // Підключення до Socket.IO
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling']
        });

        // Стан гри
        const gameState = {
            balance: 100,
            currentBet: 0,
            hasBet: false,
            players: [],
            multiplier: 1.00,
            isRunning: false,
            isCrashed: false,
            countdown: 5,
            autoCashout: false,
            autoCashoutMultiplier: 2
        };

        // Оновлюємо ім'я користувача
        document.getElementById('userName').textContent = user.first_name;
        document.getElementById('userAvatar').textContent = user.first_name.charAt(0).toUpperCase();

        // Сховати завантаження при підключенні
        socket.on('connect', () => {
            console.log('Підключено до сервера');
            document.getElementById('loadingScreen').style.display = 'none';
            
            socket.emit('register_player', {
                user_id: user.id,
                name: user.first_name
            });
        });

        // Отримуємо стан гри
        socket.on('game_state', (data) => {
            gameState.multiplier = data.multiplier;
            gameState.isRunning = data.is_running;
            gameState.isCrashed = data.is_crashed;
            gameState.countdown = data.countdown;
            gameState.players = data.players || [];
            updateUI();
        });

        // Оновлення гри
        socket.on('game_update', (data) => {
            gameState.multiplier = data.multiplier;
            gameState.players = data.players || [];
            updateUI();
            updateRocket();
        });

        // Таймер
        socket.on('countdown', (data) => {
            gameState.countdown = data.time;
            gameState.players = data.players || [];
            updateUI();
            
            const timerContainer = document.getElementById('timerContainer');
            const timerDisplay = document.getElementById('timerDisplay');
            if (timerContainer && timerDisplay) {
                timerContainer.classList.remove('hidden');
                timerDisplay.textContent = data.time;
            }
        });

        // Гра почалась
        socket.on('game_started', (data) => {
            gameState.isRunning = true;
            gameState.isCrashed = false;
            gameState.players = data.players || [];
            updateUI();
            
            document.getElementById('timerContainer')?.classList.add('hidden');
        });

        // Краш
        socket.on('game_crashed', (data) => {
            gameState.isRunning = false;
            gameState.isCrashed = true;
            gameState.multiplier = data.crash_point;
            gameState.players = data.players || [];
            updateUI();
            showCrash();
        });

        // Оновлення гравців
        socket.on('players_update', (data) => {
            gameState.players = data.players || [];
            updatePlayersList();
        });

        // Результат ставки (виграш)
        socket.on('cashout_result', (data) => {
            const win = data.win;
            gameState.balance += win;
            gameState.currentBet = 0;
            gameState.hasBet = false;
            updateBalance();
            showMessage(`Виграш ${win} ⭐ (x${data.multiplier})`, 'success');
            
            document.getElementById('cashoutBtn').style.display = 'none';
            document.getElementById('placeBetBtn').style.display = 'block';
            document.getElementById('cancelBetBtn').style.display = 'none';
            document.getElementById('potentialWin').classList.add('hidden');
        });

        // Результат ставки (програш)
        socket.on('bet_result', (data) => {
            if (data.result === 'lost') {
                gameState.currentBet = 0;
                gameState.hasBet = false;
                showMessage(`Програно ${data.amount} ⭐`, 'error');
                
                document.getElementById('cashoutBtn').style.display = 'none';
                document.getElementById('placeBetBtn').style.display = 'block';
                document.getElementById('cancelBetBtn').style.display = 'none';
                document.getElementById('potentialWin').classList.add('hidden');
            }
        });

        // Помилка
        socket.on('error', (data) => {
            showMessage(data.message, 'error');
        });

        // Функції інтерфейсу
        function placeBet() {
            const amount = parseInt(document.getElementById('betAmount').value) || 10;
            
            if (amount > gameState.balance) {
                showMessage('Недостатньо коштів', 'error');
                return;
            }
            
            if (gameState.isRunning || gameState.isCrashed) {
                showMessage('Ставки тільки під час таймера!', 'error');
                return;
            }
            
            gameState.balance -= amount;
            gameState.currentBet = amount;
            gameState.hasBet = true;
            updateBalance();
            
            socket.emit('place_bet', { amount: amount });
            
            document.getElementById('placeBetBtn').style.display = 'none';
            document.getElementById('cancelBetBtn').style.display = 'block';
            
            tg.HapticFeedback?.impactOccurred('medium');
        }

        function cashOut() {
            if (!gameState.isRunning || gameState.isCrashed) {
                showMessage('Не можна забрати зараз', 'error');
                return;
            }
            
            socket.emit('cash_out');
            
            tg.HapticFeedback?.notificationOccurred('success');
        }

        function cancelBet() {
            if (gameState.isRunning) {
                showMessage('Не можна скасувати під час гри', 'error');
                return;
            }
            
            gameState.balance += gameState.currentBet;
            gameState.currentBet = 0;
            gameState.hasBet = false;
            updateBalance();
            
            document.getElementById('placeBetBtn').style.display = 'block';
            document.getElementById('cancelBetBtn').style.display = 'none';
            
            tg.HapticFeedback?.impactOccurred('light');
        }

        function updateUI() {
            updateMultiplier();
            updatePlayersList();
            updateGameStatus();
            updatePotentialWin();
        }

        function updateMultiplier() {
            const el = document.getElementById('multiplier');
            if (el) {
                if (gameState.isCrashed) {
                    el.innerHTML = '💥 ' + gameState.multiplier.toFixed(2) + 'x';
                    el.classList.add('crashed');
                } else {
                    el.innerHTML = gameState.multiplier.toFixed(2) + 'x';
                    el.classList.remove('crashed');
                }
            }
        }

        function updatePlayersList() {
            const container = document.getElementById('playersList');
            const countEl = document.getElementById('playersCount');
            if (!container) return;
            
            const activePlayers = gameState.players.filter(p => p.bet > 0);
            countEl.textContent = activePlayers.length + ' гравців';
            
            if (activePlayers.length === 0) {
                container.innerHTML = '<div style="color: #6b7f98; text-align: center; padding: 10px;">Немає активних ставок</div>';
                return;
            }
            
            container.innerHTML = activePlayers.map(p => {
                let statusClass = 'waiting';
                let statusText = 'Очікує';
                
                if (p.cashed_out) {
                    statusClass = 'won';
                    statusText = `✅ x${p.cashed_out_at?.toFixed(2) || '?'}`;
                } else if (p.lost) {
                    statusClass = 'lost';
                    statusText = '❌ Програв';
                }
                
                return `
                    <div class="player-item">
                        <div class="player-info">
                            <div class="player-avatar-small">${p.name.charAt(0)}</div>
                            <span class="player-name">${p.name}</span>
                        </div>
                        <div>
                            <span class="player-bet">${p.bet} ⭐</span>
                            <span class="player-status ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateGameStatus() {
            const statusEl = document.getElementById('gameStatus');
            if (!statusEl) return;
            
            if (gameState.isCrashed) {
                statusEl.textContent = 'CRASHED!';
            } else if (gameState.isRunning) {
                statusEl.textContent = 'ГРА ТРИВАЄ';
            } else {
                statusEl.textContent = `СТАВКИ НА ${gameState.countdown} СЕКУНД`;
            }
        }

        function updatePotentialWin() {
            const potentialEl = document.getElementById('potentialWin');
            if (!potentialEl) return;
            
            if (gameState.hasBet && gameState.isRunning && !gameState.isCrashed) {
                const win = Math.floor(gameState.currentBet * gameState.multiplier);
                potentialEl.textContent = `💰 ${win} ⭐`;
                potentialEl.classList.remove('hidden');
            } else {
                potentialEl.classList.add('hidden');
            }
        }

        function updateRocket() {
            const rocket = document.getElementById('rocketContainer');
            if (!rocket || !gameState.isRunning) return;
            
            const progress = (gameState.multiplier - 1) * 50;
            const x = Math.min(progress * 2, 250);
            const y = Math.max(30, 200 - progress * 1.5);
            const rotation = 10 + progress * 0.2;
            
            rocket.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
        }

        function updateBalance() {
            const el = document.getElementById('balance');
            if (el) el.textContent = gameState.balance.toFixed(2);
        }

        function showCrash() {
            const rocket = document.getElementById('rocketContainer');
            if (rocket) rocket.classList.add('rocket-crashed');
        }

        function showMessage(msg, type) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const message = document.getElementById('toastMessage');
            
            toast.className = `toast ${type} show`;
            icon.className = type === 'success' ? 'fas fa-check' : 'fas fa-exclamation';
            message.textContent = msg;
            
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Обробники кнопок
        document.getElementById('placeBetBtn').addEventListener('click', placeBet);
        document.getElementById('cashoutBtn').addEventListener('click', cashOut);
        document.getElementById('cancelBetBtn').addEventListener('click', cancelBet);

        // Max button
        document.getElementById('maxBtn').addEventListener('click', () => {
            document.getElementById('betAmount').value = gameState.balance;
        });

        // Quick amounts
        document.querySelectorAll('.quick-amount-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const amount = parseInt(btn.dataset.amount);
                const current = parseInt(document.getElementById('betAmount').value) || 0;
                document.getElementById('betAmount').value = current + amount;
            });
        });

        // Auto cashout toggle
        const toggle = document.getElementById('autoCashoutToggle');
        const multipliers = document.getElementById('autoMultipliers');
        
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            gameState.autoCashout = toggle.classList.contains('active');
            multipliers.style.display = gameState.autoCashout ? 'flex' : 'none';
        });

        // Auto multiplier buttons
        document.querySelectorAll('.auto-multiplier-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.auto-multiplier-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameState.autoCashoutMultiplier = parseFloat(btn.dataset.multi);
            });
        });

        // Ініціалізація
        updateBalance();
    </script>
</body>
</html>
