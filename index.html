
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash Game - Синхронізована</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Всі стилі як в попередній версії */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0e1219;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Додайте всі стилі з попередньої версії */
        .game-area { flex: 2; position: relative; background: #0d1117; min-height: 280px; }
        .rocket-container { position: absolute; bottom: 20px; left: 20px; transition: transform 0.05s; }
        .multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; }
        .players-list { max-height: 120px; overflow-y: auto; }
        .player { display: flex; justify-content: space-between; padding: 5px 10px; }
        .player.cashed { background: rgba(16, 185, 129, 0.2); }
        .player.lost { background: rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- Вставте весь HTML з попередньої версії -->
        <!-- АЛЕ замініть JavaScript на цей: -->
    </div>

    <script>
        // Telegram
        const tg = window.Telegram?.WebApp || {
            initDataUnsafe: { user: { id: 123456, first_name: 'Test' } }
        };
        tg.expand();

        const user = tg.initDataUnsafe?.user || { id: 123456, first_name: 'Гравець' };
        const SERVER_URL = "http://localhost:8001"; // Ваш сервер

        // Підключення до Socket.IO
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling']
        });

        // Стан гри
        const gameState = {
            balance: 100,
            currentBet: 0,
            hasBet: false,
            players: [],
            multiplier: 1.00,
            isRunning: false,
            isCrashed: false,
            countdown: 5
        };

        // Реєструємо гравця
        socket.on('connect', () => {
            console.log('Підключено до сервера');
            socket.emit('register_player', {
                user_id: user.id,
                name: user.first_name
            });
        });

        // Отримуємо стан гри
        socket.on('game_state', (data) => {
            gameState.multiplier = data.multiplier;
            gameState.isRunning = data.is_running;
            gameState.isCrashed = data.is_crashed;
            gameState.countdown = data.countdown;
            gameState.players = data.players;
            updateUI();
        });

        // Оновлення гри
        socket.on('game_update', (data) => {
            gameState.multiplier = data.multiplier;
            gameState.players = data.players;
            updateUI();
            updateRocket();
        });

        // Таймер
        socket.on('countdown', (data) => {
            gameState.countdown = data.time;
            gameState.players = data.players;
            updateUI();
        });

        // Гра почалась
        socket.on('game_started', (data) => {
            gameState.isRunning = true;
            gameState.isCrashed = false;
            gameState.players = data.players;
            updateUI();
        });

        // Краш
        socket.on('game_crashed', (data) => {
            gameState.isRunning = false;
            gameState.isCrashed = true;
            gameState.multiplier = data.crash_point;
            gameState.players = data.players;
            updateUI();
            showCrash();
        });

        // Оновлення гравців
        socket.on('players_update', (data) => {
            gameState.players = data.players;
            updatePlayersList();
        });

        // Результат ставки (виграш)
        socket.on('cashout_result', (data) => {
            const win = data.win;
            gameState.balance += win;
            gameState.hasBet = false;
            updateBalance();
            showMessage(`Виграш ${win} ⭐ (x${data.multiplier})`, 'success');
        });

        // Результат ставки (програш)
        socket.on('bet_result', (data) => {
            if (data.result === 'lost') {
                gameState.hasBet = false;
                showMessage(`Програно ${data.amount} ⭐`, 'error');
            }
        });

        // Помилка
        socket.on('error', (data) => {
            showMessage(data.message, 'error');
        });

        // Функції інтерфейсу
        function placeBet() {
            const amount = parseInt(document.getElementById('betAmount').value) || 10;
            
            if (amount > gameState.balance) {
                showMessage('Недостатньо коштів', 'error');
                return;
            }
            
            if (gameState.isRunning || gameState.isCrashed) {
                showMessage('Ставки тільки під час таймера!', 'error');
                return;
            }
            
            gameState.balance -= amount;
            gameState.currentBet = amount;
            gameState.hasBet = true;
            updateBalance();
            
            socket.emit('place_bet', { amount: amount });
            
            document.getElementById('placeBetBtn').style.display = 'none';
            document.getElementById('cancelBetBtn').style.display = 'block';
        }

        function cashOut() {
            if (!gameState.isRunning || gameState.isCrashed) {
                showMessage('Не можна забрати зараз', 'error');
                return;
            }
            
            socket.emit('cash_out');
            
            document.getElementById('cashoutBtn').style.display = 'none';
        }

        function cancelBet() {
            if (gameState.isRunning) {
                showMessage('Не можна скасувати під час гри', 'error');
                return;
            }
            
            gameState.balance += gameState.currentBet;
            gameState.currentBet = 0;
            gameState.hasBet = false;
            updateBalance();
            
            // Відправляємо на сервер скасування (опціонально)
            
            document.getElementById('placeBetBtn').style.display = 'block';
            document.getElementById('cancelBetBtn').style.display = 'none';
        }

        function updateUI() {
            updateMultiplier();
            updatePlayersList();
            updateGameStatus();
        }

        function updateMultiplier() {
            const el = document.getElementById('multiplier');
            if (el) {
                if (gameState.isCrashed) {
                    el.innerHTML = '💥 ' + gameState.multiplier.toFixed(2) + 'x';
                } else {
                    el.innerHTML = gameState.multiplier.toFixed(2) + 'x';
                }
            }
        }

        function updatePlayersList() {
            const container = document.getElementById('playersList');
            if (!container) return;
            
            if (gameState.players.length === 0) {
                container.innerHTML = '<div style="color: #6b7f98; padding: 10px;">Немає активних ставок</div>';
                return;
            }
            
            container.innerHTML = gameState.players.map(p => {
                let status = 'waiting';
                let statusText = 'Очікує';
                
                if (p.cashed_out) {
                    status = 'won';
                    statusText = `✅ x${p.cashed_out_at.toFixed(2)}`;
                } else if (p.lost) {
                    status = 'lost';
                    statusText = '❌ Програв';
                }
                
                return `
                    <div class="player ${p.cashed_out ? 'cashed' : ''} ${p.lost ? 'lost' : ''}">
                        <div>
                            <span style="font-weight:600;">${p.name}</span>
                        </div>
                        <div>
                            <span style="color:#f0b90b;">${p.bet} ⭐</span>
                            <span style="margin-left:8px;color:${p.cashed_out ? '#68d391' : (p.lost ? '#fc8181' : '#f0b90b')};">${statusText}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateGameStatus() {
            const statusEl = document.getElementById('gameStatus');
            if (!statusEl) return;
            
            if (gameState.isCrashed) {
                statusEl.textContent = 'CRASHED!';
            } else if (gameState.isRunning) {
                statusEl.textContent = 'ГРА ТРИВАЄ';
            } else {
                statusEl.textContent = `СТАВКИ НА ${gameState.countdown} СЕКУНД`;
            }
        }

        function updateRocket() {
            const rocket = document.getElementById('rocket');
            if (!rocket || !gameState.isRunning) return;
            
            const progress = (gameState.multiplier - 1) * 50;
            const x = Math.min(progress * 2, 200);
            const y = Math.max(30, 200 - progress * 1.5);
            rocket.style.transform = `translate(${x}px, ${y}px)`;
        }

        function updateBalance() {
            const el = document.getElementById('balance');
            if (el) el.textContent = gameState.balance.toFixed(2);
        }

        function showCrash() {
            // Анімація крашу
            const rocket = document.getElementById('rocket');
            if (rocket) rocket.classList.add('crashed');
        }

        function showMessage(msg, type) {
            // Тут ваш код для показу повідомлень
            console.log(msg, type);
        }

        // Ініціалізація
        window.onload = () => {
            // Додайте обробники кнопок
            document.getElementById('placeBetBtn')?.addEventListener('click', placeBet);
            document.getElementById('cashoutBtn')?.addEventListener('click', cashOut);
            document.getElementById('cancelBetBtn')?.addEventListener('click', cancelBet);
            
            updateBalance();
        };
    </script>
</body>
</html>
