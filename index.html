<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🚀 Rocket</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#07070f;--bg2:#0e0e1c;--bg3:#151528;--accent:#6c4fff;--accent2:#4a2fcc;--green:#00e676;--red:#ff1744;--orange:#ff6d00;--gold:#ffd600;--ton:#0098ea}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Inter',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-height:100vh}
#sky{position:relative;flex:0 0 225px;overflow:hidden;background:#04040c}
#sky::before{content:'';position:absolute;inset:0;background-image:
  radial-gradient(1px 1px at 8% 14%,#fff8,transparent),radial-gradient(1px 1px at 22% 67%,#fff5,transparent),
  radial-gradient(1px 1px at 37% 11%,#fff7,transparent),radial-gradient(1px 1px at 54% 79%,#fff4,transparent),
  radial-gradient(1px 1px at 70% 28%,#fff6,transparent),radial-gradient(1.5px 1.5px at 75% 71%,#fffc,transparent),
  radial-gradient(1px 1px at 92% 7%,#fff9,transparent),radial-gradient(1px 1px at 14% 89%,#fff6,transparent)}
#gc{position:absolute;inset:0;width:100%;height:100%}
#mult{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:44px;font-weight:900;color:#fff;letter-spacing:3px;pointer-events:none;z-index:5;text-align:center;text-shadow:0 0 40px #6c4fff44}
#mult.crashed{color:var(--red);text-shadow:0 0 40px #ff174455;animation:shake .3s}
#mult.waiting{font-size:18px;color:#444;text-shadow:none;letter-spacing:1px}
@keyframes shake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(-52%,-50%)}75%{transform:translate(-48%,-50%)}}
#rkt{position:absolute;pointer-events:none;z-index:6;display:none}
.rb{position:relative;width:44px;height:70px;animation:rwob .4s ease-in-out infinite alternate}
@keyframes rwob{0%{transform:rotate(-2deg)}100%{transform:rotate(2deg) scale(1.03)}}
.rsv{width:44px;height:70px;display:block}
.fw{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.fl{border-radius:50% 50% 30% 30%;animation:flk .08s ease-in-out infinite alternate;transform-origin:center top}
.f1{width:18px;height:30px;background:linear-gradient(180deg,#fff,#ffe066 25%,#ff6d00 70%,transparent)}
.f2{width:11px;height:22px;background:linear-gradient(180deg,#ffe066,#ff6d00 50%,transparent);margin-top:-20px;animation-delay:.03s}
.f3{width:7px;height:15px;background:linear-gradient(180deg,#ff6d00,transparent);margin-top:-13px;animation-delay:.015s}
@keyframes flk{0%{transform:scaleX(1)}100%{transform:scaleX(.75) scaleY(1.2)}}
.smk{position:absolute;border-radius:50%;animation:smkr .7s ease-out forwards;pointer-events:none}
@keyframes smkr{0%{opacity:.2;transform:scale(.4)}100%{opacity:0;transform:scale(2.5) translateY(20px)}}
#topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
#balpill{background:#00000088;border:0.5px solid #ffd60030;border-radius:20px;padding:5px 12px;font-family:'Orbitron',monospace;font-size:11px;color:var(--gold)}
#rlbl{font-size:9px;color:#252535;background:#00000066;padding:4px 8px;border-radius:10px}
#lang-btn{background:#00000066;border:0.5px solid #ffffff15;border-radius:10px;color:#666;font-size:11px;padding:4px 10px;cursor:pointer}
#hist{display:flex;gap:5px;padding:6px 10px;overflow-x:auto;background:#060610;border-bottom:0.5px solid #ffffff06;scrollbar-width:none;flex-shrink:0}
#hist::-webkit-scrollbar{display:none}
.hc{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.hl{background:#111122;color:#333355;border:0.5px solid #ffffff07}
.hm{background:#0a1a10;color:var(--green);border:0.5px solid #00e67615}
.hh{background:#1a0e06;color:var(--orange);border:0.5px solid #ff6d0015}
.hmoon{background:#120c30;color:#aa77ff;border:0.5px solid #aa77ff25}
#ctrls{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0}
.card{background:var(--bg2);border:0.5px solid #ffffff09;border-radius:12px;padding:10px 12px}
.cl{font-size:9px;color:#303050;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.inp{width:100%;background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;padding:7px 10px;outline:none}
.inp:focus{border-color:#6c4fff44}
.qbtns{display:flex;gap:3px;margin-top:6px}
.qb{background:#111125;border:0.5px solid #ffffff08;border-radius:6px;color:#444;font-size:10px;padding:3px 0;cursor:pointer;flex:1;text-align:center}
.qb:active{background:#1a1a35;color:#ccc}
.ar{display:flex;align-items:center;gap:6px}
.tl{font-size:12px;color:#333;flex:1}
.tog{width:36px;height:20px;background:#111125;border-radius:10px;border:0.5px solid #ffffff0c;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:19px}
.ai{background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:12px;padding:5px 8px;width:70px;outline:none;margin-top:8px}
#bb{grid-column:1/-1;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;padding:14px;cursor:pointer;letter-spacing:1px;transition:opacity .15s,transform .1s}
#bb:active{transform:scale(.98)}
#bb.co{background:linear-gradient(135deg,var(--orange),#cc4400)}
#bb:disabled{opacity:.2;cursor:not-allowed}
#ton-wrap{padding:0 12px 6px;flex-shrink:0}
#tc-btn{width:100%;background:var(--ton);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;padding:10px;cursor:pointer;letter-spacing:1px}
#tc-btn:active{opacity:.85}
#pw{flex:1;overflow:hidden;padding:0 12px;min-height:0;display:flex;flex-direction:column}
.st{font-size:9px;color:#1e1e30;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.pc{background:var(--bg3);border-radius:8px;padding:1px 6px;font-size:9px;color:#333}
#pl{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;scrollbar-width:none;padding-bottom:6px}
#pl::-webkit-scrollbar{display:none}
.pr{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid #ffffff05;border-radius:8px;padding:7px 10px;flex-shrink:0}
.pr.me{border-color:#6c4fff44}
.pav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.pav img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.pi{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}
.pn{font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pn.m{color:#fff;font-weight:600}
.pu{font-size:9px;color:#1e1e30;margin-top:1px}
.pa{font-family:'Orbitron',monospace;font-size:11px;font-weight:700}
.pmx{font-size:9px;padding:2px 5px;border-radius:5px;font-family:'Orbitron',monospace;margin-right:2px}
#mbg{display:none;position:fixed;inset:0;background:#000000bb;z-index:100;align-items:flex-end;justify-content:center}
#mbg.open{display:flex}
#mod{background:var(--bg2);border-radius:20px 20px 0 0;border:0.5px solid #ffffff10;padding:20px;width:100%;max-width:480px}
#mod h3{font-family:'Orbitron',monospace;font-size:15px;margin-bottom:3px}
#mod p{font-size:12px;color:#333;margin-bottom:14px}
.sos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.so{background:var(--bg3);border:0.5px solid #ffffff0c;border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;transition:border-color .15s}
.so.sel,.so:active{border-color:var(--ton)}
.so .sa{font-size:16px}
.so .sl{font-family:'Orbitron',monospace;font-size:10px;margin-top:4px;color:#aaa}
#cton{width:100%;background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:14px;padding:9px 12px;outline:none;margin-bottom:10px}
#pbtn{width:100%;background:var(--ton);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:13px;cursor:pointer}
#pbtn:active{opacity:.85}
#mcl{width:100%;background:transparent;border:none;color:#333;font-size:12px;padding:10px;cursor:pointer;margin-top:2px}
#wp{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#0d2010,#081508);border:1px solid var(--green);border-radius:18px;padding:28px 36px;text-align:center;z-index:250;box-shadow:0 0 40px #00e67620}
#wp.show{display:block;animation:popin .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popin{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.wm{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:var(--green)}
.wa{font-family:'Orbitron',monospace;font-size:22px;color:#fff;margin-top:6px}
.wl{font-size:11px;color:#333;margin-top:8px}
#toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-family:'Orbitron',monospace;font-size:11px;padding:8px 18px;border-radius:12px;z-index:300;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
#toast.win{background:var(--green);color:#000}
#toast.info{background:var(--ton)}
#toast.show{opacity:1}
.sp{position:fixed;pointer-events:none;z-index:200;font-size:16px;animation:spf 1s ease-out forwards}
@keyframes spf{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px) scale(.3)}}
#conn{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:#333;background:#0a0a14;padding:3px 10px;border-radius:10px;z-index:50}
</style>
</head>
<body>
<div id="app">
  <div id="sky">
    <canvas id="gc"></canvas>
    <div id="mult" class="waiting">...</div>
    <div id="rkt">
      <div class="rb">
        <svg class="rsv" viewBox="0 0 44 70" fill="none">
          <path d="M22 4C14 4 8 18 8 36L36 36C36 18 30 4 22 4Z" fill="#ddd0ff"/>
          <path d="M22 4C18 4 14 12 12 22L32 22C30 12 26 4 22 4Z" fill="#ece6ff"/>
          <circle cx="22" cy="22" r="6" fill="#6c4fff" opacity=".95"/>
          <circle cx="22" cy="22" r="4" fill="#9a80ff"/>
          <circle cx="20" cy="20" r="1.5" fill="#fff" opacity=".7"/>
          <path d="M8 36L1 52L10 45L8 36Z" fill="#aa88ff"/>
          <path d="M36 36L43 52L34 45L36 36Z" fill="#aa88ff"/>
          <path d="M18 6Q22 1 26 6" stroke="#bbaaff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <rect x="8" y="34" width="28" height="4" rx="2" fill="#9966ff"/>
          <text x="4" y="18" font-size="7" fill="#ffd600" opacity=".9">★</text>
          <text x="31" y="25" font-size="5" fill="#ffd600" opacity=".6">★</text>
        </svg>
        <div class="fw"><div class="fl f1"></div><div class="fl f2"></div><div class="fl f3"></div></div>
      </div>
    </div>
    <div id="topbar">
      <div id="rlbl">Round #<span id="rid">1</span></div>
      <div id="balpill">💎 <span id="bal">1.00</span> TON</div>
      <button id="lang-btn" onclick="toggleLang()">🌐 UK</button>
    </div>
  </div>
  <div id="hist"></div>
  <div id="ctrls">
    <div class="card">
      <div class="cl" id="l-bet">СТАВКА</div>
      <input class="inp" id="bi" type="number" value="0.1" min="0.1" step="0.1">
      <div class="qbtns">
        <button class="qb" onclick="sB(.1)">0.1</button>
        <button class="qb" onclick="sB(.5)">0.5</button>
        <button class="qb" onclick="sB(1)">1</button>
        <button class="qb" onclick="hB()">½</button>
        <button class="qb" onclick="x2B()">×2</button>
      </div>
    </div>
    <div class="card">
      <div class="cl" id="l-auto">АВТО-ВИВІД</div>
      <div class="ar"><span class="tl" id="l-auto-lbl">Авто</span><div class="tog" id="atog" onclick="toggleAuto()"></div></div>
      <input class="ai" id="av" type="number" value="2.0" min="1.1" step="0.1">
    </div>
    <button id="bb" onclick="handleBet()">🚀 <span id="l-bet-btn">ПОСТАВИТИ</span></button>
  </div>
  <div id="ton-wrap">
    <button id="tc-btn" onclick="handleTonBtn()">💎 <span id="l-ton-btn">Поповнити через TON</span></button>
  </div>
  <div id="pw">
    <div class="st"><span id="l-players">ГРАВЦІ</span> <span class="pc" id="pcnt">0</span></div>
    <div id="pl"></div>
  </div>
</div>

<div id="mbg" onclick="if(event.target===this)closeTopup()">
  <div id="mod">
    <h3>💎 Поповнення TON</h3>
    <p id="l-modal-sub">Мінімум 0.1 TON</p>
    <div class="sos">
      <div class="so" onclick="pickT(this,.5)"><div class="sa">💎</div><div class="sl">0.5 TON</div></div>
      <div class="so sel" onclick="pickT(this,1)"><div class="sa">💎💎</div><div class="sl">1 TON</div></div>
      <div class="so" onclick="pickT(this,5)"><div class="sa">💎💎💎</div><div class="sl">5 TON</div></div>
      <div class="so" onclick="pickT(this,10)"><div class="sa">🔷</div><div class="sl">10 TON</div></div>
      <div class="so" onclick="pickT(this,50)"><div class="sa">🔷🔷</div><div class="sl">50 TON</div></div>
      <div class="so" onclick="pickT(this,100)"><div class="sa">💠</div><div class="sl">100 TON</div></div>
    </div>
    <input class="inp" id="cton" type="number" min="0.1" step="0.1" placeholder="Інша сума...">
    <button id="pbtn" onclick="doTonPayment()">Відправити TON</button>
    <button id="mcl" onclick="closeTopup()">Скасувати</button>
  </div>
</div>

<div id="wp"><div class="wm" id="wm">2.00×</div><div class="wa" id="wa">+0.20 TON</div><div class="wl">Виведено!</div></div>
<div id="toast"></div>
<div id="conn">⚡ підключення...</div>

<script>
// ════════════════════════════════════════════════════
// ЄДИНЕ налаштування — вставити URL Railway бекенду
// ════════════════════════════════════════════════════
const SERVER = "https://rocket-server-359o.onrender.com";
// Приклад: "https://rocket-server-production.up.railway.app"
// ════════════════════════════════════════════════════

const tg     = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();
tg?.setHeaderColor?.('#07070f');
tg?.setBackgroundColor?.('#07070f');
const tgUser = tg?.initDataUnsafe?.user;
const userId   = tgUser?.id        || Math.floor(Math.random()*999999);
const userName = tgUser?.first_name || 'Player';
const userNick = tgUser?.username   || '';
const userPhoto= tgUser?.photo_url  || '';

// МОВА
const LANG={
  uk:{bet:'СТАВКА',auto:'АВТО-ВИВІД',autoLbl:'Авто',betBtn:'ПОСТАВИТИ',cashBtn:'ВИВЕСТИ',betOk:'✅ Ставка прийнята',waiting:'Очікування...',crash:'💥 CRASH',start:'Старт через',players:'ГРАВЦІ',tonBtn:'Поповнити через TON',you:'ти',watching:'не грає'},
  en:{bet:'BET',auto:'AUTO CASHOUT',autoLbl:'Auto',betBtn:'PLACE BET',cashBtn:'CASH OUT',betOk:'✅ Bet placed',waiting:'Waiting...',crash:'💥 CRASH',start:'Starting in',players:'PLAYERS',tonBtn:'Deposit TON',you:'you',watching:'watching'},
  ru:{bet:'СТАВКА',auto:'АВТО-ВЫВОД',autoLbl:'Авто',betBtn:'ПОСТАВИТЬ',cashBtn:'ВЫВЕСТИ',betOk:'✅ Ставка принята',waiting:'Ожидание...',crash:'💥 КРАШ',start:'Старт через',players:'ИГРОКИ',tonBtn:'Пополнить TON',you:'ты',watching:'наблюдает'},
};
let lang=localStorage.getItem('rkt_lang')||'uk';
function L(k){return LANG[lang]?.[k]||LANG.uk[k];}
function toggleLang(){const o=['uk','en','ru'];lang=o[(o.indexOf(lang)+1)%3];localStorage.setItem('rkt_lang',lang);applyLang();}
function applyLang(){
  document.getElementById('lang-btn').textContent='🌐 '+lang.toUpperCase();
  document.getElementById('l-bet').textContent=L('bet');
  document.getElementById('l-auto').textContent=L('auto');
  document.getElementById('l-auto-lbl').textContent=L('autoLbl');
  document.getElementById('l-players').textContent=L('players');
  document.getElementById('l-ton-btn').textContent=L('tonBtn');
}

// СТАН
let balance=parseFloat(localStorage.getItem('rkt_bal_'+userId)||'1.0');
let phase='waiting', mult=1.0, crashAt=1.0, startTs=0;
let hasBet=false, betAmt=0, lastBetAmt=0, myWin=null, myLost=false;
let autoOn=false, selTon=1;
let points=[], loopId=null, smokeT=null;
let ws=null, wsReady=false;
function saveBal(){localStorage.setItem('rkt_bal_'+userId,balance.toFixed(4));}
function updBal(){document.getElementById('bal').textContent=balance.toFixed(2);}

// CANVAS
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const ME=()=>document.getElementById('mult');
const RKT=()=>document.getElementById('rkt');
const BB=()=>document.getElementById('bb');
function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}

function drawGraph(crashed){
  resize();if(points.length<2)return;
  const W=canvas.width,H=canvas.height,maxM=Math.max(mult,1.5);
  const dur=points[points.length-1].t-points[0].t;if(dur<=0)return;
  const sx=(W-24)/dur,sy=(H-44)/(maxM-1);
  const px=p=>({x:12+(p.t-points[0].t)*sx,y:H-22-(p.m-1)*sy});
  const col=crashed?'#ff1744':'#6c4fff';
  ctx.clearRect(0,0,W,H);
  const p0=px(points[0]);
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,col+'55');g.addColorStop(1,col+'00');
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<points.length;i++){const p=px(points[i]);ctx.lineTo(p.x,p.y)}
  const last=px(points[points.length-1]);
  ctx.lineTo(last.x,H-22);ctx.lineTo(p0.x,H-22);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<points.length;i++){const p=px(points[i]);ctx.lineTo(p.x,p.y)}
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
  if(!crashed){
    ctx.beginPath();ctx.arc(last.x,last.y,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    const rk=RKT();rk.style.display='block';
    const prev=points.length>3?px(points[points.length-3]):p0;
    const ang=Math.atan2(last.y-prev.y,last.x-prev.x)*180/Math.PI;
    rk.style.left=(last.x-22)+'px';rk.style.bottom=(H-last.y-18)+'px';
    rk.style.transform=`rotate(${Math.max(-80,Math.min(0,ang-45))}deg)`;
  }
}

function startSmoke(){
  if(smokeT)return;
  smokeT=setInterval(()=>{
    if(phase!=='flying'){clearInterval(smokeT);smokeT=null;return;}
    const sky=document.getElementById('sky');
    const rk=RKT(),rr=rk.getBoundingClientRect(),sr=sky.getBoundingClientRect();
    const s=document.createElement('div');const sz=4+Math.random()*6;
    s.className='smk';s.style.cssText=`width:${sz}px;height:${sz}px;background:rgba(160,120,255,.1);left:${rr.left-sr.left+14+Math.random()*5-2}px;top:${rr.top-sr.top+65}px`;
    sky.appendChild(s);setTimeout(()=>s.remove(),700);
  },100);
}

// АНІМАЦІЯ — клієнт анімує на основі tick від сервера
function startClientAnim(){
  cancelAnimationFrame(loopId);loopId=null;
  points=[{t:0,m:1}];
  const t0=startTs*1000; // сервер надсилає Unix timestamp в секундах

  function tick(){
    if(phase!=='flying'){return;}
    const el=(Date.now()-t0)/1000;
    const m=Math.round(Math.exp(el*0.18)*100)/100;
    if(m>crashAt*1.05){return;} // чекаємо 'cr' від сервера
    mult=m;
    points.push({t:el,m});
    ME().textContent=m.toFixed(2)+'×';
    if(hasBet)BB().textContent=`💰 ${L('cashBtn')} ${(betAmt*m).toFixed(3)} TON`;
    drawGraph(false);
    loopId=requestAnimationFrame(tick);
  }
  loopId=requestAnimationFrame(tick);
}

// HISTORY
function addH(v){
  const cls=v>=10?'hmoon':v>=3?'hh':v>=1.5?'hm':'hl';
  const c=document.createElement('div');c.className=`hc ${cls}`;c.textContent=v.toFixed(2)+'×';
  const h=document.getElementById('hist');h.prepend(c);
  while(h.children.length>20)h.removeChild(h.lastChild);
}
[6.70,1.00,1.62,5.77,18.8,133.1,3.51,1.50].forEach(v=>addH(v));

// PLAYERS
function strColor(s){const C=['#ff6d00','#00e676','#ff1744','#40c4ff','#ffd700','#aa77ff','#44ccff','#ff4081'];let h=0;for(let i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))>>>0;return C[h%C.length];}

function renderPlayers(list){
  if(!list)return;
  const pl=document.getElementById('pl');
  document.getElementById('pcnt').textContent=list.length;
  if(!list.length){pl.innerHTML='<div style="color:#1a1a2a;font-size:12px;padding:6px 0">Немає ставок</div>';return;}
  pl.innerHTML=list.map(p=>{
    const isMe=p.uid===userId;
    const col=isMe?'#6c4fff':strColor(p.name);
    const ava=p.photo?`<img src="${p.photo}">`:`<span>${(p.name||'?').slice(0,2).toUpperCase()}</span>`;
    let right='';
    if(p.cashed&&p.win!=null)right=`<span class="pmx" style="background:${col}18;color:${col}">${(+p.mult||0).toFixed(2)}×</span><span class="pa" style="color:var(--green)">+${(+p.win).toFixed(3)}💎</span>`;
    else if(p.lost)right=`<span class="pa" style="color:var(--red)">-${(+p.bet).toFixed(2)}💎</span>`;
    else if(p.bet)right=`<span class="pa" style="color:#2a2a4a">💎${(+p.bet).toFixed(2)}</span>`;
    else if(isMe)right=`<span style="font-size:9px;color:#1a1a30">${L('watching')}</span>`;
    const badge=isMe?` <span style="font-size:7px;background:#6c4fff22;color:var(--accent);padding:1px 4px;border-radius:4px;vertical-align:middle">${L('you')}</span>`:'';
    const nick=p.nick?`<span class="pu">@${p.nick}</span>`:'';
    return `<div class="pr${isMe?' me':''}">
      <div class="pav" style="background:${col}18;color:${col}">${ava}</div>
      <div class="pi"><span class="pn${isMe?' m':''}">${p.name}${badge}</span>${nick}</div>
      <div style="display:flex;align-items:center;gap:2px;flex-shrink:0">${right}</div>
    </div>`;
  }).join('');
}

// WEBSOCKET
function connect(){
  const url=SERVER.replace(/^http/,'ws')+`/ws/${userId}`;
  ws=new WebSocket(url);

  ws.onopen=()=>{
    wsReady=true;
    document.getElementById('conn').textContent='⚡ онлайн';
    // Авторизація
    ws.send(JSON.stringify({a:'auth',name:userName,nick:userNick,photo:userPhoto}));
  };

  ws.onmessage=e=>{
    const d=JSON.parse(e.data);

    if(d.t==='init'){
      balance=d.bal||balance;updBal();saveBal();
      if(d.h)d.h.slice().reverse().forEach(v=>addH(v));
      renderPlayers(d.pl);
      if(d.phase==='flying'){
        phase='flying';startTs=d.ts;crashAt=d.ca;
        document.getElementById('rid').textContent=d.rid;
        ME().className='';ME().textContent=d.mult?.toFixed(2)+'×';
        RKT().style.display='block';RKT().style.left='12px';RKT().style.bottom='22px';
        startSmoke();startClientAnim();
      } else if(d.phase==='waiting'){
        phase='waiting';crashAt=d.ca;
        document.getElementById('rid').textContent=d.rid;
        ME().className='waiting';ME().textContent=L('waiting');
      }
    }

    else if(d.t==='cd'){
      if(phase==='flying'){cancelAnimationFrame(loopId);loopId=null;}
      phase='waiting';crashAt=d.ca;hasBet=false;myWin=null;myLost=false;
      document.getElementById('rid').textContent=d.rid;
      ME().className='waiting';ME().textContent=`${L('start')} ${d.sec}...`;
      RKT().style.display='none';
      resize();ctx.clearRect(0,0,canvas.width,canvas.height);
      BB().disabled=false;BB().className='';document.getElementById('l-bet-btn').textContent=L('betBtn');
    }

    else if(d.t==='st'){
      phase='flying';startTs=d.ts;crashAt=d.ca;
      document.getElementById('rid').textContent=d.rid;
      ME().className='';ME().textContent='1.00×';
      RKT().style.display='block';RKT().style.left='12px';RKT().style.bottom='22px';
      points=[{t:0,m:1}];
      startSmoke();startClientAnim();
      if(hasBet){BB().disabled=false;BB().className='co';BB().textContent=`💰 ${L('cashBtn')} ${betAmt.toFixed(2)} TON`;}
    }

    else if(d.t==='tick'){
      // Сервер надсилає tick — використовуємо для синхронізації якщо треба
      // Основна анімація вже йде в startClientAnim()
      renderPlayers(d.pl);
    }

    else if(d.t==='cr'){
      cancelAnimationFrame(loopId);loopId=null;
      phase='crashed';mult=d.ca;
      ME().textContent=d.ca.toFixed(2)+'×';ME().className='crashed';
      RKT().style.display='none';
      if(points.length>1)drawGraph(true);
      addH(d.ca);
      if(hasBet){showToast(`${L('crash')} ${d.ca.toFixed(2)}×`);myLost=true;hasBet=false;}
      BB().disabled=true;BB().className='';document.getElementById('l-bet-btn').textContent=L('betBtn');
      renderPlayers(d.pl);
    }

    else if(d.t==='newbet'||d.t==='co'){
      renderPlayers(d.pl);
    }

    else if(d.t==='bet_ok'){
      hasBet=true;betAmt=d.amt;balance=d.bal;updBal();saveBal();
      BB().disabled=true;document.getElementById('l-bet-btn').textContent=L('betOk');
    }

    else if(d.t==='your_co'){
      myWin=d.win;hasBet=false;balance=d.bal;updBal();saveBal();
      showWinPop(d.mx,d.win);spawnGems(d.win);
      BB().className='';document.getElementById('l-bet-btn').textContent=L('betBtn');
    }

    else if(d.t==='topup'){
      balance=d.bal;updBal();saveBal();
      showToast(`💎 +${d.credited} TON зараховано!`,'win');spawnGems(d.credited*5);
    }

    else if(d.t==='err'){
      showToast(d.msg);
    }
  };

  ws.onclose=()=>{
    wsReady=false;
    document.getElementById('conn').textContent='🔴 відключено...';
    setTimeout(connect,2000);
  };

  ws.onerror=()=>{ ws.close(); };
}

// BET
function handleBet(){
  if(phase==='flying'&&hasBet){
    if(wsReady)ws.send(JSON.stringify({a:'cashout'}));
    return;
  }
  if(phase!=='waiting')return;
  const amt=parseFloat(document.getElementById('bi').value)||0.1;
  if(amt<0.1){showToast('Мін. ставка 0.1 TON');return;}
  if(amt>balance){showToast('Недостатньо TON');return;}
  lastBetAmt=amt;betAmt=amt;
  const ac=autoOn?parseFloat(document.getElementById('av').value)||null:null;
  if(wsReady)ws.send(JSON.stringify({a:'bet',amt,ac}));
  else showToast('Немає підключення');
}

function sB(v){document.getElementById('bi').value=v;}
function hB(){const v=parseFloat(document.getElementById('bi').value)||0.1;document.getElementById('bi').value=Math.max(0.1,(v/2).toFixed(2));}
function x2B(){const v=parseFloat(document.getElementById('bi').value)||0.1;document.getElementById('bi').value=(v*2).toFixed(2);}
function toggleAuto(){autoOn=!autoOn;document.getElementById('atog').className=autoOn?'tog on':'tog';}

// TON CONNECT
let tonUI=null,tonConnected=false;
function initTon(){
  try{
    tonUI=new TON_CONNECT_UI.TonConnectUI({
      manifestUrl:'https://raw.githubusercontent.com/ton-connect/demo-dapp/master/public/tonconnect-manifest.json',
      buttonRootId:null,
    });
    tonUI.onStatusChange(w=>{
      tonConnected=!!w;
      const btn=document.getElementById('tc-btn');
      const lbl=document.getElementById('l-ton-btn');
      if(tonConnected){btn.style.background='#003a5a';lbl.textContent=L('tonBtn')+' ✓';}
      else{btn.style.background='';lbl.textContent=L('tonBtn');}
      if(w)showToast('Гаманець підключено ✓','win');
    });
  }catch(e){}
}

function handleTonBtn(){
  if(!tonConnected){if(tonUI)tonUI.openModal();else showToast('Підключи гаманець');}
  else openTopup();
}

const TON_WALLET="UQAfazCyjGjugOf73_LrxUuLvxSmExM_8loArhgATwKXU6yA";
function openTopup(){if(!tonConnected){showToast('Підключи гаманець','info');return;}document.getElementById('mbg').className='open';}
function closeTopup(){document.getElementById('mbg').className='';}
function pickT(el,n){selTon=n;document.querySelectorAll('.so').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');document.getElementById('cton').value=n;}

async function doTonPayment(){
  const amount=parseFloat(document.getElementById('cton').value)||selTon;
  if(!amount||amount<0.1)return;
  closeTopup();
  try{
    await tonUI.sendTransaction({
      validUntil:Math.floor(Date.now()/1000)+600,
      messages:[{address:TON_WALLET,amount:Math.floor(amount*1e9).toString()}]
    });
    // Після оплати бекенд має зарахувати через /topup endpoint
    // Бот отримує підтвердження і викликає: POST /topup/{uid}/{amount}
    showToast(`💎 Транзакція відправлена!`,'win');
  }catch(e){
    if(e?.message?.includes('User rejects')||e?.message?.includes('cancel'))showToast('Скасовано');
    else showToast('Помилка: '+(e?.message||''));
  }
}

// UI
function showWinPop(m,w){document.getElementById('wm').textContent=(+m).toFixed(2)+'×';document.getElementById('wa').textContent=`+${(+w).toFixed(3)} TON`;const p=document.getElementById('wp');p.className='show';setTimeout(()=>p.className='',2400);}
let tT=null;
function showToast(msg,type='crash'){const el=document.getElementById('toast');el.textContent=msg;el.className=[type==='win'?'win':type==='info'?'info':'','show'].join(' ');clearTimeout(tT);tT=setTimeout(()=>el.className=type==='win'?'win':type==='info'?'info':'',2800);}
function spawnGems(n){const cnt=Math.min(12,Math.max(2,Math.floor(n*3)));for(let i=0;i<cnt;i++){const s=document.createElement('div');s.className='sp';s.textContent='💎';s.style.left=15+Math.random()*70+'vw';s.style.top=30+Math.random()*30+'vh';s.style.animationDelay=Math.random()*0.3+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),1200);}}

// BOOT
window.addEventListener('resize',resize);
resize();updBal();applyLang();
setTimeout(()=>{ try{initTon();}catch(e){} },300);
connect();
</script>
