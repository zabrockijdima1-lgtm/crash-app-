<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#07070f;--bg2:#0e0e1c;--bg3:#151528;--accent:#6c4fff;--accent2:#4a2fcc;--green:#00e676;--red:#ff1744;--orange:#ff6d00;--gold:#ffd600;--ton:#0098ea}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Inter',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-height:100vh}
#sky{position:relative;flex:0 0 225px;overflow:hidden;background:#04040c}
#sky::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 7% 14%,#fff8,transparent),radial-gradient(1px 1px at 21% 67%,#fff5,transparent),radial-gradient(1px 1px at 37% 11%,#fff7,transparent),radial-gradient(1px 1px at 54% 79%,#fff4,transparent),radial-gradient(1px 1px at 69% 27%,#fff6,transparent),radial-gradient(1px 1px at 84% 53%,#fff5,transparent),radial-gradient(1.5px 1.5px at 75% 71%,#fffc,transparent),radial-gradient(1px 1px at 92% 7%,#fff9,transparent),radial-gradient(1px 1px at 14% 89%,#fff6,transparent),radial-gradient(1px 1px at 47% 43%,#fff4,transparent)}
#gc{position:absolute;inset:0;width:100%;height:100%}
#mult{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:44px;font-weight:900;color:#fff;letter-spacing:3px;pointer-events:none;z-index:5;text-align:center;text-shadow:0 0 40px #6c4fff44}

#mult.waiting{font-size:18px;color:#444;text-shadow:none;letter-spacing:1px}
#mult small{display:block;font-size:11px;font-weight:400;color:#333;font-family:'Inter',sans-serif;margin-top:3px;letter-spacing:0}
@keyframes shake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(-52%,-50%)}75%{transform:translate(-48%,-50%)}}
#rkt{position:absolute;pointer-events:none;z-index:6;display:none}
.rb{position:relative;width:44px;height:70px;animation:rwob .35s ease-in-out infinite alternate}
@keyframes rwob{0%{transform:rotate(-2.5deg)}100%{transform:rotate(2.5deg) scale(1.04)}}
.rsv{width:44px;height:70px;display:block}
.fw{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.fl{border-radius:50% 50% 30% 30%;animation:flk .07s ease-in-out infinite alternate;transform-origin:center top}
.f1{width:18px;height:30px;background:linear-gradient(180deg,#fff 0%,#ffe066 25%,#ff6d00 70%,transparent)}
.f2{width:11px;height:22px;background:linear-gradient(180deg,#ffe066,#ff6d00 50%,transparent);margin-top:-20px;animation-delay:.03s}
.f3{width:7px;height:15px;background:linear-gradient(180deg,#ff6d00,transparent);margin-top:-13px;animation-delay:.015s}
@keyframes flk{0%{transform:scaleX(1) scaleY(1)}100%{transform:scaleX(.75) scaleY(1.2)}}
.smk{position:absolute;border-radius:50%;animation:smkr .7s ease-out forwards;pointer-events:none}
@keyframes smkr{0%{opacity:.2;transform:scale(.4)}100%{opacity:0;transform:scale(2.5) translateY(20px)}}
#topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
#balpill{background:#00000088;border:0.5px solid #ffd60030;border-radius:20px;padding:5px 12px;font-family:'Orbitron',monospace;font-size:11px;color:var(--gold);backdrop-filter:blur(8px)}

#lang-btn{background:#00000066;border:0.5px solid #ffffff15;border-radius:10px;color:#666;font-size:11px;padding:4px 10px;cursor:pointer}
#hist{display:flex;gap:5px;padding:6px 10px;overflow-x:auto;background:#060610;border-bottom:0.5px solid #ffffff06;scrollbar-width:none;flex-shrink:0}

.hc{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.hl{background:#111122;color:#333355;border:0.5px solid #ffffff07}
.hm{background:#0a1a10;color:var(--green);border:0.5px solid #00e67615}
.hh{background:#1a0e06;color:var(--orange);border:0.5px solid #ff6d0015}
.hmoon{background:#120c30;color:#aa77ff;border:0.5px solid #aa77ff25}

.cl{font-size:9px;color:#303050;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.inp{width:100%;background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;padding:7px 10px;outline:none}

.qbtns{display:flex;gap:3px;margin-top:6px}
.qb{background:#111125;border:0.5px solid #ffffff08;border-radius:6px;color:#444;font-size:10px;padding:3px 0;cursor:pointer;flex:1;text-align:center}
.qb:active{background:#1a1a35;color:#ccc}
.ar{display:flex;align-items:center;gap:6px}
.tl{font-size:12px;color:#333;flex:1}
.tog{width:36px;height:20px;background:#111125;border-radius:10px;border:0.5px solid #ffffff0c;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}

#bb{grid-column:1/-1;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;padding:14px;cursor:pointer;letter-spacing:1px;transition:opacity .15s,transform .1s}

#ton-wrap{padding:0 12px 6px;flex-shrink:0}
#tc-btn{width:100%;background:var(--ton);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;padding:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:1px}
#tc-btn:active{opacity:.85}
#pw{flex:1;overflow:hidden;padding:0 12px;min-height:0;display:flex;flex-direction:column}
.st{font-size:9px;color:#1e1e30;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.pc{background:var(--bg3);border-radius:8px;padding:1px 6px;font-size:9px;color:#333}
#pl{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;scrollbar-width:none;padding-bottom:6px}
#pl::-webkit-scrollbar{display:none}
.pr{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid #ffffff05;border-radius:8px;padding:7px 10px;flex-shrink:0}
.pr.me{border-color:#6c4fff44}
.pav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.pav img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.pi{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}
.pn{font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pn.m{color:#fff;font-weight:600}
.pu{font-size:9px;color:#1e1e30;margin-top:1px}
.pa{font-family:'Orbitron',monospace;font-size:11px;font-weight:700}
.pmx{font-size:9px;padding:2px 5px;border-radius:5px;font-family:'Orbitron',monospace;margin-right:2px}

#mod{background:var(--bg2);border-radius:20px 20px 0 0;border:0.5px solid #ffffff10;padding:20px;width:100%;max-width:480px}
#mod h3{font-family:'Orbitron',monospace;font-size:15px;margin-bottom:3px}
#mod p{font-size:12px;color:#333;margin-bottom:14px}
.sos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.so{background:var(--bg3);border:0.5px solid #ffffff0c;border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;transition:border-color .15s}
.so.sel,.so:active{border-color:var(--ton)}
.so .sa{font-size:16px}
.so .sl{font-family:'Orbitron',monospace;font-size:10px;margin-top:4px;color:#aaa}
#cton{width:100%;background:var(--bg);border:0.5px solid #ffffff10;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:14px;padding:9px 12px;outline:none;margin-bottom:10px}
#pbtn{width:100%;background:var(--ton);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:13px;cursor:pointer}
#pbtn:active{opacity:.85}
#mcl{width:100%;background:transparent;border:none;color:#333;font-size:12px;padding:10px;cursor:pointer;margin-top:2px}
#wp{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#0d2010,#081508);border:1px solid var(--green);border-radius:18px;padding:28px 36px;text-align:center;z-index:250;box-shadow:0 0 40px #00e67620}
#wp.show{display:block;animation:popin .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popin{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.wm{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:var(--green);text-shadow:0 0 20px #00e67655}
.wa{font-family:'Orbitron',monospace;font-size:22px;color:#fff;margin-top:6px}
.wl{font-size:11px;color:#333;margin-top:8px}
#toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-family:'Orbitron',monospace;font-size:11px;padding:8px 18px;border-radius:12px;z-index:300;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;max-width:90vw;text-align:center}
#toast.win{background:var(--green);color:#000}
#toast.info{background:var(--ton)}
#toast.show{opacity:1}
.sp{position:fixed;pointer-events:none;z-index:200;font-size:16px;animation:spf 1s ease-out forwards}
@keyframes spf{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.2)}}
</style>
</head>
<body>
<div id="app">

      <div class="rb">

<script>

// ╔══════════════════════════════════════════════════╗

// ║  НАЛАШТУВАННЯ — змінити 2 рядки нижче           ║

// ╚══════════════════════════════════════════════════╝

const ABLY_KEY   = "1BF6Pw.W3mLxQ:WtwUu_bRf2yh0Ow8j7tH0a3kmQWE7p6CJzU9AZTJ0R0";

// ably.com → Apps → API Keys → Root Key

// Приклад: "xVLRjA.AbCdEf:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

const TON_WALLET = "UQAfazCyjGjugOf73_LrxUuLvxSmExM_8loArhgATwKXU6yA";

// Твій TON адрес для отримання платежів

// Приклад: ""

// ════════════════════════════════════════════════════


const MIN_BET = 0.1;
const SPEED   = 0.18;

const tg      = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();
tg?.setHeaderColor?.('#07070f');
tg?.setBackgroundColor?.('#07070f');
const tgUser  = tg?.initDataUnsafe?.user;
const userId    = tgUser?.id        || Math.floor(Math.random()*999999);
const userName  = tgUser?.first_name || 'Player';

const userPhoto = tgUser?.photo_url  || '';

// МОВА
const LANG={
  uk:{bet:'СТАВКА',auto:'АВТО-ВИВІД',autoLbl:'Авто',betBtn:'ПОСТАВИТИ',cashBtn:'ВИВЕСТИ',betAccepted:'✅ Ставка прийнята',waiting:'Очікування...',crash:'💥 CRASH',start:'Старт через',players:'ГРАВЦІ',tonBtn:'Поповнити через TON',modalTitle:'💎 Поповнення TON',modalSub:'Мінімум 0.1 TON',payBtn:'Відправити TON',cancel:'Скасувати',winLbl:'Виведено!',notEnough:'Недостатньо TON',minBet:'Мін. ставка 0.1 TON',connectWallet:'Підключи TON гаманець',walletConnected:'Гаманець підключено ✓',noWallet:'Спочатку підключи гаманець',you:'ти',watching:'не грає'},
  en:{bet:'BET',auto:'AUTO CASHOUT',autoLbl:'Auto',betBtn:'PLACE BET',cashBtn:'CASH OUT',betAccepted:'✅ Bet placed',waiting:'Waiting...',crash:'💥 CRASH',start:'Starting in',players:'PLAYERS',tonBtn:'Deposit TON',modalTitle:'💎 TON Deposit',modalSub:'Minimum 0.1 TON',payBtn:'Send TON',cancel:'Cancel',winLbl:'Cashed out!',notEnough:'Not enough TON',minBet:'Min bet 0.1 TON',connectWallet:'Connect TON wallet',walletConnected:'Wallet connected ✓',noWallet:'Connect wallet first',you:'you',watching:'watching'},
  ru:{bet:'СТАВКА',auto:'АВТО-ВЫВОД',autoLbl:'Авто',betBtn:'ПОСТАВИТЬ',cashBtn:'ВЫВЕСТИ',betAccepted:'✅ Ставка принята',waiting:'Ожидание...',crash:'💥 КРАШ',start:'Старт через',players:'ИГРОКИ',tonBtn:'Пополнить TON',modalTitle:'💎 Пополнение TON',modalSub:'Минимум 0.1 TON',payBtn:'Отправить TON',cancel:'Отмена',winLbl:'Выведено!',notEnough:'Недостаточно TON',minBet:'Мин. ставка 0.1 TON',connectWallet:'Подключи TON кошелёк',walletConnected:'Кошелёк подключён ✓',noWallet:'Сначала подключи кошелёк',you:'ты',watching:'наблюдает'},
};
let lang=localStorage.getItem('rkt_lang')||'uk';
function L(k){return LANG[lang]?.[k]||LANG.uk[k];}
function toggleLang(){const o=['uk','en','ru'];lang=o[(o.indexOf(lang)+1)%3];localStorage.setItem('rkt_lang',lang);applyLang();}
function applyLang(){
  document.getElementById('lang-btn').textContent='🌐 '+lang.toUpperCase();
  document.getElementById('l-bet').textContent=L('bet');
  document.getElementById('l-auto').textContent=L('auto');

  document.getElementById('l-ton-btn').textContent=L('tonBtn');

  document.getElementById('l-modal-sub').textContent=L('modalSub');
  document.getElementById('l-pay-btn').textContent=L('payBtn');
  document.getElementById('l-cancel').textContent=L('cancel');
  document.getElementById('wl').textContent=L('winLbl');

// СТАН
let balance=parseFloat(localStorage.getItem('rkt_ton_'+userId)||'1.0');
let phase='waiting',mult=1.0,crashAt=1.0;
let hasBet=false,betAmt=0,lastBetAmt=0,myWin=null,myLost=false;

let points=[],loopId=null,cdTimer=null,smokeT=null;

function saveBal(){localStorage.setItem('rkt_ton_'+userId,balance.toFixed(4));}

// CANVAS
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const ME=()=>document.getElementById('mult');
const RKT=()=>document.getElementById('rkt');
const BB=()=>document.getElementById('bb');
function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}

function drawGraph(crashed){
  resize();
  if(points.length<2)return;
  const W=canvas.width,H=canvas.height;
  const maxM=Math.max(mult,1.5);
  const dur=points[points.length-1].t-points[0].t;
  if(dur<=0)return;
  const sx=(W-24)/dur,sy=(H-44)/(maxM-1);
  const px=p=>({x:12+(p.t-points[0].t)*sx,y:H-22-(p.m-1)*sy});
  const col=crashed?'#ff1744':'#6c4fff';
  ctx.clearRect(0,0,W,H);
  const p0=px(points[0]);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,col+'55');g.addColorStop(1,col+'00');
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<points.length;i++){const p=px(points[i]);ctx.lineTo(p.x,p.y)}
  const last=px(points[points.length-1]);
  ctx.lineTo(last.x,H-22);ctx.lineTo(p0.x,H-22);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<points.length;i++){const p=px(points[i]);ctx.lineTo(p.x,p.y)}
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
  if(!crashed){
    ctx.beginPath();ctx.arc(last.x,last.y,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    const rk=RKT();rk.style.display='block';
    const prev=points.length>3?px(points[points.length-3]):p0;
    const ang=Math.atan2(last.y-prev.y,last.x-prev.x)*180/Math.PI;
    rk.style.left=(last.x-22)+'px';rk.style.bottom=(H-last.y-18)+'px';
    rk.style.transform=`rotate(${Math.max(-80,Math.min(0,ang-45))}deg)`;
  }
}

function startSmoke(){
  if(smokeT)return;
  smokeT=setInterval(()=>{
    if(phase!=='flying'){clearInterval(smokeT);smokeT=null;return;}
    const sky=document.getElementById('sky');
    const rk=RKT(),rr=rk.getBoundingClientRect(),sr=sky.getBoundingClientRect();
    const s=document.createElement('div');const sz=4+Math.random()*6;
    s.className='smk';s.style.cssText=`width:${sz}px;height:${sz}px;background:rgba(160,120,255,.1);left:${rr.left-sr.left+14+Math.random()*5-2}px;top:${rr.top-sr.top+65}px`;
    sky.appendChild(s);setTimeout(()=>s.remove(),700);
  },100);
}

function genCrash(seed){
  let x=Math.sin((seed||Date.now())+1)*10000;
  const r=x-Math.floor(x);
  if(r<0.05)return 1.00;
  return Math.round(Math.min(0.95/(1-r),500)*100)/100;
}

// ABLY SYNC
let ably,channel;
// Час-корекція
let timeOffset = 0;
let masterHeartbeat = null; // таймер heartbeat майстра

function initAbly(){
  if(ABLY_KEY==='ВСТАВИТИ_ABLY_KEY'||!ABLY_KEY){
    showToast('⚠ Ably Key не вставлено — локальний режим','info');
    return;
  }
  try{
    ably=new Ably.Realtime({key:ABLY_KEY,clientId:String(userId)});
    channel=ably.channels.get('rocket-v1');

    channel.subscribe('g',(msg)=>{
      const d=msg.data;
      if(+d.from===userId)return; // ігноруємо власні
      if(d.now) timeOffset=d.now-Date.now();

      // Якщо отримали будь-яке повідомлення від майстра — ми не майстер
      if(d.t==='cd'||d.t==='st'||d.t==='cr'){
        if(isMaster){
          // Інший майстер — відступаємо, стаємо клієнтом
          isMaster=false;
          clearInterval(masterHeartbeat); masterHeartbeat=null;
        }
      }

      if(d.t==='cd')      rcvCountdown(d);
      else if(d.t==='st') rcvStart(d);
      else if(d.t==='cr') rcvCrash(d);
      else if(d.t==='bet'){addRP(d);renderPlayers();}
      else if(d.t==='co'){
        if(roundPlayers[d.uid]){
          roundPlayers[d.uid].win=d.win;
          roundPlayers[d.uid].mult=d.mx;
          roundPlayers[d.uid].cashed=true;
        }
        renderPlayers();
      }
      else if(d.t==='sync' && isMaster){
        // Клієнт просить стан — майстер відповідає
        if(phase==='flying'){
          publish({t:'st',ts:syncStartTime,ca:crashAt,rid:roundId,from:userId});
        } else if(phase==='waiting'){
          publish({t:'cd',sec:3,ca:crashAt,rid:roundId,from:userId});
        }
      }
    });

    ably.connection.on('connected',()=>{
      // Дивимось останнє повідомлення в каналі
      channel.history({limit:1},(err,page)=>{
        const last = page?.items?.[0]?.data;
        const age  = last ? Date.now()-(last.now||0) : 99999;
        const gameActive = !err && last && age < 20000; // повідомлення молодше 20с

        if(gameActive){
          // Хтось вже керує грою — ми клієнт
          isMaster=false;
          cancelAnimationFrame(loopId); loopId=null;
          clearInterval(cdTimer); cdTimer=null;
          // Запитуємо поточний стан у майстра
          setTimeout(()=>publish({t:'sync',from:userId,now:Date.now()}),500);
          // Якщо за 5с не отримали відповідь — стаємо майстром самі
          setTimeout(()=>{
            if(!isMaster && phase==='waiting' && !loopId){
              isMaster=true;
              startCountdown();
            }
          },5000);
        } else {
          // Немає активної гри — стаємо майстром
          isMaster=true;
          cancelAnimationFrame(loopId); loopId=null;
          clearInterval(cdTimer); cdTimer=null;
          startCountdown();
        }
      });
    });

  }catch(e){
    console.error('Ably error:',e);
    // Fallback — локальна гра
  }
}

function publish(d){
  if(channel)try{channel.publish('g',{...d,now:Date.now()});}catch(e){}
}

function rcvCountdown(d){
  cancelAnimationFrame(loopId); loopId=null;
  clearInterval(cdTimer); cdTimer=null;
  phase='waiting';hasBet=false;mult=1.0;myWin=null;myLost=false;
  points=[];crashAt=d.ca;roundId=d.rid;roundPlayers={};
  document.getElementById('rid').textContent=roundId;
  ME().className='waiting';ME().textContent=`${L('start')} ${d.sec}...`;
  RKT().style.display='none';
  resize();ctx.clearRect(0,0,canvas.width,canvas.height);
  BB().disabled=false;BB().className='';
  document.getElementById('l-bet-btn').textContent=L('betBtn');
  renderPlayers();
}

function rcvStart(d){
  cancelAnimationFrame(loopId); loopId=null;
  clearInterval(cdTimer); cdTimer=null;
  phase='flying';
  const msgLatency=d.now?Math.max(0,Math.min(Date.now()-d.now,2000)):0;
  syncStartTime=d.ts-msgLatency;
  if(d.ca)crashAt=d.ca;
  if(d.rid)roundId=d.rid;
  points=[{t:0,m:1}];
  ME().className='';ME().textContent='1.00×';
  RKT().style.display='block';RKT().style.left='12px';RKT().style.bottom='22px';
  startSmoke();
  if(hasBet){BB().disabled=false;BB().className='co';BB().textContent=`💰 ${L('cashBtn')} ${betAmt.toFixed(2)} TON`;scheduleAuto();}
  flyTick();
}

function rcvCrash(d){
  cancelAnimationFrame(loopId); loopId=null;
  phase='crashed';mult=d.ca;crashAt=d.ca;
  ME().textContent=d.ca.toFixed(2)+'×';ME().className='crashed';
  RKT().style.display='none';
  if(points.length>1)drawGraph(true);
  addH(d.ca);
  if(hasBet){showToast(`${L('crash')} ${d.ca.toFixed(2)}×`);myLost=true;hasBet=false;}
  BB().disabled=true;BB().className='';document.getElementById('l-bet-btn').textContent=L('betBtn');
  Object.values(roundPlayers).forEach(p=>{if(!p.cashed)p.lost=true;});
  renderPlayers();
  // Клієнти чекають наступний 'cd' від майстра — нічого не запускають самі
}

// GAME LOOP (MASTER)
function startCountdown(){
  cancelAnimationFrame(loopId); loopId=null;
  clearInterval(cdTimer);
  phase='waiting';hasBet=false;mult=1.0;myWin=null;myLost=false;roundPlayers={};
  const seed=Date.now();crashAt=genCrash(seed);roundId++;
  document.getElementById('rid').textContent=roundId;
  ME().className='waiting';RKT().style.display='none';
  resize();ctx.clearRect(0,0,canvas.width,canvas.height);
  BB().disabled=false;BB().className='';document.getElementById('l-bet-btn').textContent=L('betBtn');
  renderPlayers();
  let cd=5;
  ME().textContent=`${L('start')} ${cd}...`;
  publish({t:'cd',sec:cd,ca:crashAt,rid:roundId,from:userId,now:Date.now()});
  cdTimer=setInterval(()=>{
    cd--;
    if(cd<=0){clearInterval(cdTimer);doStartFlight();}
    else{ME().textContent=`${L('start')} ${cd}...`;publish({t:'cd',sec:cd,ca:crashAt,rid:roundId,from:userId,now:Date.now()});}
  },1000);
}

function doStartFlight(){
  cancelAnimationFrame(loopId); loopId=null;
  const ts=Date.now();
  syncStartTime=ts;
  phase='flying';points=[{t:0,m:1}];
  publish({t:'st',ts,ca:crashAt,rid:roundId,from:userId,now:Date.now()});
  ME().className='';ME().textContent='1.00×';
  RKT().style.display='block';RKT().style.left='12px';RKT().style.bottom='22px';
  startSmoke();
  if(hasBet){BB().disabled=false;BB().className='co';BB().textContent=`💰 ${L('cashBtn')} ${betAmt.toFixed(2)} TON`;scheduleAuto();}
  flyTick();
}

function flyTick(){
  if(phase!=='flying'){return;}
  const el=(Date.now()-syncStartTime)/1000;
  mult=Math.round(Math.exp(el*SPEED)*100)/100;
  if(mult>=crashAt){
    mult=crashAt;points.push({t:el,m:mult});
    // Майстер спочатку публікує crash, потім сам обробляє
    if(isMaster) publish({t:'cr',ca:crashAt,rid:roundId,from:userId,now:Date.now()});
    doCrash();
    return;
  }
  points.push({t:el,m:mult});
  ME().textContent=mult.toFixed(2)+'×';
  if(hasBet)BB().textContent=`💰 ${L('cashBtn')} ${(betAmt*mult).toFixed(3)} TON`;
  drawGraph(false);
  loopId=requestAnimationFrame(flyTick);
}

function scheduleAuto(){
  if(!autoOn)return;
  const av=parseFloat(document.getElementById('av').value)||2;
  if(av>1&&av<=crashAt){const delay=(Math.log(av)/SPEED)*1000;setTimeout(()=>{if(phase==='flying'&&hasBet)doCashout();},delay);}
}

function doCrash(){
  cancelAnimationFrame(loopId); loopId=null;
  phase='crashed';
  ME().textContent=crashAt.toFixed(2)+'×';ME().className='crashed';
  RKT().style.display='none';
  if(points.length>1)drawGraph(true);
  addH(crashAt);
  if(hasBet){showToast(`${L('crash')} ${crashAt.toFixed(2)}×`);myLost=true;hasBet=false;}
  BB().disabled=true;BB().className='';document.getElementById('l-bet-btn').textContent=L('betBtn');
  Object.values(roundPlayers).forEach(p=>{if(!p.cashed)p.lost=true;});
  renderPlayers();
  // Майстер завжди перезапускає через 3с
  if(isMaster) setTimeout(()=>startCountdown(), 3000);
}

function doCashout(){
  if(phase!=='flying'||!hasBet)return;
  const win=+(betAmt*mult).toFixed(4);
  balance=+(balance+win).toFixed(4);updateBalUI();saveBal();
  myWin=win;hasBet=false;
  const mx=+(win/lastBetAmt).toFixed(2);
  publish({t:'co',uid:userId,name:userName,nick:userNick,win,mx,rid:roundId,from:userId});
  if(roundPlayers[userId]){roundPlayers[userId].win=win;roundPlayers[userId].mult=mx;roundPlayers[userId].cashed=true;}
  showWinPop(mult,win);spawnGems(win);
  BB().className='';document.getElementById('l-bet-btn').textContent=L('betBtn');
  renderPlayers();
}

// BET
function handleBet(){
  if(phase==='flying'&&hasBet){doCashout();return;}
  if(phase!=='waiting')return;
  betAmt=parseFloat(document.getElementById('bi').value)||MIN_BET;
  if(betAmt<MIN_BET){showToast(L('minBet'));return;}
  if(betAmt>balance){showToast(L('notEnough'));return;}
  balance=+(balance-betAmt).toFixed(4);updateBalUI();saveBal();
  hasBet=true;lastBetAmt=betAmt;
  BB().disabled=true;document.getElementById('l-bet-btn').textContent=L('betAccepted');
  const pd={t:'bet',uid:userId,name:userName,nick:userNick,photo:userPhoto,bet:betAmt,rid:roundId,from:userId};
  publish(pd);addRP(pd);renderPlayers();
}

function addRP(d){roundPlayers[d.uid]={name:d.name,nick:d.nick,photo:d.photo,bet:d.bet,win:null,lost:false,cashed:false,mult:null};}
function sB(v){document.getElementById('bi').value=v;}
function hB(){const v=parseFloat(document.getElementById('bi').value)||MIN_BET;document.getElementById('bi').value=Math.max(MIN_BET,(v/2).toFixed(2));}
function x2B(){const v=parseFloat(document.getElementById('bi').value)||MIN_BET;document.getElementById('bi').value=(v*2).toFixed(2);}
function toggleAuto(){autoOn=!autoOn;document.getElementById('atog').className=autoOn?'tog on':'tog';}

// TON CONNECT
function initTonConnect(){
  try{
    tonUI=new TON_CONNECT_UI.TonConnectUI({
      manifestUrl:'https://raw.githubusercontent.com/ton-connect/demo-dapp/master/public/tonconnect-manifest.json',
      buttonRootId:null,
    });
    tonUI.onStatusChange(w=>{
      tonConnected=!!w;
      document.getElementById('tc-btn').style.background=tonConnected?'#003a5a':null;
      document.getElementById('l-ton-btn').textContent=tonConnected?L('walletConnected'):L('tonBtn');
      if(w)showToast(L('walletConnected'),'win');
    });
  }catch(e){console.warn('TON Connect:',e);}
}

function handleTonBtn(){
  if(!tonConnected){if(tonUI)tonUI.openModal();else showToast(L('connectWallet'));}
  else openTopup();
}

function openTopup(){if(!tonConnected){showToast(L('noWallet'),'info');return;}document.getElementById('mbg').className='open';}
function closeTopup(){document.getElementById('mbg').className='';}
function pickT(el,n){selTon=n;document.querySelectorAll('.so').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');document.getElementById('cton').value=n;}

async function doTonPayment(){
  const amount=parseFloat(document.getElementById('cton').value)||selTon;
  if(!amount||amount<0.1){showToast('Min 0.1 TON');return;}
  if(!tonConnected){showToast(L('noWallet'));return;}
  closeTopup();
  try{
    const nanos=Math.floor(amount*1e9).toString();
    await tonUI.sendTransaction({
      validUntil:Math.floor(Date.now()/1000)+600,
      messages:[{address:TON_WALLET,amount:nanos}]
    });
    balance=+(balance+amount).toFixed(4);updateBalUI();saveBal();
    showToast(`💎 +${amount} TON ${lang==='ru'?'зачислено':lang==='en'?'credited':'зараховано'}!`,'win');
    spawnGems(amount*5);
  }catch(e){
    if(e?.message?.includes('User rejects')||e?.message?.includes('cancel'))showToast(L('cancel'));
    else{console.error(e);showToast('Error: '+(e?.message||'unknown'));}
  }
}

// PLAYERS
function strColor(s){const C=['#ff6d00','#00e676','#ff1744','#40c4ff','#ffd600','#aa77ff','#00e5ff','#ff4081'];let h=0;for(let i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))>>>0;return C[h%C.length];}

function renderPlayers(){
  roundPlayers[userId]={name:userName,nick:userNick,photo:userPhoto,bet:hasBet?betAmt:(myLost||myWin!=null?lastBetAmt:null),win:myWin,lost:myLost,cashed:myWin!=null,mult:myWin&&lastBetAmt>0?+(myWin/lastBetAmt).toFixed(2):null,isMe:true};
  const entries=Object.entries(roundPlayers).sort(([a],[b])=>{if(+a===userId)return -1;if(+b===userId)return 1;const pa=roundPlayers[a],pb=roundPlayers[b];if(pa.cashed&&!pb.cashed)return -1;if(pb.cashed&&!pa.cashed)return 1;return (pb.bet||0)-(pa.bet||0);});
  document.getElementById('pcnt').textContent=entries.length;
  const pl=document.getElementById('pl');
  pl.innerHTML=entries.map(([uid,p])=>{
    const isMe=+uid===userId;
    const col=isMe?'#6c4fff':strColor(p.name);
    const ava=p.photo?`<img src="${p.photo}">`:`<span>${(p.name||'?').slice(0,2).toUpperCase()}</span>`;
    let right='';
    if(p.cashed&&p.win!=null)right=`<span class="pmx" style="background:${col}18;color:${col}">${p.mult||'?'}×</span><span class="pa" style="color:var(--green)">+${(+p.win).toFixed(3)}💎</span>`;
    else if(p.lost)right=`<span class="pa" style="color:var(--red)">-${(+(p.bet||0)).toFixed(2)}💎</span>`;
    else if(p.bet)right=`<span class="pa" style="color:#2a2a4a">💎${(+p.bet).toFixed(2)}</span>`;
    else if(isMe)right=`<span style="font-size:9px;color:#1a1a30">${L('watching')}</span>`;
    const badge=isMe?` <span style="font-size:7px;background:#6c4fff22;color:var(--accent);padding:1px 4px;border-radius:4px;vertical-align:middle">${L('you')}</span>`:'';
    const nick=p.nick?`<span class="pu">@${p.nick}</span>`:'';
    return `<div class="pr${isMe?' me':''}"><div class="pav" style="background:${col}18;color:${col}">${ava}</div><div class="pi"><span class="pn${isMe?' m':''}">${p.name}${badge}</span>${nick}</div><div style="display:flex;align-items:center;gap:2px;flex-shrink:0">${right}</div></div>`;
  }).join('');
}

// HISTORY
function addH(v){const cls=v>=10?'hmoon':v>=3?'hh':v>=1.5?'hm':'hl';const c=document.createElement('div');c.className=`hc ${cls}`;c.textContent=v.toFixed(2)+'×';const h=document.getElementById('hist');h.prepend(c);while(h.children.length>20)h.removeChild(h.lastChild);}
[6.70,1.00,1.62,5.77,18.8,133.1,3.51,1.50,2.35].forEach(v=>addH(v));

// UI
function showWinPop(m,w){document.getElementById('wm').textContent=m.toFixed(2)+'×';document.getElementById('wa').textContent=`+${w.toFixed(3)} TON`;document.getElementById('wl').textContent=L('winLbl');const p=document.getElementById('wp');p.className='show';setTimeout(()=>p.className='',2400);}
let tT=null;
function showToast(msg,type='crash'){const el=document.getElementById('toast');el.textContent=msg;el.className=[type==='win'?'win':type==='info'?'info':'','show'].join(' ');clearTimeout(tT);tT=setTimeout(()=>el.className=type==='win'?'win':type==='info'?'info':'',2800);}
function spawnGems(n){const cnt=Math.min(12,Math.max(2,Math.floor(n*3)));for(let i=0;i<cnt;i++){const s=document.createElement('div');s.className='sp';s.textContent='💎';s.style.left=15+Math.random()*70+'vw';s.style.top=30+Math.random()*30+'vh';s.style.animationDelay=Math.random()*0.3+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),1200);}}

// BOOT
window.addEventListener('resize',resize);
resize();updateBalUI();applyLang();

// Показуємо "Підключення..."
ME().className='waiting';
ME().textContent='Підключення...';

// Спочатку TON Connect
setTimeout(()=>{
  try{ initTonConnect(); }catch(e){ console.warn('TON:',e); }
},300);

// Потім Ably — він вирішить хто майстер і запустить гру
setTimeout(()=>{
  try{
    initAbly();
    // Якщо Ably key не вставлено — запускаємо локально
    if(ABLY_KEY==='ВСТАВИТИ_ABLY_KEY'||!ABLY_KEY){
      isMaster=true;
      startCountdown();
    }
  }catch(e){
    console.warn('Ably failed:',e);
    isMaster=true;
    startCountdown();
  }
},600);
</script>
