<script>
    // Initialize Telegram
    const tg = window.Telegram?.WebApp || {
        initDataUnsafe: { user: { id: 770160, first_name: 'Guest' } },
        ready: () => {},
        expand: () => {},
        close: () => {},
        HapticFeedback: {
            impactOccurred: () => {},
            notificationOccurred: () => {},
            selectionChanged: () => {}
        },
        openInvoice: (url, callback) => {
            console.log('Opening invoice:', url);
            setTimeout(() => callback('paid'), 2000);
        }
    };

    tg.expand();
    tg.ready();

    // User data
    const user = tg.initDataUnsafe?.user || { id: 770160, first_name: 'Гравець' };
    const userId = user.id;
    const userName = user.first_name || 'Гравець';
    const BOT_USERNAME = "ew1rsa1we2121bot";

    // Game state
    const gameState = {
        balance: 100,
        currentMultiplier: 1.00,
        isRunning: false,
        isCrashed: false,
        betAmount: 0,
        hasBet: false,
        autoCashout: false,
        autoCashoutMultiplier: 2,
        countdown: 5,
        players: [],
        history: [6.98, 2.38, 1.20, 3.03, 4.54],
        stats: {
            totalGames: 0,
            totalWon: 0,
            maxWin: 0,
            casesOpened: 0
        },
        referrals: {
            count: 0,
            earned: 0
        }
    };

    // Socket.io підключення
    const SERVER_URL = "http://localhost:8001"; // Змініть на ваш сервер
    const socket = io(SERVER_URL, {
        transports: ['websocket', 'polling']
    });

    // Елементи
    const balanceEl = document.getElementById('balanceAmount');
    const multiplierEl = document.getElementById('multiplierValue');
    const gameStatus = document.getElementById('gameStatus');
    const timerContainer = document.getElementById('timerContainer');
    const timerDisplay = document.getElementById('timerDisplay');
    const potentialWin = document.getElementById('potentialWin');
    const rocketContainer = document.getElementById('rocketContainer');
    const placeBetBtn = document.getElementById('placeBetBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const cancelBetBtn = document.getElementById('cancelBetBtn');
    const betInput = document.getElementById('betAmountInput');
    const playersList = document.getElementById('playersList');
    const playersCount = document.getElementById('playersCount');
    const historyBar = document.getElementById('historyBar');
    const historyMultipliers = document.getElementById('historyMultipliers');
    const loadingScreen = document.getElementById('loadingScreen');

    // Socket.io події
    socket.on('connect', () => {
        console.log('Підключено до сервера');
        loadingScreen.style.display = 'none';
        
        socket.emit('register_player', {
            user_id: userId,
            name: userName
        });
    });

    socket.on('game_state', (data) => {
        gameState.multiplier = data.multiplier;
        gameState.isRunning = data.is_running;
        gameState.isCrashed = data.is_crashed;
        gameState.countdown = data.countdown;
        gameState.players = data.players || [];
        updateUI();
    });

    socket.on('game_update', (data) => {
        gameState.multiplier = data.multiplier;
        gameState.players = data.players || [];
        updateUI();
        moveRocket();
    });

    socket.on('countdown', (data) => {
        gameState.countdown = data.time;
        gameState.players = data.players || [];
        updateUI();
        
        timerContainer.classList.remove('hidden');
        timerDisplay.textContent = data.time;
    });

    socket.on('game_started', (data) => {
        gameState.isRunning = true;
        gameState.isCrashed = false;
        gameState.players = data.players || [];
        updateUI();
        timerContainer.classList.add('hidden');
    });

    socket.on('game_crashed', (data) => {
        gameState.isRunning = false;
        gameState.isCrashed = true;
        gameState.multiplier = data.crash_point;
        gameState.players = data.players || [];
        updateUI();
        
        multiplierEl.classList.add('crashed');
        multiplierEl.innerHTML = '💥 ' + data.crash_point.toFixed(2) + 'x';
        rocketContainer.classList.add('rocket-crashed');
        gameStatus.textContent = 'CRASHED!';
        potentialWin.classList.add('hidden');
        
        if (gameState.hasBet) {
            gameState.hasBet = false;
            gameState.betAmount = 0;
            cashoutBtn.style.display = 'none';
            placeBetBtn.style.display = 'block';
            cancelBetBtn.style.display = 'none';
        }
    });

    socket.on('players_update', (data) => {
        gameState.players = data.players || [];
        updatePlayersList();
    });

    socket.on('cashout_result', (data) => {
        const win = data.win;
        gameState.balance += win;
        gameState.betAmount = 0;
        gameState.hasBet = false;
        updateBalance();
        
        gameState.stats.totalGames++;
        gameState.stats.totalWon += win;
        if (win > gameState.stats.maxWin) {
            gameState.stats.maxWin = win;
        }
        
        cashoutBtn.style.display = 'none';
        placeBetBtn.style.display = 'block';
        cancelBetBtn.style.display = 'none';
        potentialWin.classList.add('hidden');
        
        showToast(`Виграш ${win} ⭐`, 'success');
        updateStats();
    });

    socket.on('bet_result', (data) => {
        if (data.result === 'lost') {
            gameState.betAmount = 0;
            gameState.hasBet = false;
            
            gameState.stats.totalGames++;
            
            cashoutBtn.style.display = 'none';
            placeBetBtn.style.display = 'block';
            cancelBetBtn.style.display = 'none';
            potentialWin.classList.add('hidden');
            
            showToast(`Програно ${data.amount} ⭐`, 'error');
            updateStats();
        }
    });

    socket.on('error', (data) => {
        showToast(data.message, 'error');
    });

    // Функції
    function placeBet() {
        const amount = parseInt(betInput.value) || 10;
        
        if (amount > gameState.balance) {
            showToast('Недостатньо коштів', 'error');
            return;
        }
        
        if (gameState.isRunning || gameState.isCrashed) {
            showToast('Ставки тільки під час таймера!', 'error');
            return;
        }
        
        gameState.balance -= amount;
        gameState.betAmount = amount;
        gameState.hasBet = true;
        updateBalance();
        
        socket.emit('place_bet', { amount: amount });
        
        placeBetBtn.style.display = 'none';
        cancelBetBtn.style.display = 'block';
        
        tg.HapticFeedback?.impactOccurred('medium');
    }

    function cashOut() {
        if (!gameState.hasBet || !gameState.isRunning || gameState.isCrashed) {
            showToast('Не можна забрати зараз', 'error');
            return;
        }
        
        socket.emit('cash_out');
        cashoutBtn.style.display = 'none';
        
        tg.HapticFeedback?.notificationOccurred('success');
    }

    function cancelBet() {
        if (gameState.isRunning) {
            showToast('Не можна скасувати під час гри', 'error');
            return;
        }
        
        gameState.balance += gameState.betAmount;
        gameState.betAmount = 0;
        gameState.hasBet = false;
        updateBalance();
        
        socket.emit('cancel_bet');
        
        placeBetBtn.style.display = 'block';
        cancelBetBtn.style.display = 'none';
        
        tg.HapticFeedback?.impactOccurred('light');
    }

    function updateUI() {
        updateMultiplier();
        updatePlayersList();
        updateGameStatus();
        updatePotentialWin();
    }

    function updateMultiplier() {
        if (gameState.isCrashed) {
            multiplierEl.innerHTML = '💥 ' + gameState.multiplier.toFixed(2) + 'x';
            multiplierEl.classList.add('crashed');
        } else {
            multiplierEl.innerHTML = gameState.multiplier.toFixed(2) + 'x';
            multiplierEl.classList.remove('crashed');
        }
    }

    function updatePlayersList() {
        const activePlayers = gameState.players.filter(p => p.bet > 0);
        playersCount.textContent = activePlayers.length + ' гравців';
        
        if (activePlayers.length === 0) {
            playersList.innerHTML = '<div class="player-item" style="justify-content: center; color: #6b7f98;">Немає активних ставок</div>';
            return;
        }
        
        playersList.innerHTML = activePlayers.map(p => {
            let statusClass = 'waiting';
            let statusText = 'Очікує';
            
            if (p.cashed_out) {
                statusClass = 'won';
                statusText = `✅ x${p.cashed_out_at?.toFixed(2) || '?'}`;
            } else if (p.lost) {
                statusClass = 'lost';
                statusText = '❌ Програв';
            }
            
            return `
                <div class="player-item">
                    <div class="player-info">
                        <div class="player-avatar-small">${p.name.charAt(0)}</div>
                        <span class="player-name">${p.name}</span>
                    </div>
                    <div>
                        <span class="player-bet">${p.bet} ⭐</span>
                        <span class="player-status ${statusClass}">${statusText}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateGameStatus() {
        if (gameState.isCrashed) {
            gameStatus.textContent = 'CRASHED!';
        } else if (gameState.isRunning) {
            gameStatus.textContent = 'ГРА ТРИВАЄ';
        } else {
            gameStatus.textContent = `СТАВКИ НА ${gameState.countdown} СЕКУНД`;
        }
    }

    function updatePotentialWin() {
        if (gameState.hasBet && gameState.isRunning && !gameState.isCrashed) {
            const win = Math.floor(gameState.betAmount * gameState.multiplier);
            potentialWin.textContent = `💰 ${win} ⭐`;
            potentialWin.classList.remove('hidden');
        } else {
            potentialWin.classList.add('hidden');
        }
    }

    function moveRocket() {
        const gameArea = document.getElementById('gameArea');
        const maxWidth = gameArea.clientWidth - 90;
        const maxHeight = gameArea.clientHeight - 90;
        
        const progress = (gameState.multiplier - 1) * 50;
        const x = Math.min(progress * 2, Math.max(0, maxWidth));
        const y = Math.max(30, maxHeight - progress * 1.5);
        const rotation = 10 + progress * 0.2;
        
        rocketContainer.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
    }

    function updateBalance() {
        balanceEl.textContent = gameState.balance.toFixed(2);
    }

    function updateStats() {
        document.getElementById('totalGames').textContent = gameState.stats.totalGames;
        document.getElementById('totalWon').textContent = gameState.stats.totalWon + '⭐';
        document.getElementById('maxWin').textContent = gameState.stats.maxWin + '⭐';
        document.getElementById('casesOpened').textContent = gameState.stats.casesOpened;
        document.getElementById('refCount').textContent = gameState.referrals.count;
        document.getElementById('refEarned').textContent = gameState.referrals.earned + '⭐';
    }

    function showToast(message, type) {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toastIcon');
        const msg = document.getElementById('toastMessage');
        
        toast.className = `toast ${type} show`;
        icon.className = type === 'success' ? 'fas fa-check' : 'fas fa-exclamation';
        msg.textContent = message;
        
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Deposit modal handlers
    const depositModal = document.getElementById('depositModal');
    const confirmModal = document.getElementById('confirmModal');
    const depositAmount = document.getElementById('depositAmount');
    const confirmAmount = document.getElementById('confirmAmount');
    const confirmStars = document.getElementById('confirmStars');
    
    let selectedAmount = 10;

    document.getElementById('balanceBtn').addEventListener('click', () => {
        depositModal.classList.add('active');
    });

    document.getElementById('closeDepositModal').addEventListener('click', () => {
        depositModal.classList.remove('active');
    });

    document.querySelectorAll('.deposit-preset').forEach(preset => {
        preset.addEventListener('click', () => {
            const amount = parseInt(preset.dataset.amount);
            depositAmount.value = amount;
            selectedAmount = amount;
            
            document.querySelectorAll('.deposit-preset').forEach(p => p.classList.remove('active'));
            preset.classList.add('active');
        });
    });

    depositAmount.addEventListener('input', (e) => {
        selectedAmount = parseInt(e.target.value) || 1;
    });

    document.getElementById('depositNextBtn').addEventListener('click', () => {
        if (selectedAmount < 1) {
            showToast('Мінімальна сума: 1 ⭐', 'error');
            return;
        }
        
        confirmAmount.textContent = selectedAmount + ' ⭐';
        confirmStars.textContent = selectedAmount;
        
        depositModal.classList.remove('active');
        confirmModal.classList.add('active');
    });

    document.getElementById('cancelConfirm').addEventListener('click', () => {
        confirmModal.classList.remove('active');
    });

    document.getElementById('payConfirm').addEventListener('click', async () => {
        confirmModal.classList.remove('active');
        
        try {
            tg.HapticFeedback.impactOccurred('medium');
            
            const response = await fetch(`${SERVER_URL}/api/create-invoice`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: userId,
                    amount: selectedAmount
                })
            });
            
            const data = await response.json();
            
            if (data.success && data.link) {
                tg.openInvoice(data.link, (status) => {
                    if (status === 'paid') {
                        const bonus = Math.floor(selectedAmount * 0.1);
                        gameState.balance += selectedAmount + bonus;
                        updateBalance();
                        
                        showToast(`+${selectedAmount + bonus} ⭐`, 'success');
                        tg.HapticFeedback.notificationOccurred('success');
                    } else if (status === 'cancelled') {
                        showToast('Платіж скасовано', 'error');
                    } else if (status === 'failed') {
                        showToast('Помилка платежу', 'error');
                    }
                });
            } else {
                showToast('Помилка створення інвойсу', 'error');
            }
        } catch (error) {
            showToast('Помилка з\'єднання з сервером', 'error');
        }
    });

    // Інші обробники
    document.getElementById('copyReferralBtn').addEventListener('click', () => {
        const link = document.getElementById('referralLink').textContent;
        navigator.clipboard.writeText(link);
        showToast('Посилання скопійовано!', 'success');
    });

    document.querySelectorAll('.quick-amount-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const amount = parseInt(btn.dataset.amount);
            const current = parseInt(betInput.value) || 0;
            betInput.value = current + amount;
        });
    });

    document.getElementById('maxBtn').addEventListener('click', () => {
        betInput.value = gameState.balance;
    });

    const toggle = document.getElementById('autoCashoutToggle');
    const multipliers = document.getElementById('autoMultipliers');
    
    toggle.addEventListener('click', () => {
        toggle.classList.toggle('active');
        gameState.autoCashout = toggle.classList.contains('active');
        multipliers.style.display = gameState.autoCashout ? 'flex' : 'none';
    });

    document.querySelectorAll('.auto-multiplier-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.auto-multiplier-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameState.autoCashoutMultiplier = parseFloat(btn.dataset.multi);
        });
    });

    // Обробники кнопок гри
    placeBetBtn.addEventListener('click', placeBet);
    cashoutBtn.addEventListener('click', cashOut);
    cancelBetBtn.addEventListener('click', cancelBet);

    // Навігація
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const screen = item.dataset.screen;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`${screen}Screen`).classList.add('active');
        });
    });

    // Ініціалізація
    document.getElementById('userName').textContent = userName;
    document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
    document.getElementById('profileName').textContent = userName;
    document.getElementById('profileAvatar').textContent = userName.charAt(0).toUpperCase();
    document.getElementById('profileId').textContent = userId;
    document.getElementById('referralLink').textContent = `t.me/${BOT_USERNAME}?start=ref_${userId}`;
    
    updateBalance();
    updateStats();
</script>
