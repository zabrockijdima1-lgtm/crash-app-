<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Crash</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0e1219;
color:white;
font-family:Arial;
text-align:center;
padding-top:40px;
}

button{
padding:15px;
font-size:18px;
margin:10px;
}

</style>

</head>

<body>

<h2>🚀 Crash Game</h2>

<div id="balance">Баланс: 0</div>

<button onclick="deposit()">Поповнити Stars</button>

<button onclick="play()">Ставка 1</button>

<h1 id="mult">1.00x</h1>

<script>

const tg = window.Telegram.WebApp
tg.expand()

let user = tg.initDataUnsafe.user.id

async function loadBalance(){

let r = await fetch(`/balance/${user}`)
let data = await r.json()

document.getElementById("balance").innerText =
"Баланс: "+data.balance

}

loadBalance()

async function deposit(){

let r = await fetch("/create-stars-invoice",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user,
amount:10
})
})

let data = await r.json()

tg.openInvoice(data.link)

}

async function play(){

let r = await fetch("/crash")
let data = await r.json()

let crash = data.crash

let mult = 1

let el = document.getElementById("mult")

let i = setInterval(()=>{

mult+=0.02

el.innerText = mult.toFixed(2)+"x"

if(mult>=crash){

clearInterval(i)

el.innerText="💥 "+crash+"x"

}

},50)

}

</script>

</body>
</html>
