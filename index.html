<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crash</title>

<style>

body{
background:#020b1d;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

.header{
padding:15px;
font-size:20px;
background:#030f25;
}

.balance{
position:absolute;
right:20px;
top:15px;
}

canvas{
background:#020f2a;
border-radius:10px;
margin-top:20px;
}

.mult{
font-size:60px;
margin-top:10px;
}

.controls{
margin-top:20px;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.bet{
background:#3aa1ff;
color:white;
}

.cash{
background:#28c76f;
color:white;
}

.history{
margin-top:20px;
}

.box{
display:inline-block;
background:#111c3a;
padding:6px 10px;
margin:3px;
border-radius:6px;
font-size:14px;
}

.rocket{
font-size:40px;
position:absolute;
left:50px;
top:200px;
transition:all 0.2s linear;
}

</style>
</head>

<body>

<div class="header">
🚀 Crash
<div class="balance">💰 <span id="bal">100</span></div>
</div>

<canvas id="chart" width="700" height="300"></canvas>

<div class="rocket" id="rocket">🚀</div>

<div class="mult" id="mult">1.00x</div>

<div class="controls">

<input id="bet" value="10" style="padding:10px;width:80px">

<button class="bet" onclick="placeBet()">BET</button>
<button class="cash" onclick="cashout()">CASHOUT</button>

</div>

<div class="history" id="history"></div>

<script>

let mult=1
let crashed=false
let playing=false
let bet=0
let balance=100

let ctx=document.getElementById("chart").getContext("2d")

let x=0
let y=300

let crashPoint=Math.random()*4+1.5

function addHistory(val){

let box=document.createElement("div")
box.className="box"
box.innerText=val+"x"

document.getElementById("history").prepend(box)

}

function round(){

mult=1
x=0
y=300
crashed=false
playing=false

crashPoint=Math.random()*4+1.5

ctx.clearRect(0,0,700,300)
ctx.beginPath()
ctx.moveTo(0,300)

loop()

}

function loop(){

if(crashed)return

mult+=0.02

document.getElementById("mult").innerText=mult.toFixed(2)+"x"

x+=3
y-=mult*0.4

ctx.lineTo(x,y)
ctx.strokeStyle="white"
ctx.stroke()

document.getElementById("rocket").style.left=(x+40)+"px"
document.getElementById("rocket").style.top=(y+120)+"px"

if(mult>=crashPoint){

crashed=true

document.getElementById("mult").innerText="💥 "+mult.toFixed(2)

addHistory(mult.toFixed(2))

setTimeout(round,2000)

return
}

requestAnimationFrame(loop)

}

function placeBet(){

if(playing)return

bet=parseFloat(document.getElementById("bet").value)

if(bet>balance){
alert("Недостатньо коштів")
return
}

balance-=bet

document.getElementById("bal").innerText=balance

playing=true

}

function cashout(){

if(!playing)return
if(crashed)return

let win=bet*mult

balance+=win

document.getElementById("bal").innerText=Math.floor(balance)

alert("Ви забрали "+mult.toFixed(2)+"x")

playing=false

}

round()

</script>

</body>
</html>
