<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0e14; color: #fff; overflow: hidden; height: 100vh; }
        
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #11151c;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #1a202c;
            border-bottom: 1px solid #2d3748;
        }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; background-color: #718096; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: 700; font-size: 14px; }
        .user-level { font-size: 11px; color: #a0aec0; }
        
        .balance-block { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            background-color: #0b0e14; 
            padding: 6px 12px; 
            border-radius: 8px; 
            border: 1px solid #2d3748; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .balance-block:active { background-color: #1f2a3a; }
        .balance-value { font-weight: 700; font-size: 14px; color: #fff; }
        .balance-icon { width: 14px; height: 14px; background-color: #0088cc; border-radius: 50%; }
        
        .stars-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #0b0e14;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #fbbf24;
            cursor: pointer;
        }
        .stars-value {
            font-weight: 700;
            font-size: 14px;
            color: #fbbf24;
        }
        .stars-icon {
            color: #fbbf24;
            font-size: 14px;
        }

        .history-bar {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            background-color: #11151c;
            overflow-x: auto;
            border-bottom: 1px solid #1a202c;
        }
        .history-bar::-webkit-scrollbar { display: none; }
        .history-item { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
        .x-blue { background-color: rgba(66, 153, 225, 0.15); color: #63b3ed; }
        .x-green { background-color: rgba(72, 187, 120, 0.15); color: #68d391; }
        .x-yellow { background-color: rgba(236, 201, 75, 0.15); color: #faf089; }
        .x-red { background-color: rgba(245, 101, 101, 0.15); color: #fc8181; }

        .game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #0d1117;
            background-image: linear-gradient(#1a202c 1px, transparent 1px), linear-gradient(90deg, #1a202c 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
        }
        
        .multiplier-container {
            text-align: center;
            z-index: 10;
        }
        .multiplier-display {
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 40px rgba(66, 153, 225, 0.6);
            transition: color 0.2s, text-shadow 0.2s;
        }
        .potential-win {
            font-size: 14px;
            color: #68d391;
            margin-top: 5px;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .rocket-svg {
            position: absolute;
            width: 150px;
            opacity: 0.6;
            filter: drop-shadow(0 0 20px #4299e1);
            transition: transform 0.1s ease-out;
            bottom: 20%;
            left: 10%;
        }
        .rocket-crashed {
            filter: drop-shadow(0 0 20px #fc8181);
            opacity: 0.9;
        }

        .players-panel {
            position: absolute;
            top: 20px;
            right: 10px;
            width: 110px;
            background: rgba(26, 32, 44, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid #2d3748;
            padding: 8px;
            color: white;
            font-size: 11px;
            z-index: 20;
            max-height: 200px;
            overflow-y: auto;
        }
        .players-title {
            color: #a0aec0;
            margin-bottom: 5px;
            font-size: 10px;
            text-transform: uppercase;
            text-align: center;
        }
        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            padding: 4px;
            background: #0b0e14;
            border-radius: 6px;
        }
        .player-name {
            max-width: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .player-bet {
            color: #fbbf24;
            font-weight: 600;
        }

        .bet-area {
            padding: 16px;
            background-color: #1a202c;
            border-top: 1px solid #2d3748;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .next-round-text { text-align: center; color: #a0aec0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        
        .bet-buttons-row { display: flex; gap: 10px; }
        .bet-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s, background 0.2s; }
        .bet-btn:active { transform: scale(0.97); }
        .bet-btn:disabled { opacity: 0.5; pointer-events: none; }
        
        .btn-left { background-color: #11151c; color: #63b3ed; border: 1px solid #2d3748; }
        .btn-main { background: linear-gradient(135deg, #4299e1, #3182ce); color: #fff; flex: 1.5; }
        .btn-withdraw { background: linear-gradient(135deg, #f6ad55, #ed8936); color: #fff; }

        .bet-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bet-presets {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .preset-btn {
            flex: 1;
            background-color: #0b0e14;
            border: 1px solid #2d3748;
            color: #a0aec0;
            padding: 8px 0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .preset-btn.active-preset {
            background-color: #3182ce;
            color: white;
            border-color: #63b3ed;
        }
        .bet-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #0b0e14;
            border-radius: 10px;
            padding: 4px 12px;
            border: 1px solid #2d3748;
        }
        .bet-input-row span { color: #a0aec0; font-size: 14px; }
        .bet-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }

        /* Екран чату та інвентарю */
        .overlay-screen {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 130px);
            background: #11151c;
            z-index: 100;
            padding: 20px;
            display: none;
            overflow-y: auto;
        }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .inventory-item { background: #1a202c; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #2d3748; }
        .chat-msg { margin-bottom: 10px; font-size: 13px; }
        .chat-user { color: #4299e1; font-weight: bold; }

        .navbar {
            display: flex;
            background-color: #1a202c;
            border-top: 1px solid #2d3748;
            padding: 6px 0;
            margin-top: auto;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #a0aec0; text-decoration: none; font-size: 11px; padding: 10px 0; position: relative; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: #fff; }
        .nav-item.active::after { content: ''; position: absolute; top: -7px; left: 25%; width: 50%; height: 2px; background-color: #4299e1; }
        .nav-icon { font-size: 20px; }

        .hidden { display: none; }
        
        /* Прогрес бар рівня */
        .xp-bar-container { width: 100%; height: 4px; background: #2d3748; border-radius: 2px; margin-top: 4px; }
        .xp-bar-fill { height: 100%; background: #4299e1; width: 30%; border-radius: 2px; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="userAvatar">Д</div>
            <div class="user-info">
                <span class="user-name" id="userName">Діма | BIO</span>
                <div class="user-level" id="levelText">🔰 Level 1</div>
                <div class="xp-bar-container"><div class="xp-bar-fill" id="xpBar"></div></div>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <div class="stars-block" id="starsBlock">
                <span class="stars-value" id="starsValue">0</span>
                <i class="fa-solid fa-star stars-icon"></i>
            </div>
            <div class="balance-block" id="balanceBlock">
                <span class="balance-value" id="balanceValue">10.00</span>
                <div class="balance-icon"></div>
            </div>
        </div>
    </div>

    <div id="inventoryScreen" class="overlay-screen">
        <h3>Мій інвентар</h3><br>
        <div class="inventory-grid">
            <div class="inventory-item"><i class="fa-solid fa-rocket" style="font-size: 30px; color: #4299e1;"></i><p>Стандарт</p></div>
            <div class="inventory-item" style="opacity: 0.5;"><i class="fa-solid fa-lock"></i><p>???</p></div>
        </div>
    </div>

    <div id="profileScreen" class="overlay-screen">
        <h3>Мій профіль</h3><br>
        <div class="inventory-item" style="text-align: left;">
            <p>Всього ігор: <span id="statsGames">0</span></p>
            <p>Виграно: <span id="statsWins">0 TON</span></p>
            <p>Макс. Х: <span id="statsMaxX">1.00x</span></p>
        </div>
    </div>

    <div id="mainGameContent" style="display: contents;">
        <div class="history-bar" id="historyBar">
            <span class="history-item x-blue">1.33x</span>
            <span class="history-item x-green">2.15x</span>
            <span class="history-item x-red">1.00x</span>
        </div>

        <div class="game-area" id="gameArea">
            <svg class="rocket-svg" id="rocketSvg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L9.5 7L4.5 9.5L9.5 12L12 17L14.5 12L19.5 9.5L14.5 7L12 2Z" fill="#63B3ED" fill-opacity="0.3"/>
                <path d="M11.9998 2V12M11.9998 12L14.1208 14.121M11.9998 12V22M11.9998 12L9.8787 14.121M14.1208 14.121C14.7318 14.732 15.0378 15.54 15.0378 16.348C15.0378 17.156 14.7318 17.964 14.1208 18.575M9.8787 14.121C9.2677 14.732 8.9617 15.54 8.9617 16.348C8.9617 17.156 9.2677 17.964 9.8787 18.575" stroke="#63B3ED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="multiplier-container">
                <div class="multiplier-display" id="multiplier">1.00x</div>
                <div class="potential-win hidden" id="potentialWin">💰 0.00 TON</div>
            </div>
            
            <div class="players-panel" id="playersPanel">
                <div class="players-title">🎲 Гравці</div>
                <div id="playersList"></div>
            </div>
        </div>

        <div class="bet-area">
            <div class="next-round-text" id="roundStatus">⚡ Зробіть ставку</div>
            
            <div class="bet-panel hidden" id="betPanel">
                <div class="bet-presets">
                    <button class="preset-btn" data-bet="0.5">0.5</button>
                    <button class="preset-btn" data-bet="1">1</button>
                    <button class="preset-btn" data-bet="5">5</button>
                    <button class="preset-btn" data-bet="10">10</button>
                </div>
                <div class="bet-input-row">
                    <span>💰</span>
                    <input type="number" id="betAmount" min="0.1" step="0.1" value="1.0">
                    <span>TON</span>
                </div>
            </div>

            <div class="bet-buttons-row">
                <button class="bet-btn btn-left" id="showBetPanelBtn"><i class="fa-solid fa-sliders"></i></button>
                <button class="bet-btn btn-main" id="actionBtn">Поставити</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item" id="navInventory"><i class="fa-solid fa-box-archive nav-icon"></i>Інвентар</div>
        <div class="nav-item" id="navCraft"><i class="fa-solid fa-hammer nav-icon"></i>Крафт</div>
        <div class="nav-item active" id="navCrash"><i class="fa-solid fa-rocket nav-icon"></i>Краш</div>
        <div class="nav-item" id="navCases"><i class="fa-solid fa-gift nav-icon"></i>Кейси</div>
        <div class="nav-item" id="navProfile"><i class="fa-solid fa-user nav-icon"></i>Профіль</div>
    </div>
</div>

<script>
    (function() {
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Стан
        let balance = parseFloat(localStorage.getItem('stonks_balance')) || 100.0;
        let stars = parseInt(localStorage.getItem('stonks_stars')) || 0;
        let xp = parseInt(localStorage.getItem('stonks_xp')) || 0;
        let level = Math.floor(xp / 100) + 1;
        
        let statsWins = parseFloat(localStorage.getItem('stonks_stats_wins')) || 0;
        let statsGames = parseInt(localStorage.getItem('stonks_stats_games')) || 0;
        let statsMaxX = parseFloat(localStorage.getItem('stonks_stats_maxx')) || 1.0;

        const multDisplay = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const historyBar = document.getElementById('historyBar');
        const betAmountInput = document.getElementById('betAmount');
        const potentialWinSpan = document.getElementById('potentialWin');
        const rocketSvg = document.getElementById('rocketSvg');

        let isPlaying = false;
        let isGameActive = false;
        let isCrashed = false;
        let currentMultiplier = 1.00;
        let crashPoint = 1.00;
        let gameLoopInterval = null;
        let currentBet = 0;
        let hasCashedOut = false;

        function updateUI() {
            document.getElementById('balanceValue').textContent = balance.toFixed(2);
            document.getElementById('starsValue').textContent = stars;
            document.getElementById('levelText').textContent = `🔰 Level ${level}`;
            document.getElementById('xpBar').style.width = (xp % 100) + '%';
            
            document.getElementById('statsGames').textContent = statsGames;
            document.getElementById('statsWins').textContent = statsWins.toFixed(2) + ' TON';
            document.getElementById('statsMaxX').textContent = statsMaxX.toFixed(2) + 'x';

            localStorage.setItem('stonks_balance', balance);
            localStorage.setItem('stonks_stars', stars);
            localStorage.setItem('stonks_xp', xp);
            localStorage.setItem('stonks_stats_wins', statsWins);
            localStorage.setItem('stonks_stats_games', statsGames);
            localStorage.setItem('stonks_stats_maxx', statsMaxX);
        }

        function generateCrashPoint() {
            const r = Math.random();
            if (r < 0.03) return 1.00; // Миттєвий краш
            return parseFloat((0.99 / (1 - Math.random())).toFixed(2));
        }

        function addToHistory(val) {
            const item = document.createElement('span');
            item.className = `history-item ${val < 2 ? 'x-red' : 'x-green'}`;
            item.textContent = val.toFixed(2) + 'x';
            historyBar.prepend(item);
        }

        function startRound() {
            if (isGameActive) return;
            isGameActive = true;
            isCrashed = false;
            currentMultiplier = 1.00;
            crashPoint = generateCrashPoint();
            
            rocketSvg.style.transform = 'translate(0, 0) rotate(0deg)';
            rocketSvg.classList.remove('rocket-crashed');

            gameLoopInterval = setInterval(() => {
                currentMultiplier += currentMultiplier * 0.005;
                multDisplay.textContent = currentMultiplier.toFixed(2) + 'x';

                // Анімація ракети
                const progress = (currentMultiplier - 1) * 20;
                rocketSvg.style.transform = `translate(${progress}px, -${progress}px) rotate(${progress/2}deg)`;

                if (isPlaying && !hasCashedOut) {
                    potentialWinSpan.classList.remove('hidden');
                    potentialWinSpan.textContent = `💰 ${(currentBet * currentMultiplier).toFixed(2)} TON`;
                }

                if (currentMultiplier >= crashPoint) {
                    crash();
                }
            , 50);
        }

        function crash() {
            clearInterval(gameLoopInterval);
            isCrashed = true;
            isGameActive = false;
            multDisplay.style.color = '#fc8181';
            rocketSvg.classList.add('rocket-crashed');
            addToHistory(currentMultiplier);
            
            if (isPlaying && !hasCashedOut) {
                tg.HapticFeedback.notificationOccurred('error');
            }
            
            isPlaying = false;
            setTimeout(resetGame, 3000);
        }

        function resetGame() {
            multDisplay.style.color = '#fff';
            multDisplay.textContent = '1.00x';
            potentialWinSpan.classList.add('hidden');
            actionBtn.disabled = false;
            actionBtn.innerHTML = 'Поставити';
            actionBtn.className = 'bet-btn btn-main';
            hasCashedOut = false;
            startRound();
        }

        actionBtn.addEventListener('click', () => {
            if (!isGameActive || isCrashed) return;

            if (!isPlaying) {
                let amt = parseFloat(betAmountInput.value);
                if (amt > balance || amt <= 0) return;
                
                balance -= amt;
                currentBet = amt;
                isPlaying = true;
                statsGames++;
                xp += 5;
                
                actionBtn.innerHTML = 'ЗАБРАТИ';
                actionBtn.className = 'bet-btn btn-withdraw';
                updateUI();
            } else if (!hasCashedOut) {
                hasCashedOut = true;
                const win = currentBet * currentMultiplier;
                balance += win;
                statsWins += win;
                if (currentMultiplier > statsMaxX) statsMaxX = currentMultiplier;
                xp += 15;
                
                tg.HapticFeedback.notificationOccurred('success');
                actionBtn.disabled = true;
                actionBtn.innerHTML = 'ВЗЯТО!';
                updateUI();
            }
        });

        // Навігація
        const screens = {
            'navInventory': 'inventoryScreen',
            'navProfile': 'profileScreen',
            'navCrash': 'mainGameContent'
        };

        Object.keys(screens).forEach(id => {
            document.getElementById(id).addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
                document.getElementById('mainGameContent').style.display = 'none';
                
                const target = screens[id];
                document.getElementById(target).style.display = target === 'mainGameContent' ? 'contents' : 'block';
            });
        });

        document.getElementById('showBetPanelBtn').onclick = () => document.getElementById('betPanel').classList.toggle('hidden');

        updateUI();
        startRound();
    })();
</script>
</body>
</html>
