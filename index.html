<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Crash Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #0b0e14; 
            --bg-card: #151a25; 
            --accent-blue: #0088cc; 
            --text-main: #ffffff;
            --text-gray: #718096;
            --green: #48bb78;
            --red: #f56565;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; }

        .app-shell { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #1a202c; border-bottom: 1px solid #2d3748; }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #4a5568; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid #2d3748; }
        .balance-pill { background: #0b0e14; padding: 6px 14px; border-radius: 12px; border: 1px solid #2d3748; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .balance-pill span { color: var(--accent-blue); font-weight: 700; }

        /* SCREENS */
        .screen { flex-grow: 1; display: none; overflow-y: auto; padding-bottom: 90px; }
        .screen.active { display: block; }

        /* GAME AREA (Стиль як на скріншоті) */
        .game-view { 
            height: 45vh; 
            background: #0d1117; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            background-image: radial-gradient(#1a202c 1px, transparent 1px);
            background-size: 30px 30px;
        }
        #multiplier { font-size: 68px; font-weight: 900; z-index: 5; transition: color 0.2s; }
        .rocket-svg { 
            position: absolute; 
            width: 140px; 
            filter: drop-shadow(0 0 15px var(--accent-blue));
            z-index: 4;
            transition: transform 0.1s linear;
        }
        
        /* History */
        .history-strip { display: flex; gap: 8px; padding: 10px 16px; background: #11151c; overflow-x: auto; border-bottom: 1px solid #1a202c; }
        .history-strip::-webkit-scrollbar { display: none; }
        .h-tag { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: #1a202c; color: #fff; }

        /* BET PANEL */
        .bet-panel { padding: 20px; background: #1a202c; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .bet-input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; background: #0b0e14; border: 1px solid #2d3748; color: #fff; padding: 16px; border-radius: 14px; font-size: 18px; font-weight: 700; }
        .btn-main { 
            width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 20px; 
            font-weight: 800; cursor: pointer; color: #fff; transition: 0.1s;
            background: linear-gradient(135deg, #0088cc, #005580); 
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-cashout { background: linear-gradient(135deg, #f6ad55, #ed8936) !important; }

        /* REFFERAL & WALLET CARDS */
        .card { background: #1a202c; margin: 16px; padding: 20px; border-radius: 20px; border: 1px solid #2d3748; }
        .ref-link-box { background: #000; padding: 12px; border-radius: 12px; margin: 15px 0; font-family: monospace; color: var(--accent-blue); border: 1px dashed #2d3748; text-align: center; }
        .grid-deposit { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dep-item { background: #2d3748; border: none; color: #fff; padding: 18px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* NAVIGATION BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #1a202c; border-top: 1px solid #2d3748; padding: 8px 0; z-index: 100; }
        .nav-link { flex: 1; text-align: center; color: #718096; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-link.active { color: #fff; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div class="user-block">
            <div class="avatar" id="uAv">?</div>
            <div>
                <div id="uName" style="font-size: 15px; font-weight: 800;">Гість</div>
                <div style="font-size: 11px; color: var(--text-gray);">Level 1</div>
            </div>
        </div>
        <div class="balance-pill" onclick="switchTab('wallet', document.getElementById('walNav'))">
            <span id="uBal">0.00</span> <small style="color:#718096">⭐️</small>
        </div>
    </div>

    <div id="scr-game" class="screen active">
        <div class="history-strip" id="hList"></div>
        <div class="game-view">
            <img src="https://cdn-icons-png.flaticon.com/512/1066/1066371.png" class="rocket-svg" id="rocket">
            <div id="multiplier">1.00x</div>
        </div>
        <div class="bet-panel">
            <p style="text-align: center; font-size: 12px; color: #718096; margin-bottom: 12px; font-weight: 700;">СТАВКА НА РАУНД</p>
            <div class="bet-input-row">
                <input type="number" id="betVal" value="10">
                <button onclick="modifyBet(2)" style="background:#2d3748; color:#fff; border:none; padding:0 20px; border-radius:12px; font-weight:700;">x2</button>
            </div>
            <button class="btn-main" id="playBtn" onclick="gameTrigger()">ПОСТАВИТИ СТАВКУ</button>
        </div>
    </div>

    <div id="scr-ref" class="screen">
        <div class="card">
            <h2>Друзі</h2>
            <p style="color: #718096; margin-top: 5px;">Отримуй 10% від депозитів друзів!</p>
            <div class="ref-link-box" id="refLink">t.me/StonksGiftBot?start=...</div>
            <button class="btn-main" onclick="copyRef()">КОПІЮВАТИ ПОСИЛАННЯ</button>
        </div>
    </div>

    <div id="scr-wallet" class="screen">
        <div class="card">
            <h3>Поповнити Stars</h3>
            <p style="font-size: 13px; color: #718096; margin-bottom: 20px;">1 Star = 1 монета на баланс</p>
            <div class="grid-deposit">
                <button class="dep-item" onclick="deposit(50)">50 ⭐️</button>
                <button class="dep-item" onclick="deposit(100)">100 ⭐️</button>
                <button class="dep-item" onclick="deposit(500)">500 ⭐️</button>
                <button class="dep-item" onclick="deposit(1000)">1000 ⭐️</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="switchTab('game', this)"><i class="fa-solid fa-rocket"></i>Краш</div>
        <div class="nav-link" onclick="switchTab('ref', this)"><i class="fa-solid fa-users"></i>Друзі</div>
        <div id="walNav" class="nav-link" onclick="switchTab('wallet', this)"><i class="fa-solid fa-wallet"></i>Гаманець</div>
        <div class="nav-link" onclick="tg.showAlert('Профіль скоро!')"><i class="fa-solid fa-user"></i>Профіль</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 250.00;
    let isLive = false;
    let currentX = 1.00;
    let crashPoint = 0;
    let timer;

    // Дані юзера
    if(tg.initDataUnsafe.user) {
        document.getElementById('uName').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('uAv').innerText = tg.initDataUnsafe.user.first_name[0].toUpperCase();
        document.getElementById('refLink').innerText = `t.me/StonksGiftBot?start=${tg.initDataUnsafe.user.id}`;
    }
    document.getElementById('uBal').innerText = balance.toFixed(2);

    function switchTab(name, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-' + name).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    // ЛОГІКА ГРИ
    function gameTrigger() {
        const btn = document.getElementById('playBtn');
        const bet = parseFloat(document.getElementById('betVal').value);

        if (!isLive) {
            if (balance < bet) return tg.showAlert("Не вистачає зірок!");
            
            balance -= bet;
            updateBalanceUI();
            
            isLive = true;
            currentX = 1.00;
            crashPoint = generateCrash();
            
            btn.innerText = "ЗАБРАТИ ВИГРАШ";
            btn.classList.add('btn-cashout');
            
            timer = setInterval(() => {
                currentX += 0.01 + (currentX * 0.004);
                document.getElementById('multiplier').innerText = currentX.toFixed(2) + "x";
                
                // Анімація ракети
                const offset = (currentX - 1) * 15;
                document.getElementById('rocket').style.transform = `translate(${offset}px, -${offset}px)`;

                if (currentX >= crashPoint) {
                    clearInterval(timer);
                    explode();
                }
            }, 100);
        } else {
            const win = bet * currentX;
            balance += win;
            tg.HapticFeedback.notificationOccurred('success');
            stopGame("ВИГРАШ: " + win.toFixed(2));
        }
    }

    function generateCrash() {
        const r = Math.random();
        if(r < 0.05) return 1.00; // House Edge 5%
        return (0.97 / (1 - r)).toFixed(2);
    }

    function explode() {
        tg.HapticFeedback.notificationOccurred('error');
        document.getElementById('multiplier').style.color = "#f56565";
        document.getElementById('multiplier').innerText = "💥 " + currentX.toFixed(2) + "x";
        addHistory(currentX.toFixed(2));
        stopGame("КРАШ");
    }

    function stopGame() {
        clearInterval(timer);
        isLive = false;
        const btn = document.getElementById('playBtn');
        btn.disabled = true;
        btn.innerText = "ОБРОБКА...";

        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "ПОСТАВИТИ СТАВКУ";
            btn.classList.remove('btn-cashout');
            document.getElementById('multiplier').innerText = "1.00x";
            document.getElementById('multiplier').style.color = "#fff";
            document.getElementById('rocket').style.transform = "translate(0,0)";
            updateBalanceUI();
        }, 3000);
    }

    function updateBalanceUI() {
        document.getElementById('uBal').innerText = balance.toFixed(2);
    }

    function addHistory(val) {
        const h = document.getElementById('hList');
        const tag = document.createElement('span');
        tag.className = 'h-tag';
        if(val >= 2) tag.style.color = "#48bb78";
        if(val < 1.2) tag.style.color = "#f56565";
        tag.innerText = val + 'x';
        h.prepend(tag);
        if(h.children.length > 10) h.removeChild(h.lastChild);
    }

    function modifyBet(n) {
        const i = document.getElementById('betVal');
        i.value = (parseFloat(i.value) * n).toFixed(0);
    }

    function deposit(amt) {
        tg.sendData(JSON.stringify({action: 'buy_stars', amount: amt}));
        tg.close();
    }

    function copyRef() {
        const link = document.getElementById('refLink').innerText;
        navigator.clipboard.writeText(link);
        tg.showAlert("Посилання скопійовано!");
    }
</script>

</body>
</html>
