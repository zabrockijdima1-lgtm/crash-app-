<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Pro Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0e14; color: #fff; overflow: hidden; height: 100vh; }
        
        .app-container { max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background-color: #11151c; position: relative; }

        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background-color: #1a202c; border-bottom: 1px solid #2d3748; }
        .user-block { display: flex; align-items: center; gap: 8px; }
        .user-avatar { width: 35px; height: 35px; background: #4a5568; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .balance-pill { background: #0b0e14; padding: 6px 12px; border-radius: 20px; border: 1px solid #2d3748; display: flex; align-items: center; gap: 6px; }

        /* Історія */
        .history-bar { display: flex; gap: 6px; padding: 10px 16px; background: #11151c; overflow-x: auto; border-bottom: 1px solid #1a202c; }
        .history-item { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.05); }

        /* ГРАФІК ТА РАКЕТА */
        .game-area { flex: 1.5; position: relative; background: #0d1117; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .rocket-container { position: absolute; bottom: 20%; left: 10%; transition: all 0.1s linear; z-index: 5; }
        .rocket-img { width: 100px; filter: drop-shadow(0 0 15px #4299e1); }
        .multiplier { font-size: 60px; font-weight: 900; color: #fff; z-index: 10; margin-top: 40px; }

        /* СПИСОК ГРАВЦІВ (LIVE BETS) */
        .players-list { flex: 1; background: #0b0e14; border-top: 1px solid #1a202c; overflow-y: auto; padding: 10px 16px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1a202c; font-size: 13px; animation: fadeIn 0.3s ease; }
        .p-name { color: #a0aec0; }
        .p-bet { font-weight: bold; }
        .p-win { color: #48bb78; font-weight: bold; }
        .p-status-wait { color: #718096; font-style: italic; }

        /* ПАНЕЛЬ СТАВКИ */
        .bet-panel { padding: 16px; background: #1a202c; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; gap: 10px; }
        .input-box { background: #0b0e14; border-radius: 12px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #2d3748; }
        .input-box input { flex: 1; background: none; border: none; color: white; padding: 10px; font-weight: bold; outline: none; }
        .action-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; font-size: 18px; font-weight: 800; cursor: pointer; color: white; background: linear-gradient(135deg, #4299e1, #3182ce); }
        .action-btn.withdraw { background: linear-gradient(135deg, #f6ad55, #ed8936); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="uAv">U</div>
            <span class="user-name" id="uName">Гість</span>
        </div>
        <div class="balance-pill" onclick="tg.showAlert('Поповнення Stars...')">
            <span id="uBal">500.00</span>
            <i class="fa-solid fa-star" style="color:#f6ad55"></i>
        </div>
    </div>

    <div class="history-bar" id="hBar"></div>

    <div class="game-area">
        <div class="rocket-container" id="rocket">
            <img src="https://cdn-icons-png.flaticon.com/512/1066/1066371.png" class="rocket-img">
        </div>
        <div class="multiplier" id="mult">1.00x</div>
    </div>

    <div class="players-list" id="pList">
        <div style="font-size: 10px; color: #4a5568; margin-bottom: 5px; text-transform: uppercase;">Гравці онлайн</div>
        </div>

    <div class="bet-panel">
        <div class="input-box">
            <span style="font-size: 12px; color:#4a5568">СТАВКА:</span>
            <input type="number" id="betVal" value="10">
            <button onclick="document.getElementById('betVal').value *= 2" style="background:#2d3748; border:none; color:white; padding:5px 10px; border-radius:6px; margin-left:5px">x2</button>
        </div>
        <button class="action-btn" id="actBtn">ПОСТАВИТИ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 500.00;
    let isPlaying = false;
    let isCrashed = false;
    let currentX = 1.00;
    let crashPoint = 0;
    let gameLoop;

    // Дані юзера
    if(tg.initDataUnsafe.user) {
        document.getElementById('uName').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('uAv').innerText = tg.initDataUnsafe.user.first_name[0];
    }

    // Імітація інших гравців
    const botNames = ["@max_ton", "@crypto_boss", "@lucky_guy", "@ton_expert", "@dimas_top"];
    function updateBots() {
        const list = document.getElementById('pList');
        if(list.children.length > 6) list.removeChild(list.lastChild);
        
        const name = botNames[Math.floor(Math.random()*botNames.length)];
        const bet = (Math.random()*50 + 5).toFixed(0);
        
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `
            <span class="p-name">${name}</span>
            <span class="p-bet">${bet} ⭐️</span>
            <span class="p-status-wait" id="bot-${Date.now()}">у грі...</span>
        `;
        list.prepend(row);
    }
    setInterval(() => { if(!isPlaying) updateBots() }, 3000);

    function startRound() {
        const bet = parseFloat(document.getElementById('betVal').value);
        if(balance < bet) return tg.showAlert("Не вистачає Stars!");

        balance -= bet;
        document.getElementById('uBal').innerText = balance.toFixed(2);
        
        isPlaying = true;
        isCrashed = false;
        currentX = 1.00;
        crashPoint = (0.98 / (1 - Math.random())).toFixed(2);
        if(Math.random() < 0.05) crashPoint = 1.00; // Моментальний краш

        document.getElementById('actBtn').innerText = "ЗАБРАТИ";
        document.getElementById('actBtn').classList.add('withdraw');

        gameLoop = setInterval(() => {
            currentX += 0.01 + (currentX * 0.004);
            document.getElementById('mult').innerText = currentX.toFixed(2) + 'x';
            
            // Рух ракети
            const move = (currentX - 1) * 35;
            document.getElementById('rocket').style.transform = `translate(${move}px, -${move}px)`;

            if(currentX >= crashPoint) crash();
        }, 100);
    }

    function crash() {
        clearInterval(gameLoop);
        isCrashed = true;
        tg.HapticFeedback.notificationOccurred('error');
        document.getElementById('mult').style.color = "#f56565";
        document.getElementById('mult').innerText = "💥 " + currentX.toFixed(2) + "x";
        
        const h = document.getElementById('hBar');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = currentX.toFixed(2) + 'x';
        item.style.color = currentX >= 2 ? '#48bb78' : '#f56565';
        h.prepend(item);

        setTimeout(reset, 3000);
    }

    function reset() {
        isPlaying = false;
        document.getElementById('mult').innerText = "1.00x";
        document.getElementById('mult').style.color = "white";
        document.getElementById('rocket').style.transform = "translate(0,0)";
        document.getElementById('actBtn').innerText = "ПОСТАВИТИ";
        document.getElementById('actBtn').classList.remove('withdraw');
        document.getElementById('actBtn').disabled = false;
    }

    document.getElementById('actBtn').onclick = function() {
        if(!isPlaying) {
            startRound();
        } else {
            // Гравець забирає
            const bet = parseFloat(document.getElementById('betVal').value);
            const win = bet * currentX;
            balance += win;
            document.getElementById('uBal').innerText = balance.toFixed(2);
            tg.showAlert(`Ви виграли ${win.toFixed(2)} ⭐️!`);
            tg.HapticFeedback.notificationOccurred('success');
            this.disabled = true;
            this.innerText = "ЧЕКАЄМО КРАШУ...";
        }
    }
</script>
</body>
</html>
