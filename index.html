
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Crash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #0e1219;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0e1219;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #1e2630;
        }
        
        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
        }
        
        .balance-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #0e1219;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #31465c;
            cursor: pointer;
        }
        
        .balance-value {
            font-weight: 600;
            font-size: 13px;
            color: #f0b90b;
        }
        
        .balance-icon {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #0e1219;
        }

        .close-btn {
            color: #8e9fb1;
            font-size: 18px;
            cursor: pointer;
        }

        .history-stats {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #1e2630;
        }
        
        .history-title {
            color: #6b7f98;
            font-size: 13px;
        }
        
        .history-multipliers {
            display: flex;
            gap: 8px;
        }
        
        .history-multiplier-item {
            background: #1e2630;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #b3c6e2;
        }

        .horizontal-history {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            overflow-x: auto;
            border-bottom: 1px solid #1e2630;
        }
        
        .history-chip {
            background: #1e2630;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #b3c6e2;
            white-space: nowrap;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #0d1117;
            background-image: linear-gradient(#1a202c 1px, transparent 1px),
                              linear-gradient(90deg, #1a202c 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
        }

        .multiplier-container {
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 1px solid rgba(240,185,11,0.3);
        }
        
        .multiplier-display {
            font-size: 72px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 40px rgba(240,185,11,0.6);
        }

        .rocket-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            filter: drop-shadow(0 0 20px #4299e1);
            transition: transform 0.05s;
        }
        
        .rocket-svg {
            width: 70px;
            height: 70px;
        }
        
        .rocket-crashed {
            filter: drop-shadow(0 0 20px #fc8181);
        }
        
        .flame {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 30px;
            background: linear-gradient(to bottom, #ffaa00, #ff5500);
            border-radius: 50% 50% 30% 30%;
            animation: flameFlicker 0.1s infinite alternate;
            filter: blur(2px);
        }
        
        @keyframes flameFlicker {
            0% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
            100% { opacity: 1; transform: translateX(-50%) scaleY(1.3); }
        }

        .potential-win {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #68d391;
            border: 1px solid #68d391;
            z-index: 30;
        }

        .bet-area {
            padding: 16px;
            background: #0e1219;
            border-top: 1px solid #1e2630;
        }

        .info-text {
            text-align: center;
            color: #6b7f98;
            font-size: 11px;
            margin-bottom: 12px;
        }

        .bet-buttons {
            display: flex;
            gap: 12px;
        }
        
        .bet-action-btn {
            flex: 1;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border: none;
            color: #0e1219;
            font-weight: 700;
            font-size: 16px;
            padding: 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .bet-action-btn.secondary {
            background: #1e2630;
            color: #b3c6e2;
        }
        
        .bet-action-btn.withdraw {
            background: linear-gradient(135deg, #f687b3, #ed64a6);
            color: #fff;
        }

        .bet-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .bet-panel {
            background: #1a232f;
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #31465c;
        }
        
        .bet-panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #f0b90b;
            margin-bottom: 20px;
        }
        
        .bet-input-container {
            background: #0e1219;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #31465c;
        }
        
        .bet-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .bet-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            outline: none;
        }
        
        .bet-max-btn {
            background: #1e2630;
            border: 1px solid #f0b90b;
            color: #f0b90b;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .bet-quick-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .quick-bet-btn {
            background: #0e1219;
            border: 1px solid #31465c;
            color: #b3c6e2;
            padding: 12px 0;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .auto-withdraw {
            background: #0e1219;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #31465c;
        }
        
        .auto-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .auto-btn {
            background: #0e1219;
            border: 1px solid #31465c;
            color: #b3c6e2;
            padding: 8px 0;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .auto-btn.active {
            background: #f0b90b;
            color: #0e1219;
            border-color: #f0b90b;
        }
        
        .place-bet-btn {
            width: 100%;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border: none;
            color: #0e1219;
            font-weight: 700;
            font-size: 16px;
            padding: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }

        .players-list {
            margin-top: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a232f;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 4px;
        }
        
        .player-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-avatar-small {
            width: 24px;
            height: 24px;
            background: #2a3440;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .player-name {
            font-weight: 600;
            font-size: 12px;
        }
        
        .player-bet {
            color: #f0b90b;
            font-size: 11px;
            margin-right: 8px;
        }
        
        .player-multiplier {
            background: #253040;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 10px;
            color: #b3c6e2;
        }

        .deposit-panel {
            background: #1a232f;
            border-radius: 24px;
            padding: 20px;
            margin: 16px;
            border: 1px solid #31465c;
        }
        
        .deposit-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f0b90b;
            text-align: center;
        }
        
        .balance-info {
            background: #0e1219;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        
        .balance-info-value {
            font-size: 20px;
            font-weight: 700;
            color: #f0b90b;
        }
        
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr; /* Тільки один метод */
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .payment-method {
            background: #0e1219;
            border: 2px solid #f0b90b;
            border-radius: 12px;
            padding: 15px 0;
            text-align: center;
            cursor: pointer;
        }
        
        .payment-method i {
            font-size: 24px;
            color: #f0b90b;
            margin-right: 8px;
        }
        
        .payment-method span {
            font-size: 16px;
            color: #f0b90b;
            font-weight: 600;
        }
        
        .custom-amount {
            background: #0e1219;
            border: 1px solid #31465c;
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
        }
        
        .custom-amount input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            outline: none;
            text-align: center;
        }
        
        .bonus-info {
            background: rgba(240,185,11,0.1);
            border: 1px solid #f0b90b;
            border-radius: 12px;
            padding: 10px;
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bonus-value {
            background: #f0b90b;
            color: #0e1219;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
        }
        
        .deposit-buttons {
            display: flex;
            gap: 12px;
        }
        
        .deposit-btn {
            flex: 1;
            padding: 14px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
        
        .cancel-btn {
            background: #2a3440;
            color: #b3c6e2;
        }
        
        .pay-btn {
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            color: #0e1219;
        }

        .navbar {
            display: flex;
            background: #0e1219;
            border-top: 1px solid #1e2630;
            padding: 4px 0;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #6b7f98;
            font-size: 10px;
            padding: 8px 0;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #f0b90b;
        }
        
        .nav-icon {
            font-size: 18px;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        
        .screen.active {
            display: flex;
        }

        .hidden {
            display: none !important;
        }

        .stats-panel {
            background: #1a232f;
            border-radius: 12px;
            padding: 16px;
            margin: 16px;
        }
        
        .stats-title {
            color: #f0b90b;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #b3c6e2;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="userAvatar">👤</div>
            <div class="user-info">
                <div class="user-name" id="userName">Гравець</div>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <div class="balance-block" id="balanceBlock">
                <span class="balance-value" id="balanceValue">100</span>
                <div class="balance-icon">⭐</div>
            </div>
            <div class="close-btn" id="closeBtn">✕</div>
        </div>
    </div>

    <div id="crashScreen" class="screen active">
        <div class="history-stats">
            <span class="history-title">Історія ставок</span>
            <div class="history-multipliers" id="historyMultipliers"></div>
        </div>

        <div class="horizontal-history" id="historyBar"></div>

        <div class="game-area" id="gameArea">
            <div class="rocket-container" id="rocketContainer">
                <div class="rocket-svg">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L9.5 7L4.5 9.5L9.5 12L12 17L14.5 12L19.5 9.5L14.5 7L12 2Z" fill="#63B3ED"/>
                    </svg>
                </div>
                <div class="flame"></div>
            </div>
            <div class="multiplier-container">
                <div class="multiplier-display" id="multiplier">1.00x</div>
            </div>
            <div class="potential-win hidden" id="potentialWin">💰 0 ⭐</div>
        </div>

        <div class="bet-area">
            <div class="info-text" id="roundStatus">СТАВКИ НА НАСТУПНИЙ РАУНД</div>
            <div class="bet-buttons">
                <button class="bet-action-btn secondary" id="showBetPanelBtn">⭐ Ставка</button>
                <button class="bet-action-btn" id="quickBetBtn">⚡ Швидка</button>
                <button class="bet-action-btn withdraw hidden" id="withdrawBtn">💰 ЗАБРАТИ</button>
            </div>
            <div class="players-list" id="playersList"></div>
        </div>
    </div>

    <div id="depositScreen" class="screen">
        <div class="deposit-panel">
            <div class="deposit-title">Поповнення зірками</div>
            <div class="balance-info">
                <span>Ваш баланс:</span>
                <span class="balance-info-value" id="currentBalanceDisplay">100 ⭐</span>
            </div>
            
            <div class="payment-methods">
                <div class="payment-method active">
                    <i class="fa-solid fa-star"></i>
                    <span>Telegram Stars</span>
                </div>
            </div>

            <div class="bonus-info">
                <span>🎁 Бонус +10%</span>
                <span class="bonus-value" id="bonusValue">+0.1</span>
            </div>

            <div class="custom-amount">
                <input type="number" id="depositAmount" min="1" value="1" step="1">
            </div>

            <div class="deposit-buttons">
                <button class="deposit-btn cancel-btn" id="cancelDeposit">Скасувати</button>
                <button class="deposit-btn pay-btn" id="payBtn">Поповнити</button>
            </div>
        </div>
    </div>

    <div id="statsScreen" class="screen">
        <div class="stats-panel">
            <div class="stats-title">📊 Статистика гравців</div>
            <div id="playersStats"></div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" data-screen="crash">🎮 Гра</div>
        <div class="nav-item" data-screen="stats">📊 Статистика</div>
        <div class="nav-item" data-screen="deposit">⭐ Поповнити</div>
    </div>
</div>

<script>
    // ========== СИСТЕМА ЗБЕРЕЖЕННЯ ==========
    const STORAGE_KEY = 'crash_game_data';
    
    // Дані гравця
    let playerData = {
        userId: 'anon_' + Math.random().toString(36).substr(2, 9),
        userName: 'Гравець',
        balance: 100, // Стартовий баланс в зірках
        totalWins: 0,
        totalBets: 0,
        biggestWin: 0,
        gamesPlayed: 0
    };
    
    // Всі гравці (топ)
    let allPlayers = [];
    
    // Завантажуємо дані
    function loadData() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                playerData = data.playerData || playerData;
                allPlayers = data.allPlayers || [];
            }
        } catch (e) {
            console.log('Помилка завантаження:', e);
        }
    }
    
    // Зберігаємо дані
    function saveData() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                playerData: playerData,
                allPlayers: allPlayers
            }));
        } catch (e) {
            console.log('Помилка збереження:', e);
        }
    }
    
    // Оновлюємо статистику гравця
    function updatePlayerStats(bet, win) {
        playerData.totalBets += bet;
        if (win > 0) {
            playerData.totalWins += win;
            if (win > playerData.biggestWin) {
                playerData.biggestWin = win;
            }
        }
        playerData.gamesPlayed++;
        saveData();
        updatePlayersList();
    }
    
    // Додаємо гравця до загального списку
    function addToAllPlayers(name, win, bet) {
        const existing = allPlayers.find(p => p.name === name);
        if (existing) {
            existing.totalWins += win;
            existing.totalBets += bet;
            existing.biggestWin = Math.max(existing.biggestWin, win);
        } else {
            allPlayers.push({
                name: name,
                totalWins: win,
                totalBets: bet,
                biggestWin: win,
                avatar: name.charAt(0)
            });
        }
        // Сортуємо за виграшем
        allPlayers.sort((a, b) => b.totalWins - a.totalWins);
        // Залишаємо топ-10
        allPlayers = allPlayers.slice(0, 10);
        saveData();
    }
    
    // Ініціалізація Telegram
    let tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
        if (tg.initDataUnsafe?.user) {
            const user = tg.initDataUnsafe.user;
            playerData.userId = user.id;
            playerData.userName = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userName').textContent = playerData.userName;
            document.getElementById('userAvatar').textContent = user.first_name.charAt(0);
        }
    } else {
        // Демо-режим
        tg = {
            showAlert: alert,
            HapticFeedback: { impactOccurred: () => {}, notificationOccurred: () => {} },
            openInvoice: (url, cb) => { alert('Демо: оплата ' + url); cb('paid'); },
            close: () => {}
        };
    }
    
    loadData();
    updateBalanceDisplay();
    
    // Гра
    let currentMultiplier = 1.00;
    let gameActive = true;
    let isCrashed = false;
    let gameLoop = null;
    let rocketPos = 0;
    let currentBet = 0;
    let isPlaying = false;
    let autoWithdrawMultiplier = null;
    
    // Елементи
    const balanceSpan = document.getElementById('balanceValue');
    const currentBalanceDisplay = document.getElementById('currentBalanceDisplay');
    const multiplierEl = document.getElementById('multiplier');
    const playersList = document.getElementById('playersList');
    const rocketContainer = document.getElementById('rocketContainer');
    const potentialWin = document.getElementById('potentialWin');
    const roundStatus = document.getElementById('roundStatus');
    const showBetPanelBtn = document.getElementById('showBetPanelBtn');
    const quickBetBtn = document.getElementById('quickBetBtn');
    const withdrawBtn = document.getElementById('withdrawBtn');
    const balanceBlock = document.getElementById('balanceBlock');
    const closeBtn = document.getElementById('closeBtn');
    const navItems = document.querySelectorAll('.nav-item');
    const screens = {
        crash: document.getElementById('crashScreen'),
        deposit: document.getElementById('depositScreen'),
        stats: document.getElementById('statsScreen')
    };
    
    // Історія множників
    let historyMultipliers = ['2.19', '2.11', '1.47', '1.77'];
    let historyBar = ['6.98', '2.38', '1.20', '3.03', '4.54'];
    
    function updateDisplay() {
        balanceSpan.textContent = playerData.balance;
        if (currentBalanceDisplay) {
            currentBalanceDisplay.textContent = playerData.balance + ' ⭐';
        }
        
        // Оновлюємо історію
        const historyDiv = document.getElementById('historyMultipliers');
        historyDiv.innerHTML = historyMultipliers.map(m => 
            `<span class="history-multiplier-item">x${m}</span>`
        ).join('');
        
        const barDiv = document.getElementById('historyBar');
        barDiv.innerHTML = historyBar.map(m => 
            `<span class="history-chip">x${m}</span>`
        ).join('');
    }
    
    function updateBalanceDisplay() {
        updateDisplay();
    }
    
    function renderPlayers() {
        const demoPlayers = [
            { name: 'Гравець 1', bet: 3.26, multiplier: currentMultiplier, avatar: '1' },
            { name: 'Гравець 2', bet: 1.00, multiplier: currentMultiplier, avatar: '2' },
            { name: 'Гравець 3', bet: 0.25, multiplier: currentMultiplier, avatar: '3' }
        ];
        
        playersList.innerHTML = demoPlayers.map(p => `
            <div class="player-row">
                <div class="player-left">
                    <div class="player-avatar-small">${p.avatar}</div>
                    <span class="player-name">${p.name}</span>
                </div>
                <div>
                    <span class="player-bet">${p.bet} ⭐</span>
                    <span class="player-multiplier">x${p.multiplier.toFixed(2)}</span>
                </div>
            </div>
        `).join('');
    }
    
    function updatePlayersList() {
        const statsDiv = document.getElementById('playersStats');
        if (statsDiv) {
            statsDiv.innerHTML = allPlayers.map((p, i) => `
                <div class="stat-item">
                    <span>${i+1}. ${p.name}</span>
                    <span>🏆 ${p.totalWins} ⭐</span>
                </div>
            `).join('');
        }
    }
    
    function crash() {
        isCrashed = true;
        gameActive = false;
        
        historyBar.unshift(currentMultiplier.toFixed(2));
        if (historyBar.length > 8) historyBar.pop();
        historyMultipliers.unshift(currentMultiplier.toFixed(2));
        if (historyMultipliers.length > 4) historyMultipliers.pop();
        
        multiplierEl.style.color = '#fc8181';
        multiplierEl.textContent = '💥 ' + currentMultiplier.toFixed(2) + 'x';
        rocketContainer.classList.add('rocket-crashed');
        potentialWin.classList.add('hidden');
        
        if (isPlaying) {
            roundStatus.textContent = 'РАКЕТА ВПАЛА. НОВИЙ РАУНД...';
            isPlaying = false;
            showBetPanelBtn.classList.remove('hidden');
            quickBetBtn.classList.remove('hidden');
            withdrawBtn.classList.add('hidden');
        }
        
        updateDisplay();
        setTimeout(startNewRound, 3000);
    }
    
    function startNewRound() {
        isCrashed = false;
        gameActive = true;
        currentMultiplier = 1.00;
        rocketPos = 0;
        
        multiplierEl.style.color = '#fff';
        multiplierEl.textContent = '1.00x';
        rocketContainer.classList.remove('rocket-crashed');
        rocketContainer.style.transform = 'translate(0, 0) rotate(0deg)';
        roundStatus.textContent = 'СТАВКИ НА НАСТУПНИЙ РАУНД';
        renderPlayers();
    }
    
    function switchScreen(screenId) {
        Object.values(screens).forEach(s => s?.classList.remove('active'));
        if (screens[screenId]) screens[screenId].classList.add('active');
        navItems.forEach(item => {
            item.classList.toggle('active', item.dataset.screen === screenId);
        });
    }
    
    async function payWithStars(amount) {
        try {
            tg.HapticFeedback?.impactOccurred('medium');
            
            const SERVER_URL = "http://localhost:8001";
            
            const response = await fetch(`${SERVER_URL}/api/create-invoice`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: playerData.userId,
                    amount: amount
                })
            });
            
            const data = await response.json();
            
            if (data.success && data.link) {
                tg.openInvoice(data.link, (status) => {
                    if (status === 'paid') {
                        const bonus = Math.floor(amount * 0.1);
                        playerData.balance += amount + bonus;
                        updateBalanceDisplay();
                        saveData();
                        
                        tg.HapticFeedback?.notificationOccurred('success');
                        tg.showAlert(`✅ +${amount + bonus} ⭐`);
                        switchScreen('crash');
                    }
                });
            } else {
                tg.showAlert('❌ Помилка: ' + (data.message || 'невідома'));
            }
        } catch (error) {
            tg.showAlert('❌ Помилка з\'єднання з сервером');
        }
    }
    
    // Обробники подій
    showBetPanelBtn.addEventListener('click', () => {
        document.getElementById('betPanelOverlay')?.classList.remove('hidden');
    });
    
    document.getElementById('closeBetPanel')?.addEventListener('click', () => {
        document.getElementById('betPanelOverlay')?.classList.add('hidden');
    });
    
    document.getElementById('maxBetBtn')?.addEventListener('click', () => {
        document.getElementById('betAmount').value = playerData.balance;
    });
    
    document.querySelectorAll('.quick-bet-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const add = parseFloat(btn.dataset.add);
            const input = document.getElementById('betAmount');
            input.value = (parseFloat(input.value) || 0) + add;
        });
    });
    
    document.querySelectorAll('.auto-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.auto-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            autoWithdrawMultiplier = parseFloat(btn.dataset.mult);
        });
    });
    
    document.getElementById('autoOffBtn')?.addEventListener('click', () => {
        document.querySelectorAll('.auto-btn').forEach(b => b.classList.remove('active'));
        autoWithdrawMultiplier = null;
    });
    
    document.getElementById('confirmBetBtn')?.addEventListener('click', () => {
        const bet = parseFloat(document.getElementById('betAmount').value) || 0.1;
        if (playerData.balance < bet) {
            tg.showAlert('❌ Недостатньо ⭐');
            return;
        }
        
        currentBet = bet;
        playerData.balance -= bet;
        isPlaying = true;
        
        updateBalanceDisplay();
        potentialWin.classList.remove('hidden');
        document.getElementById('betPanelOverlay').classList.add('hidden');
        showBetPanelBtn.classList.add('hidden');
        quickBetBtn.classList.add('hidden');
        withdrawBtn.classList.remove('hidden');
        
        tg.HapticFeedback?.impactOccurred('medium');
        saveData();
    });
    
    quickBetBtn.addEventListener('click', () => {
        if (!gameActive || isCrashed || playerData.balance < 1) {
            tg.showAlert('❌ Недостатньо ⭐');
            return;
        }
        
        currentBet = 1;
        playerData.balance -= 1;
        isPlaying = true;
        
        updateBalanceDisplay();
        potentialWin.classList.remove('hidden');
        showBetPanelBtn.classList.add('hidden');
        quickBetBtn.classList.add('hidden');
        withdrawBtn.classList.remove('hidden');
        
        tg.HapticFeedback?.impactOccurred('medium');
        saveData();
    });
    
    withdrawBtn.addEventListener('click', () => {
        if (!isPlaying || !gameActive || isCrashed) return;
        
        const win = Math.floor(currentBet * currentMultiplier);
        playerData.balance += win;
        isPlaying = false;
        
        updateBalanceDisplay();
        updatePlayerStats(currentBet, win);
        addToAllPlayers(playerData.userName, win, currentBet);
        
        potentialWin.classList.add('hidden');
        withdrawBtn.classList.add('hidden');
        showBetPanelBtn.classList.remove('hidden');
        quickBetBtn.classList.remove('hidden');
        
        tg.HapticFeedback?.notificationOccurred('success');
        tg.showAlert(`✅ Виграш: ${win} ⭐`);
        saveData();
    });
    
    // Навігація
    navItems.forEach(item => {
        item.addEventListener('click', () => {
            switchScreen(item.dataset.screen);
        });
    });
    
    balanceBlock.addEventListener('click', () => {
        switchScreen('deposit');
    });
    
    closeBtn.addEventListener('click', () => {
        tg.close();
    });
    
    document.getElementById('cancelDeposit').addEventListener('click', () => {
        switchScreen('crash');
    });
    
    document.getElementById('payBtn').addEventListener('click', () => {
        const amount = parseInt(document.getElementById('depositAmount').value) || 1;
        if (amount < 1) {
            tg.showAlert('❌ Мінімальна сума: 1 ⭐');
            return;
        }
        payWithStars(amount);
    });
    
    // Ігровий цикл
    function gameTick() {
        if (!gameActive || isCrashed) return;
        
        if (Math.random() < 0.015 && currentMultiplier > 1.3) {
            crash();
            return;
        }
        
        currentMultiplier += 0.008 + (currentMultiplier * 0.0015);
        multiplierEl.textContent = currentMultiplier.toFixed(2) + 'x';
        
        rocketPos += 0.8;
        const gameArea = document.getElementById('gameArea');
        const maxWidth = gameArea.clientWidth - 90;
        const maxHeight = gameArea.clientHeight - 90;
        
        const x = Math.min(rocketPos * 2.5, maxWidth);
        const y = Math.max(30, maxHeight - rocketPos * 1.8);
        rocketContainer.style.transform = `translate(${x}px, ${y}px) rotate(${15 + rocketPos * 0.3}deg)`;
        
        if (autoWithdrawMultiplier && currentMultiplier >= autoWithdrawMultiplier && isPlaying) {
            const win = Math.floor(currentBet * currentMultiplier);
            playerData.balance += win;
            isPlaying = false;
            updateBalanceDisplay();
            updatePlayerStats(currentBet, win);
            addToAllPlayers(playerData.userName, win, currentBet);
            
            potentialWin.classList.add('hidden');
            withdrawBtn.classList.add('hidden');
            showBetPanelBtn.classList.remove('hidden');
            quickBetBtn.classList.remove('hidden');
            
            tg.showAlert(`✅ Автовивід: ${win} ⭐`);
            autoWithdrawMultiplier = null;
            saveData();
        }
        
        if (isPlaying) {
            potentialWin.textContent = `💰 ${Math.floor(currentBet * currentMultiplier)} ⭐`;
        }
        
        renderPlayers();
    }
    
    // Старт
    startNewRound();
    gameLoop = setInterval(gameTick, 50);
    renderPlayers();
    updateDisplay();
    updatePlayersList();
</script>
</body>
</html>
