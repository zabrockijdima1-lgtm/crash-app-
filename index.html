<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #0e1219;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0e1219;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background-color: #0e1219;
            border-bottom: 1px solid #1e2630;
        }
        
        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
        }
        
        .user-level {
            font-size: 10px;
            color: #6b7f98;
        }
        
        .balance-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #0e1219;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #31465c;
        }
        
        .balance-value {
            font-weight: 600;
            font-size: 13px;
            color: #f0b90b;
        }
        
        .balance-icon {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #0e1219;
        }

        /* Закрити кнопка */
        .close-btn {
            color: #8e9fb1;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        /* Історія ставок (вертикальна) */
        .history-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #1e2630;
        }
        
        .history-title {
            color: #6b7f98;
            font-size: 13px;
            font-weight: 500;
        }
        
        .history-multipliers {
            display: flex;
            gap: 12px;
        }
        
        .history-multiplier-item {
            color: #b3c6e2;
            font-size: 13px;
            font-weight: 600;
        }

        /* Горизонтальна історія */
        .horizontal-history {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            border-bottom: 1px solid #1e2630;
        }
        
        .horizontal-history::-webkit-scrollbar {
            display: none;
        }
        
        .history-chip {
            background-color: #1e2630;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            color: #b3c6e2;
            white-space: nowrap;
        }

        /* Основний ігровий екран */
        .game-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }

        /* Множник */
        .multiplier-section {
            text-align: center;
            margin: 10px 0 20px 0;
        }
        
        .multiplier {
            font-size: 72px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            line-height: 1;
        }

        /* Інформаційний текст */
        .info-text {
            text-align: center;
            color: #6b7f98;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 16px 0;
        }

        /* Кнопки ставок */
        .bet-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .bet-action-btn {
            flex: 1;
            background: linear-gradient(135deg, #f0b90b, #d4a50a);
            border: none;
            color: #0e1219;
            font-weight: 700;
            font-size: 16px;
            padding: 16px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
        }
        
        .bet-action-btn.secondary {
            background: #1e2630;
            color: #b3c6e2;
        }

        /* Список гравців */
        .players-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a232f;
            border-radius: 12px;
            padding: 12px 16px;
        }
        
        .player-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-avatar-small {
            width: 32px;
            height: 32px;
            background: linear-gradient(145deg, #2a3440, #1a222c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #8e9fb1;
            border: 1px solid #31465c;
        }
        
        .player-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .player-bet {
            color: #f0b90b;
            font-size: 13px;
            margin-right: 12px;
        }
        
        .player-multiplier {
            background-color: #253040;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #b3c6e2;
        }

        /* Navbar */
        .navbar {
            display: flex;
            background-color: #0e1219;
            border-top: 1px solid #1e2630;
            padding: 4px 0;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: #6b7f98;
            font-size: 10px;
            padding: 8px 0;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #f0b90b;
        }
        
        .nav-icon {
            font-size: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="userAvatar">Д</div>
            <div class="user-info">
                <div class="user-name" id="userName">Діма | BIO</div>
                <div class="user-level">Level 1</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="balance-block">
                <span class="balance-value" id="balanceValue">0.02</span>
                <div class="balance-icon">⭐</div>
            </div>
            <div class="close-btn">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
    </div>

    <!-- Історія ставок (вертикальна) -->
    <div class="history-stats">
        <span class="history-title">История ставок</span>
        <div class="history-multipliers">
            <span class="history-multiplier-item">1.8x</span>
            <span class="history-multiplier-item">1.6x</span>
            <span class="history-multiplier-item">1.4x</span>
            <span class="history-multiplier-item">1.2x</span>
        </div>
    </div>

    <!-- Горизонтальна історія -->
    <div class="horizontal-history" id="historyBar">
        <span class="history-chip">x1.65</span>
        <span class="history-chip">x28.29</span>
        <span class="history-chip">x10.19</span>
        <span class="history-chip">x4.25</span>
        <span class="history-chip">x2.04</span>
        <span class="history-chip">x1.29</span>
    </div>

    <!-- Crash екран -->
    <div class="game-screen" id="mainContent">
        <div class="multiplier-section">
            <div class="multiplier" id="multiplier">1.65x</div>
        </div>

        <!-- Інформаційний текст -->
        <div class="info-text">ВИ МОЖЕТЕ ПОСТАВИТИ СТАВКУ НА НАСТУПНИЙ РАУНД</div>

        <!-- Кнопки ставок -->
        <div class="bet-buttons">
            <button class="bet-action-btn secondary" id="showBetPanelBtn">Ставка</button>
            <button class="bet-action-btn" id="placeBetBtn">Ставка</button>
        </div>

        <!-- Список гравців -->
        <div class="players-list" id="playersList">
            <!-- Динамічно додаються гравці -->
        </div>
    </div>

    <!-- Navbar -->
    <div class="navbar">
        <div class="nav-item" data-screen="inventory">
            <i class="fa-regular fa-rectangle-list nav-icon"></i>
            <span>Інвентар</span>
        </div>
        <div class="nav-item" data-screen="craft">
            <i class="fa-solid fa-hammer nav-icon"></i>
            <span>Крафт</span>
        </div>
        <div class="nav-item active" data-screen="crash">
            <i class="fa-solid fa-rocket nav-icon"></i>
            <span>Краш</span>
        </div>
        <div class="nav-item" data-screen="cases">
            <i class="fa-regular fa-gem nav-icon"></i>
            <span>Кейси</span>
        </div>
        <div class="nav-item" data-screen="profile">
            <i class="fa-regular fa-user nav-icon"></i>
            <span>Профіль</span>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Дані користувача
    let balance = 0.02;
    let currentScreen = 'crash';

    // Елементи
    const balanceSpan = document.getElementById('balanceValue');
    const multiplierEl = document.getElementById('multiplier');
    const playersList = document.getElementById('playersList');
    const navItems = document.querySelectorAll('.nav-item');
    const placeBetBtn = document.getElementById('placeBetBtn');
    const showBetPanelBtn = document.getElementById('showBetPanelBtn');

    // Дані гравців (як на фото)
    const players = [
        { name: 'МАТРОС', bet: 0.11, multiplier: 1.65, avatar: 'М' },
        { name: 'MANIAC | БЫКОВ', bet: 0.10, multiplier: 1.65, avatar: 'M' },
        { name: 'Pudgik', bet: 0.10, multiplier: 1.65, avatar: 'P' },
        { name: 'Alex', bet: 0.25, multiplier: 1.65, avatar: 'A' },
        { name: 'CryptoKing', bet: 0.50, multiplier: 1.65, avatar: 'C' },
        { name: 'MoonBoy', bet: 0.15, multiplier: 1.65, avatar: 'M' },
        { name: 'StarDust', bet: 0.30, multiplier: 1.65, avatar: 'S' },
        { name: 'RocketMan', bet: 0.45, multiplier: 1.65, avatar: 'R' }
    ];

    // Оновлення балансу
    function updateBalance() {
        balanceSpan.textContent = balance.toFixed(2);
    }

    // Відображення списку гравців
    function renderPlayers() {
        playersList.innerHTML = players.map(player => `
            <div class="player-row">
                <div class="player-left">
                    <div class="player-avatar-small">${player.avatar}</div>
                    <span class="player-name">${player.name}</span>
                </div>
                <div style="display: flex; align-items: center;">
                    <span class="player-bet">${player.bet.toFixed(2)} TON</span>
                    <span class="player-multiplier">x${player.multiplier.toFixed(2)}</span>
                </div>
            </div>
        `).join('');
    }

    // Telegram дані
    if (tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
        document.getElementById('userAvatar').textContent = user.first_name.charAt(0).toUpperCase();
    }

    // Поставити ставку
    placeBetBtn.addEventListener('click', () => {
        tg.HapticFeedback.impactOccurred('medium');
        tg.showAlert('⚡ Ставка прийнята!');
    });

    showBetPanelBtn.addEventListener('click', () => {
        tg.HapticFeedback.selectionChanged();
        tg.showAlert('⚡ Виберіть суму ставки');
    });

    // Навігація
    navItems.forEach(item => {
        item.addEventListener('click', () => {
            const screen = item.dataset.screen;
            tg.HapticFeedback.selectionChanged();
            
            navItems.forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            
            if (screen === 'crash') {
                // Вже на краш екрані
                tg.showAlert('Краш');
            } else if (screen === 'inventory') {
                tg.showAlert('Інвентар');
            } else if (screen === 'craft') {
                tg.showAlert('Крафт');
            } else if (screen === 'cases') {
                tg.showAlert('Кейси');
            } else if (screen === 'profile') {
                tg.showAlert('Профіль');
            }
        });
    });

    // Клік на баланс
    document.querySelector('.balance-block').addEventListener('click', () => {
        tg.showAlert('Поповнення балансу');
    });

    // Симуляція росту множника
    let multiplier = 1.65;
    let gameActive = true;
    
    setInterval(() => {
        if (gameActive && currentScreen === 'crash') {
            // Випадковий краш
            if (Math.random() > 0.98) {
                multiplier = 1.00;
                // Вібрація при краші
                tg.HapticFeedback.notificationOccurred('error');
            } else {
                multiplier += 0.01 + (multiplier * 0.001);
            }
            multiplierEl.textContent = multiplier.toFixed(2) + 'x';
        }
    }, 100);

    // Оновлення множників гравців (для демо)
    setInterval(() => {
        if (gameActive) {
            players.forEach(p => {
                p.multiplier = multiplier;
            });
            renderPlayers();
        }
    }, 200);

    // Початковий рендер
    renderPlayers();
    updateBalance();
</script>
</body>
</html>
