<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Full App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #1a202c; --accent: #4299e1; --text: #fff; --gray: #a0aec0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Контейнер додатку */
        .app { height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* Шапка */
        .header { display: flex; justify-content: space-between; padding: 15px; background: var(--card); border-bottom: 1px solid #2d3748; }
        .user { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: #4a5568; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .balance { background: #000; padding: 5px 12px; border-radius: 10px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; cursor: pointer; }

        /* Екрани */
        .screen { flex-grow: 1; display: none; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: block; }

        /* Екран ГРИ */
        .game-zone { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1a202c 0%, #0b0e14 100%); position: relative; }
        #mult { font-size: 3.5rem; font-weight: 800; z-index: 10; }
        .rocket-anim { font-size: 50px; position: absolute; transition: all 0.1s; filter: drop-shadow(0 0 15px var(--accent)); }

        /* Блок ставок */
        .bet-box { padding: 20px; background: var(--card); border-radius: 20px 20px 0 0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; background: #0b0e14; border: 1px solid #2d3748; color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; background: var(--accent); color: #fff; }
        .btn-withdraw { background: #ed8936; }

        /* Екран РЕФЕРАЛІВ */
        .ref-card { background: var(--card); margin: 15px; padding: 20px; border-radius: 15px; text-align: center; }
        .ref-link { background: #000; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 0.9rem; color: var(--accent); word-break: break-all; }

        /* Навігація */
        .nav { position: absolute; bottom: 0; width: 100%; display: flex; background: var(--card); border-top: 1px solid #2d3748; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }

        .history-row { display: flex; gap: 5px; padding: 10px; overflow-x: auto; background: var(--bg); }
        .h-item { font-size: 0.7rem; padding: 3px 7px; border-radius: 5px; background: #2d3748; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="user">
            <div class="avatar" id="av">?</div>
            <div style="font-size: 0.9rem;" id="name">Завантаження...</div>
        </div>
        <div class="balance" onclick="showDeposit()">⭐️ <span id="bal">100</span></div>
    </div>

    <div id="screen-game" class="screen active">
        <div class="history-row" id="history"></div>
        <div class="game-zone">
            <div class="rocket-anim" id="rock">🚀</div>
            <div id="mult">1.00x</div>
        </div>
        <div class="bet-box">
            <div class="input-group">
                <input type="number" id="betAmount" value="10" min="1">
                <button style="background: #2d3748; border: none; color: #fff; padding: 0 15px; border-radius: 10px;" onclick="multiplyBet(2)">x2</button>
            </div>
            <button id="mainBtn" class="btn-main" onclick="handleAction()">ПОСТАВИТИ СТАВКУ</button>
        </div>
    </div>

    <div id="screen-ref" class="screen">
        <div class="ref-card">
            <h2>Реферальна система</h2>
            <p style="color: var(--gray); margin-top: 10px;">Запрошуй друзів та отримуй 10% від їхніх поповнень!</p>
            <div class="ref-link" id="refLink">t.me/StonksGiftBot?start=12345</div>
            <button class="btn-main" onclick="copyRef()">КОПІЮВАТИ ПОСИЛАННЯ</button>
        </div>
        <div style="padding: 20px;">
            <h3>Твої реферали: <span id="refCount">0</span></h3>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <div class="ref-card">
            <h3>Поповнити баланс</h3>
            <p style="margin: 10px 0; font-size: 0.9rem;">1 ⭐️ = 1 ігрова монета</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-main" onclick="deposit(50)">50 ⭐️</button>
                <button class="btn-main" onclick="deposit(100)">100 ⭐️</button>
                <button class="btn-main" onclick="deposit(500)">500 ⭐️</button>
                <button class="btn-main" onclick="deposit(1000)">1000 ⭐️</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="switchScreen('game', this)"><i class="fa-solid fa-rocket"></i>Краш</div>
        <div class="nav-item" onclick="switchScreen('ref', this)"><i class="fa-solid fa-users"></i>Друзі</div>
        <div class="nav-item" onclick="switchScreen('profile', this)"><i class="fa-solid fa-wallet"></i>Гаманець</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 100;
    let isPlaying = false;
    let currentMult = 1.00;
    let gameInterval;
    let crashAt = 0;

    // Ініціалізація
    if(tg.initDataUnsafe.user) {
        document.getElementById('name').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('av').innerText = tg.initDataUnsafe.user.first_name[0];
        document.getElementById('refLink').innerText = `t.me/StonksGiftBot?start=${tg.initDataUnsafe.user.id}`;
    }

    function switchScreen(screen, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`screen-${screen}`).classList.add('active');
        el.classList.add('active');
    }

    // Логіка гри
    function handleAction() {
        const btn = document.getElementById('mainBtn');
        const bet = parseFloat(document.getElementById('betAmount').value);

        if (!isPlaying) {
            if (balance < bet) return tg.showAlert("Недостатньо зірок!");
            
            balance -= bet;
            updateUI();
            
            isPlaying = true;
            currentMult = 1.00;
            crashAt = (0.98 / (1 - Math.random())).toFixed(2);
            if(Math.random() < 0.05) crashAt = 1.00; // House edge

            btn.innerText = "ЗАБРАТИ";
            btn.className = "btn-main btn-withdraw";
            
            gameInterval = setInterval(() => {
                currentMult += 0.01 + (currentMult * 0.003);
                document.getElementById('mult').innerText = currentMult.toFixed(2) + "x";
                
                if (currentMult >= crashAt) {
                    clearInterval(gameInterval);
                    doCrash();
                }
            }, 100);
        } else {
            // ЗАБРАТИ
            const win = bet * currentMult;
            balance += win;
            tg.HapticFeedback.notificationOccurred('success');
            stopGame(`Ви виграли ${win.toFixed(2)} ⭐️`);
        }
    }

    function doCrash() {
        tg.HapticFeedback.notificationOccurred('error');
        document.getElementById('mult').style.color = "#ff4d4d";
        document.getElementById('rock').innerText = "💥";
        stopGame("КРАШ!");
    }

    function stopGame(msg) {
        clearInterval(gameInterval);
        isPlaying = false;
        const btn = document.getElementById('mainBtn');
        btn.innerText = "ЧЕКАЄМО...";
        btn.disabled = true;

        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "ПОСТАВИТИ СТАВКУ";
            btn.className = "btn-main";
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').style.color = "#fff";
            document.getElementById('rock').innerText = "🚀";
            updateUI();
        }, 3000);
    }

    function updateUI() {
        document.getElementById('bal').innerText = balance.toFixed(2);
    }

    // Рефералка та Донат
    function copyRef() {
        const link = document.getElementById('refLink').innerText;
        navigator.clipboard.writeText(link);
        tg.showAlert("Посилання скопійовано!");
    }

    function deposit(amount) {
        // Відправка команди боту на створення інвойсу
        tg.sendData(JSON.stringify({action: 'deposit', amount: amount}));
        tg.close(); // Закриваємо, щоб користувач побачив інвойс в чаті
    }

    function multiplyBet(n) {
        const input = document.getElementById('betAmount');
        input.value = (parseFloat(input.value) * n).toFixed(0);
    }
</script>
</body>
</html>
