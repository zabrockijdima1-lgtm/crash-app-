<!-- ЗБЕРЕЖІТЬ ЯК index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Crash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1219; color: white; font-family: Arial; margin: 0; padding: 20px; text-align: center; }
        .balance { font-size: 32px; color: gold; margin: 20px; }
        button { background: gold; color: black; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; margin: 10px; cursor: pointer; }
        .game { background: #1a232f; padding: 40px; border-radius: 20px; margin: 20px; }
    </style>
</head>
<body>
    <div class="balance" id="balance">100 ⭐</div>
    
    <div class="game">
        <h1 id="multiplier">1.00x</h1>
        <button onclick="bet()">⭐ ЗРОБИТИ СТАВКУ 10 ⭐</button>
        <button onclick="withdraw()" id="withdrawBtn" style="display:none; background: #f687b3;">💰 ЗАБРАТИ</button>
    </div>
    
    <button onclick="deposit()">➕ ПОПОВНИТИ БАЛАНС</button>

    <script>
        let tg = Telegram.WebApp;
        tg.expand();
        
        let balance = 100;
        let currentBet = 0;
        let multiplier = 1.0;
        let gameActive = false;
        
        function updateDisplay() {
            document.getElementById('balance').textContent = balance + ' ⭐';
        }
        
        function bet() {
            if (balance < 10) {
                tg.showAlert('❌ Недостатньо зірок!');
                return;
            }
            balance -= 10;
            currentBet = 10;
            gameActive = true;
            document.getElementById('withdrawBtn').style.display = 'inline-block';
            updateDisplay();
            startGame();
        }
        
        function withdraw() {
            let win = Math.floor(currentBet * multiplier);
            balance += win;
            gameActive = false;
            document.getElementById('withdrawBtn').style.display = 'none';
            updateDisplay();
            tg.showAlert(`✅ Ви виграли ${win} ⭐!`);
        }
        
        function startGame() {
            multiplier = 1.0;
            let interval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(interval);
                    return;
                }
                multiplier += 0.1;
                document.getElementById('multiplier').textContent = multiplier.toFixed(2) + 'x';
                
                if (Math.random() < 0.1) {
                    clearInterval(interval);
                    document.getElementById('multiplier').textContent = '💥 CRASH';
                    document.getElementById('withdrawBtn').style.display = 'none';
                    gameActive = false;
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }, 500);
        }
        
        function deposit() {
            // ТЕСТОВЕ ПОПОВНЕННЯ - ПРАЦЮЄ ВІДРАЗУ!
            let amount = prompt("Скільки зірок додати?", "10");
            if (amount) {
                let bonus = Math.floor(amount * 0.1);
                balance += parseInt(amount) + bonus;
                updateDisplay();
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert(`✅ +${amount}⭐ +${bonus}⭐ бонус!`);
            }
        }
        
        // Ініціалізація
        updateDisplay();
    </script>
</body>
</html>
