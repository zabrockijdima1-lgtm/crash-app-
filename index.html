<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Pro Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-panel: #151921;
            --accent-blue: #0088cc;
            --accent-gold: #f6ad55;
            --text-gray: #718096;
            --green: #48bb78;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: #fff; overflow: hidden; height: 100vh; }

        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }

        /* HEADER */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: var(--bg-panel); border-bottom: 1px solid #2d3748;
        }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: #2d3748; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .currencies { display: flex; gap: 8px; }
        .balance-item { 
            background: #0b0e14; padding: 6px 10px; border-radius: 12px; border: 1px solid #2d3748;
            display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700;
        }
        .add-btn { color: var(--accent-blue); cursor: pointer; }

        /* GAME AREA */
        .game-view {
            height: 35vh; position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
            background: radial-gradient(circle at center, #1a202c 0%, #0b0e14 100%);
        }
        .multiplier { font-size: 55px; font-weight: 900; z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .rocket { position: absolute; width: 80px; bottom: 15%; left: 10%; z-index: 5; transition: transform 0.1s linear; }

        /* BETTING PANEL */
        .bet-panel { padding: 15px; background: var(--bg-panel); border-radius: 20px 20px 0 0; }
        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-wrapper { flex: 1; background: #0b0e14; border: 1px solid #2d3748; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; }
        .input-wrapper input { background: none; border: none; color: #fff; width: 100%; outline: none; font-weight: bold; }
        
        .main-action-btn { 
            width: 100%; padding: 16px; border-radius: 14px; border: none; 
            font-size: 16px; font-weight: 800; cursor: pointer; color: #fff;
            background: linear-gradient(135deg, #4299e1, #3182ce); transition: 0.2s;
        }
        .main-action-btn.cashout { background: linear-gradient(135deg, #48bb78, #38a169); }
        .main-action-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* LIVE PLAYERS */
        .players-list { flex: 1; background: var(--bg-dark); overflow-y: auto; padding: 15px; border-top: 1px solid #2d3748; }
        .player-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a202c; font-size: 13px; }
        .p-name { color: var(--text-gray); }
        .p-status { font-weight: bold; }
        .status-win { color: var(--green); }
        .status-playing { color: var(--accent-blue); font-style: italic; }

        /* NAV BAR */
        .nav-bar { display: flex; justify-content: space-around; padding: 15px 0; background: var(--bg-panel); border-top: 1px solid #2d3748; }
        .nav-item { text-align: center; color: var(--text-gray); font-size: 10px; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="user-block">
            <div class="avatar" id="avatar">U</div>
            <div style="font-size: 12px;"><b>Діма</b><br><span style="color:var(--text-gray)">Level 1</span></div>
        </div>
        <div class="currencies">
            <div class="balance-item">
                <span id="tonBal">0.02</span> <small>TON</small>
            </div>
            <div class="balance-item" onclick="topUpStars()">
                <span id="starBal">150</span> <i class="fa-solid fa-star" style="color:var(--accent-gold)"></i>
                <i class="fa-solid fa-plus-circle add-btn" style="margin-left:5px"></i>
            </div>
        </div>
    </header>

    <div class="game-view">
        <div class="multiplier" id="mult">1.00x</div>
        <img src="https://cdn-icons-png.flaticon.com/512/1066/1066371.png" class="rocket" id="rocket" style="display:none">
    </div>

    <div class="bet-panel">
        <div class="input-row">
            <div class="input-wrapper">
                <span style="font-size: 10px; color:var(--text-gray); margin-right:5px">STAKE:</span>
                <input type="number" id="betInput" value="0.10" step="0.01">
            </div>
            <button onclick="multiplyBet(2)" style="background:#2d3748; border:none; color:#fff; padding:0 15px; border-radius:10px; font-weight:bold">x2</button>
        </div>
        <button class="main-action-btn" id="actionBtn">ПОСТАВИТИ СТАВКУ</button>
    </div>

    <div class="players-list" id="pList">
        <div style="font-size: 10px; color:var(--text-gray); margin-bottom:10px; text-transform:uppercase">Гравці в раунді</div>
        </div>

    <nav class="nav-bar">
        <div class="nav-item"><i class="fa-solid fa-box"></i>Інвентар</div>
        <div class="nav-item"><i class="fa-solid fa-hammer"></i>Крафт</div>
        <div class="nav-item active"><i class="fa-solid fa-rocket"></i>Краш</div>
        <div class="nav-item"><i class="fa-solid fa-layer-group"></i>Кейси</div>
        <div class="nav-item"><i class="fa-solid fa-user"></i>Профіль</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        ton: 0.02,
        stars: 150,
        bet: 0,
        isPlaying: false,
        currentX: 1.00,
        crashPoint: 0,
        loop: null
    };

    function multiplyBet(m) {
        let val = document.getElementById('betInput').value;
        document.getElementById('betInput').value = (val * m).toFixed(2);
    }

    function topUpStars() {
        tg.showConfirm("Поповнити баланс на 50 ⭐️ за 0.5 TON?", (ok) => {
            if(ok) {
                state.stars += 50;
                document.getElementById('starBal').innerText = state.stars;
                tg.HapticFeedback.notificationOccurred('success');
            }
        });
    }

    function startRound() {
        const amount = parseFloat(document.getElementById('betInput').value);
        if(amount > state.ton) return tg.showAlert("Недостатньо TON!");

        state.ton -= amount;
        state.bet = amount;
        state.isPlaying = true;
        state.currentX = 1.00;
        state.crashPoint = (0.98 / (1 - Math.random())).toFixed(2);
        
        document.getElementById('tonBal').innerText = state.ton.toFixed(2);
        document.getElementById('rocket').style.display = 'block';
        document.getElementById('actionBtn').classList.add('cashout');
        
        updateLiveBots();

        state.loop = setInterval(() => {
            state.currentX += 0.01 + (state.currentX * 0.005);
            document.getElementById('mult').innerText = state.currentX.toFixed(2) + 'x';
            
            // Оновлення кнопки з сумою виграшу
            const potentialWin = (state.bet * state.currentX).toFixed(2);
            document.getElementById('actionBtn').innerHTML = `ЗАБРАТИ ${potentialWin} TON`;

            // Рух ракети
            const move = (state.currentX - 1) * 30;
            document.getElementById('rocket').style.transform = `translate(${move}px, -${move}px)`;

            if(state.currentX >= state.crashPoint) crash();
        }, 100);
    }

    function crash() {
        clearInterval(state.loop);
        state.isPlaying = false;
        tg.HapticFeedback.notificationOccurred('error');
        
        document.getElementById('mult').style.color = '#ef4444';
        document.getElementById('mult').innerText = "💥 " + state.currentX.toFixed(2) + "x";
        document.getElementById('actionBtn').disabled = true;
        document.getElementById('actionBtn').innerText = "КРАШ!";

        setTimeout(() => {
            reset();
        }, 3000);
    }

    function reset() {
        document.getElementById('mult').style.color = '#fff';
        document.getElementById('mult').innerText = "1.00x";
        document.getElementById('rocket').style.display = 'none';
        document.getElementById('rocket').style.transform = 'translate(0,0)';
        document.getElementById('actionBtn').disabled = false;
        document.getElementById('actionBtn').classList.remove('cashout');
        document.getElementById('actionBtn').innerText = "ПОСТАВИТИ СТАВКУ";
        renderEmptyBots();
    }

    document.getElementById('actionBtn').onclick = () => {
        if(!state.isPlaying) {
            startRound();
        } else {
            const win = state.bet * state.currentX;
            state.ton += win;
            state.isPlaying = false;
            clearInterval(state.loop);
            
            document.getElementById('tonBal').innerText = state.ton.toFixed(2);
            document.getElementById('actionBtn').disabled = true;
            document.getElementById('actionBtn').innerText = `ВИГРАШ: ${win.toFixed(2)} TON`;
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    function updateLiveBots() {
        const list = document.getElementById('pList');
        list.innerHTML = `<div style="font-size: 10px; color:var(--text-gray); margin-bottom:10px; text-transform:uppercase">Гравці в раунді</div>`;
        const bots = ["@ton_shark", "@crypto_dimon", "@lucky_man", "@stonks_king"];
        bots.forEach(b => {
            const row = document.createElement('div');
            row.className = 'player-item';
            row.innerHTML = `<span class="p-name">${b}</span> <span class="p-status status-playing">у грі...</span>`;
            list.appendChild(row);
        });
    }

    function renderEmptyBots() {
        const list = document.getElementById('pList');
        list.innerHTML = `<div style="font-size: 10px; color:var(--text-gray); margin-bottom:10px; text-transform:uppercase">Очікування гравців...</div>`;
    }

    renderEmptyBots();
</script>
</body>
</html>
