
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift Crash Pro</title>
    <style>
        body {
            margin: 0;
            background-color: #05080f; /* Глибокий темний фон */
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Контейнер гри */
        .game-container {
            flex: 1;
            position: relative;
            width: 100%;
            background: radial-gradient(circle at center, #0a101d 0%, #05080f 100%);
        }

        /* Полотно для графіка та шлейфу */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Множник по центру */
        .multiplier {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        /* Стилізована ракета */
        #rocket {
            position: absolute;
            width: 70px;
            height: 70px;
            z-index: 20;
            filter: drop-shadow(0 0 15px #3b82f6); /* Синє неонове світіння */
            pointer-events: none;
            transition: transform 0.05s linear;
        }

        .controls {
            padding: 20px;
            background: #0e1219;
            border-top: 1px solid #1e2630;
            text-align: center;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="game-container" id="container">
    <div class="multiplier" id="mult">1.00x</div>
    
    <svg id="rocket" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 4L42 18V44L32 54L22 44V18L32 4Z" fill="#3b82f6" fill-opacity="0.9"/>
        <path d="M32 4L36 12H28L32 4Z" fill="#93c5fd"/>
        <circle cx="32" cy="28" r="4" fill="#05080f"/>
        <path d="M22 40L14 48V52L22 44V40Z" fill="#2563eb"/>
        <path d="M42 40L50 48V52L42 44V40Z" fill="#2563eb"/>
        <path id="flame" d="M32 54L36 62L32 64L28 62L32 54Z" fill="#fbbf24">
            <animate attributeName="opacity" values="1;0.5;1" dur="0.1s" repeatCount="indefinite" />
        </path>
    </svg>

    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button onclick="resetGame()">НОВИЙ РАУНД</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const rocket = document.getElementById('rocket');
    const multDisplay = document.getElementById('mult');
    const container = document.getElementById('container');

    let width, height;
    let points = []; // Точки для малювання лінії
    let startTime;
    let animationFrame;
    let crashed = false;

    function resize() {
        width = canvas.width = container.clientWidth;
        height = canvas.height = container.clientHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    function animate() {
        if (crashed) return;

        const elapsed = (Date.now() - startTime) / 1000;
        const multiplier = Math.pow(1.07, elapsed * 5);
        
        multDisplay.innerText = multiplier.toFixed(2) + "x";

        // Координати ракети (крива як на фото)
        const x = 50 + (elapsed * 40); 
        const y = height - 50 - (Math.pow(elapsed, 1.5) * 15);

        // Додаємо точку в масив для шлейфу
        points.push({x, y});

        // Очищення екрану
        ctx.clearRect(0, 0, width, height);

        // Малюємо сітку (слабку)
        ctx.strokeStyle = '#1a202c';
        ctx.lineWidth = 1;
        for(let i=0; i<width; i+=50) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
        }
        for(let i=0; i<height; i+=50) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
        }

        // Малюємо білий шлейф (лінію)
        ctx.beginPath();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'white';
        
        if (points.length > 0) {
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
        }
        ctx.shadowBlur = 0; // Скидаємо тінь для інших елементів

        // Оновлюємо позицію SVG ракети
        rocket.style.left = `${x - 35}px`;
        rocket.style.top = `${y - 35}px`;
        rocket.style.transform = `rotate(${45 - elapsed * 2}deg)`;

        // Рандомний краш для тесту
        if (multiplier > 5.5) {
            doCrash();
        } else {
            animationFrame = requestAnimationFrame(animate);
        }
    }

    function doCrash() {
        crashed = true;
        multDisplay.style.color = '#ef4444';
        multDisplay.innerText = "CRASHED!";
        rocket.style.filter = 'grayscale(1) drop-shadow(0 0 10px red)';
    }

    function resetGame() {
        cancelAnimationFrame(animationFrame);
        points = [];
        crashed = false;
        startTime = Date.now();
        multDisplay.style.color = 'white';
        rocket.style.filter = 'drop-shadow(0 0 15px #3b82f6)';
        animate();
    }

    resetGame();
</script>

</body>
</html>
