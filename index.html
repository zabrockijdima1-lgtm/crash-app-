<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Crash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0f1e; color: white; overflow: hidden; }
        
        .game-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #12192b;
        }

        /* Шапка */
        .header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .balance-box {
            background: rgba(76, 175, 80, 0.1);
            padding: 5px 12px;
            border-radius: 15px;
            border: 1px solid #4CAF50;
            color: #4CAF50;
            font-weight: bold;
            font-size: 14px;
        }

        .deposit-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Зона ракети */
        .rocket-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 300px;
        }

        #multiplier {
            font-size: 64px;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.5);
            transition: color 0.2s;
        }

        .rocket-img {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px #667eea);
            transition: transform 0.1s linear;
        }

        /* Кнопки */
        .bet-controls {
            padding: 20px;
            background: #1e293b;
            border-radius: 30px 30px 0 0;
        }

        .main-button {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-bet { background: linear-gradient(135deg, #4CAF50, #2e7d32); }
        .btn-withdraw { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .main-button:active { transform: scale(0.96); }
        .main-button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Історія */
        .history {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            background: #0f172a;
        }
        .history::-webkit-scrollbar { display: none; }

        .history-item {
            padding: 4px 10px;
            background: #1e293b;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .x-low { color: #f44336; }
        .x-high { color: #4CAF50; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div>
            <div style="font-size: 18px; font-weight: 800;">StonksGift</div>
            <div id="username" style="font-size: 12px; opacity: 0.6;">Гравець</div>
        </div>
        <div class="balance-group">
            <div class="balance-box">
                ⭐️ <span id="balance">0.00</span>
            </div>
            <button class="deposit-btn" onclick="openDepositMenu()">+ ПОПОВНИТИ</button>
        </div>
    </div>

    <div class="history" id="historyBox"></div>

    <div class="rocket-zone">
        <div class="rocket-img" id="rocketIcon">🚀</div>
        <div id="multiplier">1.00x</div>
    </div>

    <div class="bet-controls">
        <div style="margin-bottom: 15px; display: flex; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 5px;">
                <span>Ставка:</span>
                <input type="number" id="betInput" value="10" min="1" style="width: 60px; background: transparent; border: 1px solid #4CAF50; color: white; border-radius: 5px; padding: 2px 5px;">
                <span>⭐️</span>
            </div>
            <span id="potential-win" style="color: #4CAF50;">+0.00</span>
        </div>
        
        <button id="actionBtn" class="main-button btn-bet">ПОСТАВИТИ СТАВКУ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Елементи
    const multDisplay = document.getElementById('multiplier');
    const actionBtn = document.getElementById('actionBtn');
    const balanceDisplay = document.getElementById('balance');
    const potWinDisplay = document.getElementById('potential-win');
    const historyBox = document.getElementById('historyBox');
    const rocketIcon = document.getElementById('rocketIcon');
    const betInput = document.getElementById('betInput');

    // Стан гри
    let balance = 0.00; // Початковий баланс завантажується з сервера
    let currentMultiplier = 1.00;
    let isPlaying = false;
    let isCrashed = false;
    let gameLoop;
    let crashPoint = 0;

    // --- ЛОГІКА ТЕЛЕГРАМ ЗІРОК (STARS) ---

    // 1. Функція поповнення балансу реальним зірками
    async function openDepositMenu() {
        const amount = await new Promise(resolve => {
            const val = prompt("Скільки зірок (⭐️) ви хочете внести?", "50");
            resolve(parseInt(val));
        });

        if (!amount || amount < 1) return;

        tg.showConfirm(`Ви вносите ${amount} ⭐️. Продовжити?`, async (confirmed) => {
            if (confirmed) {
                try {
                    // ТУТ МАЄ БУТИ ЗАПИТ ДО ВАШОГО БЕКЕНДУ
                    // Ваш сервер має використати Bot API 'createInvoiceLink' для зірок (currency: "XTR")
                    // Нижче приклад того, як це виглядає:
                    
                    /* const response = await fetch('https://your-api.com/create-stars-invoice', {
                        method: 'POST',
                        body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, stars: amount })
                    });
                    const { invoiceLink } = await response.json();
                    */

                    // Для тестування (викликає платіжне вікно Telegram):
                    // tg.openInvoice(invoiceLink, (status) => {
                    //    if(status === 'paid') updateBalanceFromServer();
                    // });

                    tg.showAlert("Серверна частина ще не підключена. Використовуйте 'createInvoiceLink' на бекенді з валютою XTR.");
                } catch (e) {
                    tg.showAlert("Помилка платежу.");
                }
            }
        });
    }

    // 2. Функція отримання реального балансу з вашого сервера
    async function updateBalanceFromServer() {
        // Тут ви робите fetch до своєї БД
        // balance = await fetchBalance(tg.initDataUnsafe.user.id);
        // balanceDisplay.textContent = balance.toFixed(2);
    }

    // --- ЛОГІКА ГРИ ---

    if (tg.initDataUnsafe.user) {
        document.getElementById('username').textContent = tg.initDataUnsafe.user.first_name;
    }

    function getCrashPoint() {
        const seed = Math.random();
        if (seed < 0.05) return 1.00; 
        return (0.98 / (1 - seed)).toFixed(2);
    }

    function updateGame() {
        if (!isPlaying || isCrashed) return;

        currentMultiplier += 0.01 + (currentMultiplier * 0.003);
        multDisplay.textContent = currentMultiplier.toFixed(2) + 'x';
        
        // Візуальний ефект ракети (зліт)
        const shake = (Math.random() - 0.5) * 2;
        rocketIcon.style.transform = `translateY(-${(currentMultiplier - 1) * 20}px) translateX(${shake}px)`;
        
        const win = (parseFloat(betInput.value) * currentMultiplier).toFixed(2);
        potWinDisplay.textContent = `+${win}`;

        if (currentMultiplier >= crashPoint) {
            doCrash();
        }
    }

    function doCrash() {
        isCrashed = true;
        clearInterval(gameLoop);
        
        tg.HapticFeedback.notificationOccurred('error');
        multDisplay.style.color = '#f44336';
        multDisplay.textContent = '💥 ' + currentMultiplier.toFixed(2) + 'x';
        rocketIcon.textContent = '🔥';
        rocketIcon.style.transform = 'scale(1.5)';

        addToHistory(currentMultiplier.toFixed(2));
        
        // ТУТ ВІДПРАВЛЯЄМО РЕЗУЛЬТАТ НА СЕРВЕР (ПРОГРАШ)
        // syncResultWithServer(0); 

        resetUI();
    }

    function resetUI() {
        isPlaying = false;
        setTimeout(() => {
            actionBtn.textContent = 'ПОСТАВИТИ СТАВКУ';
            actionBtn.className = 'main-button btn-bet';
            actionBtn.disabled = false;
            actionBtn.style.opacity = '1';
            potWinDisplay.textContent = '+0.00';
            
            currentMultiplier = 1.00;
            multDisplay.textContent = '1.00x';
            multDisplay.style.color = 'white';
            rocketIcon.textContent = '🚀';
            rocketIcon.style.transform = 'translateY(0)';
            isCrashed = false;
        }, 3000);
    }

    function addToHistory(val) {
        const item = document.createElement('div');
        item.className = `history-item ${val < 2 ? 'x-low' : 'x-high'}`;
        item.textContent = val + 'x';
        historyBox.prepend(item);
    }

    actionBtn.addEventListener('click', async () => {
        const currentBet = parseFloat(betInput.value);

        if (!isPlaying && !isCrashed) {
            // ПЕРЕВІРКА БАЛАНСУ
            if (balance < currentBet) {
                tg.showAlert("Недостатньо зірок! Поповніть баланс.");
                return;
            }
            
            // ТУТ ВІДПРАВЛЯЄМО ЗАПИТ НА СЕРВЕР ДЛЯ СПИСАННЯ СТАВКИ
            // const success = await serverPlaceBet(currentBet);
            // if(!success) return;

            balance -= currentBet;
            balanceDisplay.textContent = balance.toFixed(2);
            
            isPlaying = true;
            crashPoint = parseFloat(getCrashPoint());
            
            actionBtn.textContent = 'ЗАБРАТИ';
            actionBtn.className = 'main-button btn-withdraw';
            
            gameLoop = setInterval(updateGame, 100);
            tg.HapticFeedback.impactOccurred('medium');

        } else if (isPlaying && !isCrashed) {
            // ГРАВЕЦЬ ЗАБИРАЄ ВИГРАШ
            const win = currentBet * currentMultiplier;
            
            // ТУТ ВІДПРАВЛЯЄМО ЗАПИТ НА СЕРВЕР ДЛЯ НАРАХУВАННЯ ВИГРАШУ
            // await serverClaimWin(win);

            balance += win;
            balanceDisplay.textContent = balance.toFixed(2);
            
            tg.HapticFeedback.notificationOccurred('success');
            tg.showPopup({
                title: 'Перемога!',
                message: `Ви виграли ${win.toFixed(2)} ⭐️`,
                buttons: [{type: 'ok'}]
            });
            
            isPlaying = false; 
            actionBtn.disabled = true;
            actionBtn.style.opacity = '0.5';
        }
    });

    // Початкове завантаження балансу
    updateBalanceFromServer();
</script>

</body>
</html>
