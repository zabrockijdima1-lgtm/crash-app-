<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Pro Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0e14;
            --bg-card: #1a202c;
            --ton-blue: #0088cc;
            --accent-green: #00c853;
            --accent-red: #ff3d00;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: #fff; overflow: hidden; height: 100vh; }
        
        .app-container { max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background-color: #11151c; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid #2d3748; }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 38px; height: 38px; background: linear-gradient(45deg, #4a5568, #718096); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #4a5568; }
        .balance-group { display: flex; gap: 8px; }
        .bal-box { background: #0b0e14; padding: 6px 12px; border-radius: 10px; border: 1px solid #2d3748; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .stars { border-color: var(--gold); color: var(--gold); }

        /* History */
        .history-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; background: #11151c; scrollbar-width: none; }
        .history-item { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 800; background: rgba(255,255,255,0.05); }

        /* Game Area - Canvas & Rocket */
        .game-area {
            flex-grow: 1; position: relative; background: #0d1117;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        #gameCanvas { position: absolute; width: 100%; height: 100%; }
        
        .multiplier-wrapper { z-index: 10; text-align: center; pointer-events: none; }
        .multiplier-display { font-size: 60px; font-weight: 900; text-shadow: 0 0 30px rgba(0, 136, 204, 0.5); }
        
        .rocket-container {
            position: absolute; bottom: 50px; left: 50px; width: 80px; height: 80px;
            z-index: 5; transition: transform 0.1s linear; transform-origin: center;
        }
        .rocket-img { width: 100%; filter: drop-shadow(0 0 15px var(--ton-blue)); }

        /* Controls */
        .controls { background: var(--bg-card); padding: 16px; border-radius: 24px 24px 0 0; }
        .round-status { text-align: center; font-size: 12px; color: #a0aec0; margin-bottom: 12px; text-transform: uppercase; }
        
        .bet-input-row { display: flex; background: #0b0e14; border-radius: 12px; padding: 8px 16px; align-items: center; margin-bottom: 15px; border: 1px solid #2d3748; }
        .bet-input-row input { flex: 1; background: transparent; border: none; color: #fff; font-size: 18px; font-weight: 700; outline: none; }
        
        .main-btn {
            width: 100%; padding: 18px; border-radius: 14px; border: none; font-size: 18px; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-bet { background: linear-gradient(135deg, #0088cc, #005a87); color: white; }
        .btn-cash { background: linear-gradient(135deg, #00c853, #008a39); color: white; }
        .btn-wait { background: #2d3748; color: #718096; cursor: not-allowed; }

        /* Players */
        .players-list { margin-top: 15px; height: 120px; overflow-y: auto; }
        .player-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="uAvatar">D</div>
            <div class="user-info">
                <div class="user-name" id="uName">DIMON</div>
                <div style="font-size: 10px; color: #a0aec0;">LEVEL 1</div>
            </div>
        </div>
        <div class="balance-group">
            <div class="bal-box stars"><i class="fa-solid fa-star"></i> <span id="starsVal">0</span></div>
            <div class="bal-box"><div style="width:10px; height:10px; background:var(--ton-blue); border-radius:50%"></div> <span id="balVal">10.00</span></div>
        </div>
    </div>

    <div class="history-bar" id="history"></div>

    <div class="game-area">
        <canvas id="gameCanvas"></canvas>
        <div class="multiplier-wrapper">
            <div class="multiplier-display" id="mult">1.00x</div>
            <div id="potentialWin" style="color: var(--accent-green); font-weight: 700;"></div>
        </div>
        <div class="rocket-container" id="rocket">
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041928.png" class="rocket-img">
        </div>
    </div>

    <div class="controls">
        <div class="round-status" id="status">ОЧІКУВАННЯ...</div>
        
        <div class="bet-input-row">
            <input type="number" id="betInput" value="1.0" step="0.1">
            <span style="color: var(--ton-blue); font-weight: 800;">TON</span>
        </div>

        <button class="main-btn btn-bet" id="mainBtn">ПОСТАВИТИ</button>

        <div class="players-list" id="players"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Settings
    let balance = 100.0;
    let currentBet = 0;
    let isWaitingNext = false; // Ставка на наступний раунд
    let hasCashedOut = false;
    let gameActive = false;
    let multiplier = 1.0;
    let crashPoint = 0;
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const multEl = document.getElementById('mult');
    const mainBtn = document.getElementById('mainBtn');
    const rocket = document.getElementById('rocket');

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    // --- LOGIC ---

    function startLoop() {
        // Ракета летить кожні 5 секунд автоматично
        if (!gameActive) {
            prepareRound();
        }
    }

    function prepareRound() {
        gameActive = false;
        multiplier = 1.0;
        hasCashedOut = false;
        
        let timeLeft = 5;
        const timer = setInterval(() => {
            document.getElementById('status').innerText = `ЗЛІТ ЧЕРЕЗ ${timeLeft}с...`;
            timeLeft--;
            if (timeLeft < 0) {
                clearInterval(timer);
                launchRocket();
            }
        }, 1000);
    }

    function launchRocket() {
        gameActive = true;
        crashPoint = generateCrashPoint();
        console.log("Crash at:", crashPoint);
        
        if (isWaitingNext) {
            isWaitingNext = false;
            // Ставка стає активною
        }

        updateUI();

        const startTime = Date.now();
        const gameInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            // Експоненціальне зростання
            multiplier = Math.pow(Math.E, 0.06 * elapsed);
            
            multEl.innerText = multiplier.toFixed(2) + "x";
            multEl.style.color = "#fff";
            
            drawGraph(elapsed);
            moveRocket(elapsed);

            if (currentBet > 0 && !hasCashedOut) {
                document.getElementById('potentialWin').innerText = `+${(currentBet * multiplier).toFixed(2)} TON`;
            }

            if (multiplier >= crashPoint) {
                clearInterval(gameInterval);
                doCrash();
            }
        }, 50);
    }

    function doCrash() {
        gameActive = false;
        multEl.innerText = "💥 " + multiplier.toFixed(2) + "x";
        multEl.style.color = "var(--accent-red)";
        document.getElementById('status').innerText = "КРАШ!";
        document.getElementById('potentialWin').innerText = "";
        
        addHistory(multiplier);
        tg.HapticFeedback.notificationOccurred('error');

        currentBet = 0;
        updateUI();

        // АВТО-ПЕРЕЗАПУСК ЧЕРЕЗ 5 СЕКУНД
        setTimeout(prepareRound, 2000); 
    }

    function generateCrashPoint() {
        const r = Math.random();
        if (r < 0.03) return 1.00; // Миттєвий краш
        return parseFloat((0.99 / (1 - r)).toFixed(2));
    }

    // --- UI & ANIMATION ---

    function moveRocket(t) {
        const x = Math.min(t * 40, canvas.width - 100);
        const y = Math.min(Math.pow(t, 1.5) * 10, canvas.height - 100);
        
        rocket.style.transform = `translate(${x}px, ${-y}px) rotate(${-y/10}deg)`;
    }

    function drawGraph(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = '#0088cc';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        
        ctx.moveTo(50, canvas.height - 50);
        
        for(let i=0; i<t; i+=0.1) {
            let dx = 50 + i * 40;
            let dy = (canvas.height - 50) - Math.pow(i, 1.5) * 10;
            ctx.lineTo(dx, dy);
        }
        ctx.stroke();

        // Градієнт під графіком
        ctx.lineTo(50 + t * 40, canvas.height - 50);
        ctx.closePath();
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, 'rgba(0, 136, 204, 0.2)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fill();
    }

    function updateUI() {
        if (gameActive) {
            if (currentBet > 0 && !hasCashedOut) {
                mainBtn.innerText = "ЗАБРАТИ";
                mainBtn.className = "main-btn btn-cash";
            } else {
                mainBtn.innerText = "ГРА ЙДЕ...";
                mainBtn.className = "main-btn btn-wait";
            }
        } else {
            mainBtn.innerText = "ПОСТАВИТИ";
            mainBtn.className = "main-btn btn-bet";
        }
        document.getElementById('balVal').innerText = balance.toFixed(2);
    }

    mainBtn.onclick = () => {
        if (!gameActive && currentBet === 0) {
            let val = parseFloat(document.getElementById('betInput').value);
            if (val <= balance) {
                balance -= val;
                currentBet = val;
                isWaitingNext = true;
                tg.HapticFeedback.impactOccurred('medium');
                updateUI();
                document.getElementById('status').innerText = "СТАВКА ПРИЙНЯТА!";
            }
        } else if (gameActive && currentBet > 0 && !hasCashedOut) {
            // КЕШАУТ
            let win = currentBet * multiplier;
            balance += win;
            hasCashedOut = true;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`Ви виграли ${win.toFixed(2)} TON!`);
            updateUI();
        }
    };

    function addHistory(val) {
        const hist = document.getElementById('history');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.style.color = val > 2 ? 'var(--accent-green)' : 'var(--accent-red)';
        item.innerText = val.toFixed(2) + 'x';
        hist.prepend(item);
    }

    // Старт
    prepareRound();
</script>
</body>
</html>
