<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StonksGift - Official Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0e14;
            --bg-secondary: #11151c;
            --bg-accent: #1a202c;
            --ton-blue: #0088cc;
            --gold: #fbbf24;
            --green: #68d391;
            --red: #fc8181;
            --text-gray: #a0aec0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-main); color: #fff; overflow: hidden; height: 100vh; }
        
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-secondary);
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--bg-accent);
            border-bottom: 1px solid #2d3748;
            z-index: 100;
        }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 38px; height: 38px; background: linear-gradient(45deg, #4a5568, #718096); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #4a5568; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: 700; font-size: 13px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-level { font-size: 10px; color: var(--text-gray); }
        
        .balances { display: flex; gap: 8px; }
        .balance-item { 
            display: flex; align-items: center; gap: 5px; background: var(--bg-main); 
            padding: 6px 10px; border-radius: 10px; border: 1px solid #2d3748; font-size: 13px; font-weight: 700;
        }
        .bal-ton { border-color: var(--ton-blue); }
        .bal-stars { border-color: var(--gold); color: var(--gold); }

        /* History */
        .history-bar {
            display: flex; gap: 6px; padding: 8px 16px; background: var(--bg-secondary);
            overflow-x: auto; border-bottom: 1px solid #1a202c; scrollbar-width: none;
        }
        .history-bar::-webkit-scrollbar { display: none; }
        .history-item { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; white-space: nowrap; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .x-low { background: rgba(252, 129, 129, 0.15); color: var(--red); }
        .x-mid { background: rgba(104, 211, 145, 0.15); color: var(--green); }
        .x-high { background: rgba(251, 191, 36, 0.15); color: var(--gold); }

        /* Game Area */
        .game-area {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; background: radial-gradient(circle at center, #1a202c 0%, #0d1117 100%);
            overflow: hidden;
        }
        .grid-bg {
            position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(#1a202c 1px, transparent 1px), linear-gradient(90deg, #1a202c 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg);
            top: -50%; opacity: 0.3;
        }

        .multiplier-display {
            font-size: 72px; font-weight: 900; z-index: 10; text-align: center;
            transition: transform 0.1s; text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .win-toast {
            position: absolute; top: 20%; background: var(--green); color: #000;
            padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 14px;
            animation: bounce 0.5s infinite alternate; z-index: 20;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        .rocket-box {
            position: absolute; bottom: 20%; left: 20%; width: 80px; height: 80px;
            transition: all 0.1s linear; z-index: 5;
        }
        .rocket-img { width: 100%; filter: drop-shadow(0 0 15px var(--ton-blue)); }

        /* Bet Area */
        .bet-section {
            background: var(--bg-accent); padding: 16px; border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.3);
        }
        .round-info { text-align: center; font-size: 11px; color: var(--text-gray); margin-bottom: 12px; letter-spacing: 1px; }

        .input-group {
            background: var(--bg-main); border: 1px solid #2d3748; border-radius: 12px;
            display: flex; align-items: center; padding: 4px 12px; margin-bottom: 12px;
        }
        .input-group input {
            flex: 1; background: transparent; border: none; color: #fff;
            padding: 12px; font-size: 18px; font-weight: 700; outline: none;
        }

        .presets { display: flex; gap: 8px; margin-bottom: 16px; }
        .p-btn { 
            flex: 1; background: var(--bg-main); border: 1px solid #2d3748; color: var(--text-gray);
            padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
        }
        .p-btn.active { border-color: var(--ton-blue); color: #fff; background: rgba(0, 136, 204, 0.1); }

        .main-btn {
            width: 100%; padding: 20px; border-radius: 16px; border: none;
            font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-bet { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-cashout { background: linear-gradient(135deg, #f6ad55, #ed8936); color: white; box-shadow: 0 0 20px rgba(237, 137, 54, 0.4); }
        .main-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Players List */
        .players-box { margin-top: 15px; max-height: 120px; overflow-y: auto; }
        .player-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px;
        }
        .p-name { display: flex; align-items: center; gap: 6px; color: var(--text-gray); }
        .p-status-win { color: var(--green); font-weight: 700; }

        .navbar {
            display: flex; background: var(--bg-accent); border-top: 1px solid #2d3748; padding: 10px 0;
        }
        .nav-item { flex: 1; text-align: center; color: var(--text-gray); font-size: 20px; opacity: 0.6; }
        .nav-item.active { color: var(--ton-blue); opacity: 1; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="user-block">
            <div class="user-avatar" id="uAvat">?</div>
            <div class="user-info">
                <span class="user-name" id="uName">Loading...</span>
                <span class="user-level">LVL 1 Провідець</span>
            </div>
        </div>
        <div class="balances">
            <div class="balance-item bal-stars">
                <i class="fa-solid fa-star"></i> <span id="starsCount">0</span>
            </div>
            <div class="balance-item bal-ton">
                <div style="width:12px;height:12px;background:#0088cc;border-radius:50%"></div> 
                <span id="tonCount">10.00</span>
            </div>
        </div>
    </div>

    <div class="history-bar" id="history">
        </div>

    <div class="game-area">
        <div class="grid-bg"></div>
        <div class="win-toast hidden" id="winToast">ВИГРАШ!</div>
        <div class="multiplier-display" id="mult">1.00x</div>
        
        <div class="rocket-box" id="rocket">
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041928.png" class="rocket-img" alt="rocket">
        </div>
    </div>

    <div class="bet-section">
        <div class="round-info" id="statusLine">ОЧІКУВАННЯ СТАВОК...</div>
        
        <div class="presets">
            <button class="p-btn active" onclick="setBet(1)">1 TON</button>
            <button class="p-btn" onclick="setBet(2)">2 TON</button>
            <button class="p-btn" onclick="setBet(5)">5 TON</button>
            <button class="p-btn" onclick="setBet(10)">10 TON</button>
        </div>

        <div class="input-group">
            <input type="number" id="betInput" value="1.0" step="0.1" min="0.1">
            <span style="font-weight:800; color:var(--ton-blue)">TON</span>
        </div>

        <button class="main-btn btn-bet" id="mainBtn">ПОСТАВИТИ</button>

        <div class="players-box" id="playersList">
            </div>
    </div>

    <div class="navbar">
        <div class="nav-item"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-item active"><i class="fa-solid fa-rocket"></i></div>
        <div class="nav-item"><i class="fa-solid fa-gift"></i></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Data
    let balance = 25.0;
    let currentMult = 1.0;
    let isPlaying = false; // Чи зробив користувач ставку
    let isFlying = false;  // Чи йде зараз раунд
    let hasCashedOut = false;
    let gameLoop;
    let betAmount = 1.0;

    // Elements
    const multEl = document.getElementById('mult');
    const mainBtn = document.getElementById('mainBtn');
    const rocket = document.getElementById('rocket');
    const tonEl = document.getElementById('tonCount');
    const statusEl = document.getElementById('statusLine');
    const historyEl = document.getElementById('history');

    // Init User
    if(tg.initDataUnsafe.user) {
        document.getElementById('uName').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('uAvat').innerText = tg.initDataUnsafe.user.first_name[0];
    }

    function updateBalance() {
        tonEl.innerText = balance.toFixed(2);
    }

    function setBet(val) {
        document.getElementById('betInput').value = val.toFixed(1);
        betAmount = val;
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    // Logic
    mainBtn.onclick = () => {
        if (!isFlying && !isPlaying) {
            // Place Bet
            betAmount = parseFloat(document.getElementById('betInput').value);
            if (betAmount > balance) {
                tg.showAlert("Недостатньо TON на балансі!");
                return;
            }
            balance -= betAmount;
            isPlaying = true;
            updateBalance();
            mainBtn.disabled = true;
            statusEl.innerText = "СТАВКУ ПРИЙНЯТО! ОЧІКУЙТЕ ЗЛЬОТУ...";
            tg.HapticFeedback.impactOccurred('medium');
            
            // Start game if not started
            if(!isFlying) setTimeout(startRound, 2000);

        } else if (isFlying && isPlaying && !hasCashedOut) {
            // Cashout
            cashOut();
        }
    };

    function startRound() {
        isFlying = true;
        hasCashedOut = false;
        currentMult = 1.0;
        const crashPoint = generateCrashPoint();
        
        mainBtn.disabled = false;
        mainBtn.innerText = "ЗАБРАТИ";
        mainBtn.className = "main-btn btn-cashout";
        statusEl.innerText = "РАКЕТА ЛЕТИТЬ...";

        gameLoop = setInterval(() => {
            currentMult += 0.01 * (currentMult / 1.5);
            multEl.innerText = currentMult.toFixed(2) + 'x';
            
            // Анімація ракети
            let pos = (currentMult - 1) * 15;
            rocket.style.bottom = (20 + pos) + '%';
            rocket.style.left = (20 + pos / 2) + '%';
            rocket.style.transform = `scale(${1 + pos/100}) rotate(-${pos/4}deg)`;

            if (currentMult >= crashPoint) {
                doCrash(crashPoint);
            }
        }, 80);
    }

    function cashOut() {
        const win = betAmount * currentMult;
        balance += win;
        hasCashedOut = true;
        updateBalance();
        
        document.getElementById('winToast').classList.remove('hidden');
        document.getElementById('winToast').innerText = `+${win.toFixed(2)} TON`;
        
        tg.HapticFeedback.notificationOccurred('success');
        mainBtn.disabled = true;
        mainBtn.innerText = "ВЖЕ ЗАБРАНО";
        
        setTimeout(() => document.getElementById('winToast').classList.add('hidden'), 2000);
    }

    function doCrash(point) {
        clearInterval(gameLoop);
        isFlying = false;
        isPlaying = false;
        
        tg.HapticFeedback.notificationOccurred('error');
        multEl.style.color = 'var(--red)';
        multEl.innerText = "💥 " + point.toFixed(2) + "x";
        
        statusEl.innerText = "КРАШ! ПІДГОТОВКА ДО НАСТУПНОГО...";
        
        addHistory(point);

        setTimeout(() => {
            resetUI();
        }, 3500);
    }

    function resetUI() {
        currentMult = 1.0;
        multEl.innerText = "1.00x";
        multEl.style.color = "#fff";
        rocket.style.bottom = '20%';
        rocket.style.left = '20%';
        rocket.style.transform = 'scale(1) rotate(0deg)';
        
        mainBtn.disabled = false;
        mainBtn.innerText = "ПОСТАВИТИ";
        mainBtn.className = "main-btn btn-bet";
        statusEl.innerText = "ОЧІКУВАННЯ СТАВОК...";
    }

    function addHistory(val) {
        const div = document.createElement('div');
        let type = 'x-low';
        if(val >= 2) type = 'x-mid';
        if(val >= 10) type = 'x-high';
        
        div.className = `history-item ${type}`;
        div.innerText = val.toFixed(2) + 'x';
        historyEl.prepend(div);
    }

    function generateCrashPoint() {
        const rand = Math.random();
        if (rand < 0.1) return 1.0; // Instant crash
        return parseFloat((0.98 / (1 - rand)).toFixed(2));
    }

    // Симуляція гравців
    function simPlayers() {
        const list = document.getElementById('playersList');
        const names = ["Max_TON", "KriptoBro", "DogeKing", "Elena", "Anonym", "TON_Master"];
        list.innerHTML = '';
        names.forEach(n => {
            const bet = (Math.random() * 3 + 0.1).toFixed(1);
            list.innerHTML += `
                <div class="player-row">
                    <span class="p-name"><i class="fa-solid fa-user"></i> ${n}</span>
                    <span class="p-status-win">${bet} TON</span>
                </div>
            `;
        });
    }

    updateBalance();
    simPlayers();
    setInterval(simPlayers, 10000);

</script>
</body>
</html>
